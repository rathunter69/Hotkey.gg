<style>
  html{scrollbar-gutter:stable}   /* r68: content filters change page height — without this the centered wrap jumps horizontally */
  :root{
    --bg:#292b31; --surface:#383b42; --surface2:#43474f; --line:#5a5e68;
    --text:#f0f1ec; --muted:#a8adb3; --faint:#767d87;
    --accent:#6ec9a0; --accent-dim:#4a8f72; --accent-glow:rgba(110,201,160,.2);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:1180px;   /* r66: = game space */
  }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}
  header.head{padding:12px 0 10px}   /* r67: flush with the game box */
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px}
  main{padding-bottom:90px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px 26px; margin-bottom:16px}
  .card h4{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.4px; margin-bottom:14px}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:38px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); line-height:1.8}
  .state a{color:var(--accent); border-bottom:1px solid var(--accent-dim)}
  .state a.acc-cta{color:var(--on-accent,#0c0d0e)}   /* r297: the .state link rule was out-specifying the CTA — its label rendered accent-on-accent, invisible in every theme */
  .acc-cta{display:inline-block; font-family:var(--mono); font-size:13px; text-decoration:none;
    border:1px solid var(--accent); background:var(--accent); color:var(--on-accent,#0c0d0e); font-weight:700;
    padding:10px 22px; border-radius:999px; margin:4px 6px; border-bottom:1px solid var(--accent)}
  .acc-cta:hover{filter:brightness(1.08)}
  .acc-cta.ghost{background:transparent; color:var(--accent); border-color:var(--accent-dim); font-weight:500}
  .state a.acc-cta.ghost{color:var(--accent)}   /* r355: the r297 on-accent fix out-specified the ghost variant — 'Log in' rendered white-on-light, invisible */
  .acc-cta.ghost:hover{background:var(--accent-glow)}
</style>

<style>
  /* ============================================================
     PROFILE CUSTOMIZER — page-local classes. Loaded AFTER nav.css so the
     .pc-card.pc-live overrides out-specify nav.css's owner-modal .pc-card rules.
     All colors ride the theme tokens (--surface/--line/--accent/…) so the page
     reads on the default daylight theme AND every dark theme. ============ */
  /* the live card: the earned skin IS the surface — no nested box around .uc.
     When a frame is equipped the .uc paints its own bg/border edge-to-edge;
     with no frame the holder supplies a plain surface behind the transparent .uc. */
  /* r387 (Wolf): preview at the REAL card size — the shareable leaderboard card is
     min(430px, …), not the full page width. Centered so it reads as the actual card
     others see, not a stretched banner. */
  .pc-card.pc-live{background:var(--surface); border:1px solid var(--line); border-radius:16px;
    width:min(462px, 96vw); margin:0 auto 20px; padding:0; max-height:none; display:block; overflow:visible; position:relative}
  .pc-card.pc-live .uc{padding:22px 24px 20px; border-radius:16px}
  .pc-live-cap{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--faint); text-align:center; margin:-8px 0 18px}
  /* r389 (Wolf): the skin CAROUSEL — arrows flank the card in the page's dead
     side-space; ← → also drive it. Landing on an UNLOCKED skin equips it live;
     a LOCKED skin previews (skin + animation) but never saves. */
  .pc-stage{position:relative; display:flex; align-items:center; justify-content:center; gap:14px; max-width:584px; margin:0 auto 10px}
  /* r397 (Wolf #87): first-visit intro — one-time, dismiss persists in localStorage */
  .pc-intro{max-width:640px; margin:0 auto 20px; background:linear-gradient(180deg,var(--accent-glow),var(--surface) 62%);
    border:1px solid var(--accent-dim); border-radius:14px; padding:15px 18px; display:flex; gap:16px;
    align-items:center; justify-content:space-between; flex-wrap:wrap}
  .pc-intro[hidden]{display:none}
  .pc-intro p{margin:0; flex:1 1 340px; font-size:13.5px; line-height:1.6; color:var(--text)}
  .pc-intro p b{color:var(--accent)}
  .pc-intro button{flex:none; margin:0; font-family:var(--mono); font-size:12px; font-weight:700; cursor:pointer;
    color:var(--on-accent,#0c0d0e); background:var(--accent); border:none; border-radius:9px; padding:9px 18px}
  .pc-intro button:hover{filter:brightness(1.07)}
  .pc-arrow{flex:none; width:46px; height:46px; border-radius:50%; background:var(--surface); border:1px solid var(--line);
    color:var(--text); font-size:24px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:border-color .13s, color .13s, box-shadow .13s, transform .08s; user-select:none; -webkit-user-select:none}
  .pc-arrow:hover{border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px var(--accent-glow)}
  .pc-arrow:active{transform:scale(.9)}
  .pc-lockbadge{position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:9;
    font-family:var(--mono); font-size:9.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:#fff;
    background:rgba(200,83,63,.94); padding:4px 13px; border-radius:999px; box-shadow:0 4px 14px rgba(0,0,0,.35);
    opacity:0; pointer-events:none; transition:opacity .16s}
  .pc-stage.locked .pc-lockbadge{opacity:1}
  .pc-live-cap b{color:var(--text); font-size:12px; letter-spacing:.02em; text-transform:none}
  .pc-live-cap .fc-idx{color:var(--faint); margin-left:2px}
  .pc-live-cap .fc-lock{color:var(--warn); text-transform:none; letter-spacing:.02em; margin-left:6px}
  .pc-live-cap .fc-eq{color:var(--accent); margin-left:6px; letter-spacing:.1em}
  .pc-live-cap .fc-count{display:block; color:var(--faint); margin-top:5px; font-size:9px}
  /* narrow: the card eats the row width, so the arrows overlay its edges */
  @media (max-width:560px){
    .pc-stage{gap:0}
    .pc-arrow{position:absolute; top:50%; transform:translateY(-50%); z-index:7; width:38px; height:38px; font-size:20px;
      background:rgba(20,22,26,.6); border-color:rgba(255,255,255,.25); color:#fff}
    .pc-arrow.prev{left:2px} .pc-arrow.next{right:2px}
    .pc-arrow:active{transform:translateY(-50%) scale(.9)}
  }

  .cz{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px 24px 24px}
  .cz-h{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .cz h2{font-size:18px; font-weight:700; letter-spacing:-.3px}
  .cz-saved{font-family:var(--mono); font-size:11px; color:var(--accent); opacity:0; transition:opacity .2s}
  .cz-saved.show{opacity:1}
  .cz-sub{font-family:var(--mono); font-size:12px; color:var(--muted); line-height:1.6; margin:6px 0 4px}

  .cz-sec{padding:16px 0; border-top:1px dashed var(--line)}
  .cz-sechd{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px}
  .cz-lab{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:1.6px}
  .cz-count{font-family:var(--mono); font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:1.2px}
  .cz-manage{font-family:var(--mono); font-size:10px; color:var(--accent); cursor:pointer;
    letter-spacing:1px; text-transform:uppercase}
  .cz-manage:hover{text-decoration:underline}

  /* 1 — FRAME filmstrip */
  .cz-strip{display:flex; gap:10px; overflow-x:auto; padding:4px 2px 12px}
  .cz-strip::-webkit-scrollbar{height:8px}
  .cz-strip::-webkit-scrollbar-track{background:transparent}
  .cz-strip::-webkit-scrollbar-thumb{background:var(--line); border-radius:99px}
  .cz-frame{flex:0 0 auto; width:106px; background:none; border:none; padding:0; cursor:pointer; text-align:center; color:inherit}
  .cz-sw{display:block; height:62px; border-radius:10px; background:var(--bg); border:1px solid var(--line);
    position:relative; overflow:hidden; margin-bottom:7px; transition:box-shadow .15s, border-color .15s}
  .cz-frame:hover .cz-sw{border-color:var(--faint)}
  .cz-frame.on .cz-sw{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 0 14px var(--accent-glow)}
  .cz-frame.lock .cz-sw{filter:grayscale(.7) brightness(.5)}
  .cz-lk{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px; z-index:6; color:#fff; filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
  /* mini-swatch ornament sizing (mirror of nav.css .fs-mini) — corners shrink,
     tab/medallion/serial/glint hide so the swatch reads as a clean skin preview */
  .cz-sw .hkf-cn{width:30px; height:30px}
  .cz-sw .hkf-c1{top:-3px; left:-3px}
  .cz-sw .hkf-c2{top:-3px; right:-3px}
  .cz-sw .hkf-c3{bottom:-3px; left:-3px}
  .cz-sw .hkf-c4{bottom:-3px; right:-3px}
  .cz-sw .hkf-tab,.cz-sw .hkf-med,.cz-sw .hkf-serial,.cz-sw .hkf-sun,.cz-sw .hkf-glint{display:none}
  .cz-sw canvas.hk-fx{opacity:.7}
  .cz-fn{display:block; font-family:var(--mono); font-size:10px; font-weight:700; color:var(--muted);
    line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cz-frame.on .cz-fn{color:var(--accent)}
  .cz-hint{font-family:var(--mono); font-size:10.5px; color:var(--muted); min-height:15px; margin-top:2px}

  /* chips (titles + highlight stats) */
  .cz-chips{display:flex; flex-wrap:wrap; gap:8px}

  .cz-chip:hover{border-color:var(--faint); color:var(--text)}
  .cz-chip.on{color:var(--accent); border-color:var(--accent); background:var(--accent-glow); box-shadow:0 0 10px var(--accent-glow)}
  .cz-chip.lock{opacity:.45; cursor:default}
  .cz-chip.lock:hover{border-color:var(--line); color:var(--muted)}
  .cz-chip.pro{border-color:var(--warn); color:var(--warn)}
  .cz-statchip.on::before{content:"\2713 "}
  /* r393 (Wolf #79): custom-title input — appears under the chips when CUSTOM is picked */
  .cz-ctwrap{display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:10px}
  .cz-ctwrap[hidden]{display:none}
  .cz-ctwrap input{flex:1 1 200px; min-width:0; font-family:var(--mono); font-size:12.5px; color:var(--text);

  .cz-ctwrap input:focus{border-color:var(--accent-dim)}
  .cz-ctsave{font-family:var(--mono); font-size:11.5px; font-weight:700; color:var(--on-accent,#0c0d0e);

  .cz-ctsave:disabled{opacity:.4; cursor:default}
  .cz-ctmsg{flex-basis:100%; font-family:var(--mono); font-size:10.5px; min-height:13px; color:var(--warn)}

  /* show-on-card pills with a sliding knob */
  .cz-pills{display:flex; flex-wrap:wrap; gap:10px}
  .cz-pill{display:inline-flex; align-items:center; gap:9px; font-family:var(--mono); font-size:11.5px; font-weight:600;
    color:var(--muted); background:var(--bg); border:1px solid var(--line); border-radius:999px;

  .cz-knob{width:30px; height:17px; border-radius:99px; background:var(--surface2); border:1px solid var(--line);
    position:relative; transition:background .15s; flex:none}
  .cz-knob::after{content:""; position:absolute; top:1px; left:1px; width:13px; height:13px; border-radius:50%;

  .cz-pill.on{color:var(--text); border-color:var(--accent-dim)}
  .cz-pill.on .cz-knob{background:var(--accent)}
  .cz-pill.on .cz-knob::after{transform:translateX(13px); background:#fff}

  /* 4 — featured medals grid */
  .cz-medgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:12px 6px}
  .cz-med{position:relative; background:none; border:none; padding:8px 4px; border-radius:10px; cursor:default;
    display:flex; flex-direction:column; align-items:center; gap:5px; color:inherit}
  .cz-med.earned{cursor:pointer}
  .cz-med.earned:hover{background:var(--bg)}
  .cz-med.lock{opacity:.5}
  .cz-med.feat{background:var(--accent-glow); box-shadow:inset 0 0 0 1px var(--accent-dim)}
  .cz-mstar{position:absolute; top:2px; right:7px; font-size:12px; color:var(--warn); opacity:0}
  .cz-med.feat .cz-mstar{opacity:1}
  .cz-mn{font-family:var(--mono); font-size:9px; color:var(--muted); line-height:1.2; text-align:center; max-width:80px}
  .cz-med.feat .cz-mn{color:var(--accent)}
  .cz-medmore{grid-column:1/-1; justify-self:start; align-self:center; font-family:var(--mono); font-size:10px;

  .cz-medmore:hover{color:var(--accent)}
  .cz-medempty{grid-column:1/-1; font-family:var(--mono); font-size:12px; color:var(--muted); padding:4px 0}
  /* 4b — the showcase slots (game loadout) + the click-to-open picker */
  .cz-slots{display:flex; gap:10px; flex-wrap:wrap}
  /* r387 (Wolf): slots are vertical tiles the same size as the card + picker medals */
  .cz-slot{position:relative; flex:0 0 auto; width:88px; min-height:86px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px;
    padding:8px 6px; border-radius:12px; cursor:pointer; color:inherit; background:var(--surface2);

  .cz-slot:hover{border-color:var(--faint)}
  .cz-slot.empty{border-style:dashed; background:transparent; justify-content:center; color:var(--faint)}

  .cz-slot.filled{border-color:var(--accent-dim); background:var(--accent-glow)}
  .cz-slotplus{font-size:20px; line-height:1; font-weight:400}

  .cz-slot.filled:hover .cz-slotx{opacity:1}

  .cz-picker{margin-top:14px; padding:14px; border-radius:12px; background:var(--bg); border:1px solid var(--line)}

  .cz-fchips{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px}

  .cz-foot{font-family:var(--mono); font-size:10.5px; color:var(--faint); line-height:1.6;

  <div class="state">loading…</div>
</div></main>

<div id="siteFooter"></div>

<script>
const R = window.HK_RANK, D = window.HOTKEY_DRILLS;
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
/* r272 — semantic shortcut units (mirror of stats.html/index.html; kept in sync) */
function isChordUnit(k){
  return /^alt( [a-z0-9]){1,6}$/.test(k) || /\(\)$/.test(k) || /^F[0-9]+$/.test(k) || /^Ctrl\+/.test(k);
}

async function load(){
  const root=document.getElementById('root');
  let me=null;
  try{ const { data:{ session } } = await sb.auth.getSession(); me = session ? session.user : null; }catch(e){}
  const isAnon = me && (!me.email || (me.app_metadata&&me.app_metadata.provider==='anonymous'));
  if(!me || isAnon){
    // same guest-gate as account.html — offer BOTH create-account and log-in
    root.innerHTML='<div class="state">You’re playing as a guest — your card lives only on this device.<br><br>'+
      '<a class="acc-cta" href="index.html?openAuth=signup">Create an account</a>'+
      '<a class="acc-cta ghost" href="index.html?openAuth=signin">Log in</a>'+
      '<div style="font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:14px">Create an account to claim a handle, earn frames, and showcase medals on your card.</div></div>';
    return;
  }

  // ---- DATA (mirrors account.html lines 149-207 + stats.html 189-222 achievement inputs) ----
  let prof={handle:'',team_code:null,flair:null,featured_ach:null,school_tag:null,show_school:false}, all=[];
  try{
    const [p,r] = await Promise.all([
      sb.from('profiles').select('handle,team_code,flair,featured_ach,school_tag,show_school').eq('id',me.id).single(),
      sb.from('runs').select('user_id,challenge,time_ms,keystrokes,optimal,created_at').eq('mouse_used',false).order('time_ms',{ascending:true}),
    ]);
    if(p.data) prof=Object.assign(prof,p.data); all=r.data||[];
  }catch(e){}
  const mine = all.filter(x=>x.user_id===me.id);
  try{ if(window.hkFoundingRank) window.hkFoundingRank(sb, me); }catch(e){}   // r389: cache the founding-cohort flag
  let mySes=[]; try{ const se=await sb.from('sessions').select('user_id,mode').eq('user_id', me.id); mySes=se.data||[]; }catch(e){}
  let srvKeys=null;
  try{ const {data}=await sb.from('key_stats').select('counts,keys_lifetime').eq('user_id',me.id).maybeSingle();
    if(data && data.counts && Object.keys(data.counts).length) srvKeys=data; }catch(e){}

  const st   = R.standing(all, me.id, D.menuOrder);
  const tier = R.tierOf(st.avgPct, st.att, st.wsum);

      const tip=e.a.name+' — '+e.a.desc+' · '+e.rarity.toUpperCase()+(on?' · featured (click to remove)':' · click to feature');
      return '<button type="button" class="cz-med earned'+(on?' feat':'')+'" data-ach="'+esc(id)+'" title="'+esc(tip)+'">'+
        '<span class="cz-mstar">✦</span>'+badge+'<b class="cz-mn">'+esc(e.a.name)+'</b></button>';
    }).join('');
    return '<div class="cz-fchips">'+chips+'</div>'+
      '<div class="cz-medgrid">'+(cells||'<div class="cz-medempty">none in this tier</div>')+'</div>'+
      '<a class="cz-medmore" href="stats.html#achievements" title="the full achievement wall lives on your stats page">full achievement wall ↗</a>';
  }

  function statChipsHtml(){
    return HK_STAT_KEYS.map(k=>{
      const on = loadout.stats.includes(k);
      return '<button type="button" class="cz-chip cz-statchip'+(on?' on':'')+'" data-stat="'+k+'">'+esc(statLabel[k]||k)+'</button>';
    }).join('');
  }

  // ---- assemble root ----
  const medalsSection = medalsOK ? (
    '<div class="cz-sec" id="czMedals">'+
      '<div class="cz-sechd"><span class="cz-lab">Featured medals · showcase</span><span class="cz-count" id="czFeatCount">'+feat.length+' / 5</span></div>'+
      '<div class="cz-slots" id="czSlots">'+medalSlotsHtml()+'</div>'+
      '<div class="cz-picker" id="czPicker" hidden>'+medalPickerHtml('all')+'</div>'+
    '</div>') : '';

  root.innerHTML =
    // r397 (Wolf #87): first-visit intro — shown once, then dismissed to localStorage
    '<div class="pc-intro" id="pcIntro" hidden>'+
      '<p><b>This is your card.</b> It’s what everyone sees next to your name — on the boards, in your desk, on your certificates. Arrow through skins, choose what shows, and feature up to five medals. Everything saves the instant you touch it.</p>'+
      '<button type="button" id="pcIntroX">Got it</button>'+
    '</div>'+
    // r389 (Wolf): the skin CAROUSEL — arrows in the side whitespace + ← → keys drive
    // the live card; the frame filmstrip is retired (this is the frame picker now).
    '<div class="pc-stage" id="pcStage">'+
      '<button type="button" class="pc-arrow prev" id="pcPrev" aria-label="previous skin">‹</button>'+
      '<div class="pc-card pc-live" id="liveCard"></div>'+
      '<button type="button" class="pc-arrow next" id="pcNext" aria-label="next skin">›</button>'+
      '<span class="pc-lockbadge">'+window.hkIcon('lock')+' Locked — preview only</span>'+
    '</div>'+
    '<div class="pc-live-cap" id="frameCap"></div>'+
    '<div class="cz">'+
      '<div class="cz-h"><h2>Customize your card</h2><span class="cz-saved" id="czSaved"></span></div>'+
      '<div class="cz-sub">Arrow through your skins on the card (or use ← →). Everything else applies live and saves instantly.</div>'+

      '<div class="cz-sec">'+
        '<div class="cz-sechd"><span class="cz-lab">Title</span><span class="cz-manage" id="czTitleManage">MANAGE →</span></div>'+
        '<div class="cz-chips" id="czTitles">'+titleChipsHtml()+'</div>'+
        /* r393 (Wolf #79): the CUSTOM chip reveals a safe free-text input (unlocked users);
           hkSafeTitle validates live — length 2–18, no profanity, no staff/reserved impersonation. */
        '<div class="cz-ctwrap" id="czCustomWrap"'+(loadout.customTitle?'':' hidden')+'>'+
          '<input id="czCustomTitle" maxlength="18" autocomplete="off" spellcheck="false" placeholder="your title — 2–18 characters" value="'+esc(loadout.customTitle||'')+'">'+
          '<button type="button" class="cz-ctsave" id="czCustomSave">set</button>'+
          '<span class="cz-ctmsg" id="czCustomMsg"></span>'+
        '</div>'+
      '</div>'+

      '<div class="cz-sec">'+
        '<div class="cz-sechd"><span class="cz-lab">Show on card</span></div>'+
        '<div class="cz-pills" id="czShow">'+showPillsHtml()+'</div>'+
      '</div>'+

      medalsSection+

      '<div class="cz-sec">'+
        '<div class="cz-sechd"><span class="cz-lab">Highlight stats · pick up to 5</span><span class="cz-count" id="czStatCount">'+loadout.stats.length+' / 5</span></div>'+
        '<div class="cz-chips" id="czStats">'+statChipsHtml()+'</div>'+
      '</div>'+

      '<div class="cz-foot">Locked frames &amp; medals stay greyed with how they’re earned on hover · nothing here touches your Account or Stats pages.'+
        '<br><a id="czBeta" class="cz-beta'+(betaOpen?' on':'')+'">'+(betaOpen?window.hkIcon('unlock')+' Beta unlock active — every skin & title is open':window.hkIcon('unlock')+' Beta: unlock everything')+'</a></div>'+
    '</div>';

  renderCard();

  // r397 (Wolf #87): one-time first-visit intro
  (function(){ const el=document.getElementById('pcIntro'); if(!el) return;
    let seen=false; try{ seen=localStorage.getItem('hk_prof_intro')==='1'; }catch(e){}
    if(!seen) el.hidden=false;
    const x=document.getElementById('pcIntroX');
    if(x) x.onclick=()=>{ el.hidden=true; try{ localStorage.setItem('hk_prof_intro','1'); }catch(e){} };
  })();

  // ================= WIRING =================
  // ---- SKIN CAROUSEL: arrows + ← → keys. Landing on an unlocked skin equips +
  // saves it; a locked skin previews (skin + animation) but never saves. ----
  function updateFrameCap(){
    const cap=document.getElementById('frameCap'); if(!cap) return;
    const f=frameOpts[previewIdx]||frameOpts[0];
    let s='<b>'+esc(f.name)+'</b><span class="fc-idx">· '+(previewIdx+1)+' / '+frameOpts.length+'</span>';
    if(!f.unlocked) s+='<span class="fc-lock">'+window.hkIcon('lock')+' '+esc(f.earn||'keep playing')+'</span>';
    else if(f.id!=='__none') s+='<span class="fc-eq">✓ EQUIPPED</span>';
    s+='<span class="fc-count">'+frameUnlockedN+' of '+frameTotal+' skins unlocked · your card as others see it</span>';
    cap.innerHTML=s;
    const stage=document.getElementById('pcStage'); if(stage) stage.classList.toggle('locked', !f.unlocked);
  }
  function setFramePreview(idx){
    previewIdx = (idx % frameOpts.length + frameOpts.length) % frameOpts.length;   // wrap
    const f=frameOpts[previewIdx];
    if(f.unlocked){ loadout.frame = f.id==='__none' ? null : f.id; saveFlair(); flash(); }
    renderCard(); updateFrameCap();
  }
  previewIdx = Math.max(0, frameOpts.findIndex(f=>f.id===(loadout.frame||'__none')));
  renderCard(); updateFrameCap();
  { const pv=document.getElementById('pcPrev'), nx=document.getElementById('pcNext');
    if(pv) pv.onclick=()=>setFramePreview(previewIdx-1);
    if(nx) nx.onclick=()=>setFramePreview(previewIdx+1);
    document.addEventListener('keydown',(e)=>{
      const t=e.target; if(t && /^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)) return;
      if(e.key==='ArrowLeft'){ setFramePreview(previewIdx-1); e.preventDefault(); }
      else if(e.key==='ArrowRight'){ setFramePreview(previewIdx+1); e.preventDefault(); }
    });
  }

  // TITLE
  { const tm=document.getElementById('czTitleManage');
    if(tm) tm.onclick=()=>{ if(window.hkProSheet) window.hkProSheet('Custom title'); }; }
  const titlesEl=document.getElementById('czTitles');
  const czCustomWrap=document.getElementById('czCustomWrap');
  const czCustomIn=document.getElementById('czCustomTitle');
  const czCustomSave=document.getElementById('czCustomSave');
  const czCustomMsg=document.getElementById('czCustomMsg');
  /* r393 (Wolf #79): live-validate the custom title against hkSafeTitle. The card's title-notch
     render lands in a later round; picking/typing persists through hkFlairPack now. */
  function czValidateTitle(){
    if(!czCustomIn) return {ok:false};
    const raw=czCustomIn.value;
    const v=(window.hkSafeTitle?window.hkSafeTitle(raw):{ok:false,reason:'unavailable',clean:''});
    if(czCustomMsg){ czCustomMsg.textContent = raw.trim() ? (v.ok?'looks good ✓':v.reason) : '';
      czCustomMsg.style.color = v.ok ? 'var(--accent)' : 'var(--warn)'; }
    if(czCustomSave) czCustomSave.disabled = !v.ok;
    return v;
  }
  function czCommitTitle(){
    const v=czValidateTitle(); if(!v.ok) return;
    loadout.customTitle=v.clean; loadout.title=null;
    if(titlesEl) titlesEl.querySelectorAll('.cz-chip').forEach(x=>x.classList.toggle('on', x.dataset.pro==='1'));
    saveFlair(); flash();
    if(czCustomMsg){ czCustomMsg.textContent='saved ✓'; czCustomMsg.style.color='var(--accent)'; }
  }
  if(czCustomIn){ czCustomIn.oninput=czValidateTitle;
    czCustomIn.onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); czCommitTitle(); } }; }
  if(czCustomSave) czCustomSave.onclick=czCommitTitle;
  if(loadout.customTitle) czValidateTitle();   // pre-fill state on open
  if(titlesEl) titlesEl.querySelectorAll('.cz-chip').forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.locked==='1') return;
      if(b.dataset.pro==='1'){
        // CUSTOM: unlocked (beta/PRO) → reveal the safe input; otherwise the PRO upsell
        if(betaOpen){
          if(czCustomWrap) czCustomWrap.hidden=false;
          titlesEl.querySelectorAll('.cz-chip').forEach(x=>x.classList.toggle('on', x===b));
          if(czCustomIn){ czCustomIn.focus(); czValidateTitle(); }
        } else if(window.hkProSheet){ try{ window.hkProSheet('Custom title'); }catch(e){} }
        return;
      }
      // predefined title — switching away from custom clears it + hides the input
      loadout.title = b.dataset.title || null;
      loadout.customTitle = null;
      if(czCustomWrap) czCustomWrap.hidden=true;
      titlesEl.querySelectorAll('.cz-chip').forEach(x=>x.classList.toggle('on', (x.dataset.title||'')===(loadout.title||'')));
      saveFlair(); flash();
    };
  });

  // SHOW ON CARD
  const showEl=document.getElementById('czShow');
  if(showEl) showEl.querySelectorAll('.cz-pill').forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.show;
      const nv=!showState(k);
      b.classList.toggle('on', nv);
      if(k==='school'){ prof.show_school=nv;
        try{ if(sb&&me) sb.from('profiles').update({show_school:nv}).eq('id',me.id); }catch(e){}
      } else { loadout.show[k]=nv; saveFlair(); }
      renderCard(); flash();
    };
  });

  // FEATURED MEDALS — 5 showcase slots + a click-to-open, rarity-filtered picker
  if(medalsOK){
    const slotsEl=document.getElementById('czSlots');
    const picker=document.getElementById('czPicker');
    const cnt=document.getElementById('czFeatCount');
    let pickerFilter='all';
    function refreshMedals(){
      if(slotsEl) slotsEl.innerHTML=medalSlotsHtml();
      if(picker) picker.innerHTML=medalPickerHtml(pickerFilter);
      if(cnt) cnt.textContent=feat.length+' / 5';
      wireSlots(); wirePicker();
      renderCard();
    }
    function toggleFeat(id){
      if(!id) return;
      if(feat.includes(id)) feat=feat.filter(x=>x!==id);
      else { if(feat.length>=5) feat.shift(); feat.push(id); }
      saveFeat(); refreshMedals(); flash();
    }
    function openPicker(){ if(picker){ picker.hidden=false; try{ picker.scrollIntoView({behavior:'smooth',block:'nearest'}); }catch(e){} } }
    function wireSlots(){
      if(!slotsEl) return;
      slotsEl.querySelectorAll('.cz-slot').forEach(s=>{
        s.onclick=(ev)=>{
          const x = ev.target.closest ? ev.target.closest('.cz-slotx') : null;
          if(x){ ev.stopPropagation(); const id=s.dataset.ach; if(id){ feat=feat.filter(v=>v!==id); saveFeat(); refreshMedals(); flash(); } return; }
          openPicker();
        };
      });
    }
    function wirePicker(){
      if(!picker) return;
      picker.querySelectorAll('.cz-fchip').forEach(c=>{ c.onclick=()=>{ pickerFilter=c.dataset.filter; refreshMedals(); openPicker(); }; });
      picker.querySelectorAll('.cz-med.earned').forEach(b=>{ b.onclick=()=>toggleFeat(b.dataset.ach); });
    }
    wireSlots(); wirePicker();
  }

  // HIGHLIGHT STATS
  const statsEl=document.getElementById('czStats');
  const statCnt=document.getElementById('czStatCount');
  if(statsEl) statsEl.querySelectorAll('.cz-statchip').forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.stat;
      if(loadout.stats.includes(k)) loadout.stats=loadout.stats.filter(x=>x!==k);
      else { if(loadout.stats.length>=5) loadout.stats.shift(); loadout.stats.push(k); }
      statsEl.querySelectorAll('.cz-statchip').forEach(x=>x.classList.toggle('on', loadout.stats.includes(x.dataset.stat)));
      if(statCnt) statCnt.textContent=loadout.stats.length+' / 5';
      renderCard(); saveFlair(); flash();
    };
  });

  // BETA UNLOCK — password opens every skin + title for friends during beta
  { const bt=document.getElementById('czBeta');
    if(bt) bt.onclick=()=>{
      if(betaOpen) return;
      const pw=window.prompt('Beta access code:');
      if(pw==null) return;
      if(pw.trim().toLowerCase()==='chicagosux'){
        try{ localStorage.setItem('hk_beta_unlock','1'); }catch(e){}
        location.reload();
      } else { bt.innerHTML=window.hkIcon('lock')+' wrong code'; setTimeout(()=>{ bt.innerHTML=window.hkIcon('unlock')+' Beta: unlock everything'; }, 1600); }
    };
  }

  // deep-link — jump to the featured medals showcase
  if(location.hash==='#showcase'){
    const m=document.getElementById('czMedals');
    if(m) requestAnimationFrame(()=>m.scrollIntoView({behavior:'smooth', block:'center'}));
  }
}
load();
</script>
</body>
</html>
