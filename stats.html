<style>
  html{scrollbar-gutter:stable}   /* r68: content filters change page height — without this the centered wrap jumps horizontally */
  :root{
    --bg:#292b31; --surface:#383b42; --surface2:#43474f; --line:#5a5e68;
    --text:#f0f1ec; --muted:#a8adb3; --faint:#767d87;
    --accent:#6ec9a0; --accent-dim:#4a8f72; --accent-glow:rgba(110,201,160,.2);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:1180px;   /* r66: = game space */
  }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}
  header.head{padding:12px 0 10px}   /* r67: flush with the game box */
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px; margin-bottom:4px}
  .sub{font-size:15px; color:var(--muted)}
  main{padding-bottom:80px}
  /* r269 (Wolf): same visual organization as the leaderboard top — a "your card" panel
     beside the headline numbers, one hero row */
  .hero{display:grid; grid-template-columns:minmax(280px,1fr) minmax(0,1.7fr); gap:16px; margin:22px 0; align-items:stretch}
  .hero.solo{grid-template-columns:1fr}
  .cards{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin:0}
  .hero.solo .cards{grid-template-columns:repeat(4,1fr)}
  @media(max-width:820px){ .hero{grid-template-columns:1fr} .hero.solo .cards{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:680px){ .cards{grid-template-columns:repeat(2,1fr)} }
  .stat{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px 20px}
  /* r382 (Wolf: dead horizontal middles): .grid had NO rule — the LIFETIME tiles fell
     into block flow as four full-width single-stat strips. Quarter cards now, 2-up
     under 820px; sections that want one column (certificate tracks) set it inline. */
  .grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
  .stat .num{font-family:var(--mono); font-size:24px; font-weight:700; color:var(--text)}
  @media(max-width:820px){ .grid{grid-template-columns:repeat(2,1fr)} }
  .stat .big{font-family:var(--mono); font-size:26px; font-weight:700; color:var(--text)}
  .stat .big em{font-style:normal; font-size:14px; color:var(--muted)}
  .stat .lbl{font-family:var(--mono); font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:1.2px; margin-top:4px}
  .stat.lead{border-color:var(--accent-dim); background:var(--surface)}   /* r62 flat */
  /* r135: achievements live HERE now (rolled off the card); earned medals are pickable */
  .ach-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:12px 8px; margin:10px 0 18px}
  /* r267: wall navigation — filter chips (58 medals was one undifferentiated wall) */
  .ach-filters{display:inline-flex; gap:6px; margin-left:14px; vertical-align:2px}
  .ach-f{font-family:var(--mono); font-size:10.5px; padding:3px 10px; border-radius:99px; cursor:pointer;
    background:var(--surface); color:var(--muted); border:1px solid var(--line)}

  .ach-f.on{color:var(--on-accent,#fff); background:var(--accent); border-color:var(--accent)}
  .ach-grid[data-f="earned"] .ach-pick:not([data-state="earned"]),
  .ach-grid[data-f="prog"]   .ach-pick:not([data-state="prog"]),
  .ach-grid[data-f="locked"] .ach-pick:not([data-state="locked"]){display:none}
  .ach-pick{position:relative; display:flex; flex-direction:column; align-items:center; gap:4px;
    font-family:var(--mono); font-size:8.5px; color:var(--faint); text-align:center; line-height:1.25;
    padding:8px 2px 6px; border-radius:10px; border:1px solid transparent}
  .ach-pick.earned{color:var(--muted); cursor:pointer}
  .ach-pick.earned:hover{background:var(--surface2); border-color:var(--line)}
  .ach-pick.feat{border-color:var(--accent-dim); background:var(--accent-glow)}
  .ach-pick .st{position:absolute; top:3px; right:5px; font-size:10px; color:var(--warn); display:none}
  .ach-pick.feat .st{display:block}
  .ach-pick i{position:absolute; top:32px; right:8px; font-style:normal; font-size:7.5px; color:var(--faint);
    background:var(--surface2); border:1px solid var(--line); border-radius:6px; padding:0 3px}
  /* r293 (Wolf): rarity tag under earned rare+ medals so the wall reads rare-vs-common at a glance */
  .ach-pick .rr{font-family:var(--mono); font-size:7px; letter-spacing:.09em; font-weight:700;
    padding:0 4px; border-radius:6px; border:1px solid currentColor; opacity:.92; margin-top:1px}
  .ach-hint{font-family:var(--mono); font-size:11px; color:var(--muted); margin:2px 0 8px}
  .section-title{font-family:var(--mono); font-size:13px; color:var(--muted); text-transform:uppercase;
    letter-spacing:1.5px; margin:26px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line)}
  .drow{display:grid; grid-template-columns:1fr 92px 92px 110px; gap:14px; align-items:center;
    padding:11px 18px; background:var(--surface); border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
    font-family:var(--mono); font-size:13px}
  .drow .nm{font-family:var(--sans); font-weight:600; font-size:14px}
  .drow .grp{display:block; font-family:var(--mono); font-size:10px; color:var(--faint); text-transform:uppercase; letter-spacing:.8px}
  .drow .pb{text-align:right; font-weight:700}
  .drow .eff{text-align:right; color:var(--muted)}
  .drow .eff b{color:var(--accent)}
  .drow.untried{opacity:.45}
  .drow .bar{grid-column:1/-1; height:3px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-top:-2px}
  .drow .bar i{display:block; height:100%; background:var(--accent); border-radius:99px}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:36px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); line-height:1.7}
  .state a{color:var(--accent); border-bottom:1px solid var(--accent-dim)}
  /* r384 (Wolf: signed-out looked like a stats dashboard): the anon view leads with the
     .state sign-in placeholder + real CTAs (the account-page pattern, incl. its r297/r355
     specificity fixes so the labels stay legible in every theme); any local-PB tiles that
     follow are captioned as THIS DEVICE's data. */
  .acc-cta{display:inline-block; font-family:var(--mono); font-size:13px; text-decoration:none;
    border:1px solid var(--accent); background:var(--accent); color:var(--on-accent,#0c0d0e); font-weight:700;
    padding:10px 22px; border-radius:999px; margin:4px 6px}
  .acc-cta:hover{filter:brightness(1.08)}
  .acc-cta.ghost{background:transparent; color:var(--accent); border-color:var(--accent-dim); font-weight:500}
  .state a.acc-cta{border-bottom:1px solid var(--accent); color:var(--on-accent,#0c0d0e)}
  .state a.acc-cta.ghost{border-bottom:1px solid var(--accent-dim); color:var(--accent)}
  .local-cap{font-family:var(--mono); font-size:10.5px; color:var(--faint); text-transform:uppercase;
    letter-spacing:.12em; margin:18px 0 0}
  .loading{font-family:var(--mono); font-size:13px; color:var(--muted); text-align:center; padding:40px}
</style>

<script>
const D = window.HOTKEY_DRILLS;
const fmtS = ms => (ms/1000).toFixed(2)+'s';
/* r272 — semantic shortcut units (mirror of index.html's chordifyLog; keep in sync):
   alt-ribbon runs as one chord, ctrl chords as logged, functions from typed formulas. */
function isChordUnit(k){
  return /^alt( [a-z0-9]){1,6}$/.test(k) || /\(\)$/.test(k) || /^F[0-9]+$/.test(k) || /^Ctrl\+/.test(k);
}
function chordifyLog(log){
  const out=[]; let i=0;
  while(i<log.length){
    const k=String(log[i]||'');
    if(k==='Alt'){ let j=i+1; const seq=[];
      while(j<log.length && seq.length<6 && /^[a-z0-9]$/i.test(String(log[j]||''))){ seq.push(String(log[j]).toLowerCase()); j++; }
      if(seq.length) out.push('alt '+seq.join(' '));
      i=j; continue; }
    if(k==='='){ let j=i+1, buf='=';
      while(j<log.length){ const c=String(log[j]||'');
        if(c==='\u21b5'||c==='Tab'||c==='Esc') break;
        if(c.length===1) buf+=c; j++; }
      (buf.toUpperCase().match(/[A-Z][A-Z0-9]*\(/g)||[]).forEach(fn=>out.push(fn.slice(0,-1)+'()'));
      i=j; continue; }
    if(/^Ctrl\+/.test(k) || /^F[0-9]+$/.test(k)) out.push(k);
    i++;
  }
  return out;
}
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load(){
  const root=document.getElementById('root');
  let me=null;
  try{ const { data:{ session } } = await sb.auth.getSession(); me = session ? session.user : null; }catch(e){}

  // local PBs always available (anon-friendly)
  let localPB={};
  try{ localPB = JSON.parse(localStorage.getItem('hotkey_pb')||'{}'); }catch(e){}

  let mine=[], all=[];
  if(sb && me){
    try{
      const r = await sb.from('runs').select('user_id,challenge,time_ms,keystrokes,optimal,created_at').eq('mouse_used',false).order('time_ms',{ascending:true});
      all = r.data||[];
      mine = all.filter(x=>x.user_id===me.id);
    }catch(e){}
  }
  // r273: the ACCOUNT-side analytics aggregate — primary source when signed in;
  // localStorage stays the guest/offline cache
  let srvKeys=null;
  if(sb && me){ try{ const {data}=await sb.from('key_stats').select('counts,keys_lifetime').eq('user_id',me.id).maybeSingle();
    if(data && data.counts && Object.keys(data.counts).length) srvKeys=data; }catch(e){} }

  // headline numbers — posted runs if signed in, else local PBs
  const drilled = new Set(mine.map(x=>x.challenge).filter(k=>D.meta[k]));
  Object.keys(localPB).forEach(k=>{ if(D.meta[k]) drilled.add(k); });
  const totalRuns = mine.length;
  let bestKps=0, effSum=0, effN=0;
  mine.forEach(x=>{
    if(x.time_ms>0 && x.keystrokes>0) bestKps=Math.max(bestKps, x.keystrokes/(x.time_ms/1000));
    if(x.keystrokes>0 && x.optimal>0){ effSum += Math.min(1, x.optimal/x.keystrokes); effN++; }
  });
  const avgEff = effN ? Math.round(100*effSum/effN) : null;

  let streakN=0; try{ const s=JSON.parse(localStorage.getItem('hotkey_streak')||'{}'); streakN=s.n||0; }catch(e){}

  // r135: featured-achievement picks — server copy wins when signed in
  let feat=[]; try{ feat=JSON.parse(localStorage.getItem('hk_feat_ach')||'[]'); }catch(e){}
  if(sb && me){ try{
    const {data:pr}=await sb.from('profiles').select('featured_ach').eq('id',me.id).maybeSingle();
    if(pr && pr.featured_ach!=null){ feat=String(pr.featured_ach).split(',').filter(Boolean);
      localStorage.setItem('hk_feat_ach', JSON.stringify(feat)); }
  }catch(e){} }

  // title-card strip: emblem + tier + level, from shared HK_RANK helpers
  let tcHtml='';
  if(me && window.HK_RANK){
    const st = window.HK_RANK.standing(all, me.id, D.menuOrder);
    const tier = window.HK_RANK.tierOf(st.avgPct, st.att, st.wsum);
    // r302 (Wolf): write-through — the freshest computed tier updates the shared nav-pill
    // cache, so the top bar can never disagree with the page you're looking at
    try{ sessionStorage.setItem('hk_rank3', JSON.stringify({n:tier.name,c:tier.cls,exp:Date.now()+6e5}));
      if(window.navRefreshAuth){} const rp=document.getElementById('navRankPill');
      if(rp){ rp.innerHTML=(window.rankEmblem?window.rankEmblem(tier.name,20):'')+'<span>'+tier.name+'</span>';
        rp.className='pc-tier '+tier.cls+' topnav-rank'; rp.style.display='inline-flex'; } }catch(e){}
    let mySes=[]; try{ const se=await sb.from('sessions').select('user_id,mode').eq('user_id', me.id); mySes=se.data||[]; }catch(e){}
    const plBoards = window.HK_RANK.boardCounts ? window.HK_RANK.boardCounts(all, me.id, D.menuOrder) : st;
    const xp = window.HK_RANK.computeXP(mine, plBoards, mySes);   /* r371: full signature — board bonuses + sessions, same as nav/lb */
    const L = window.HK_RANK.levelOf(xp);
    /* r269: same card the leaderboard hero deals — tier pill, level bar, trophy line */
    tcHtml = `<div class="panel me"><h4>your card</h4>`+
      `<div class="yc-top"><span class="pc-tier ${tier.cls}" style="display:inline-flex;align-items:center">${window.rankEmblem?window.rankEmblem(tier.name,28,tier.bucket):''}<span>${tier.full||tier.name}</span></span>`+
      `<span class="yc-lvl">LVL ${L.lvl}</span><span class="yc-bar"><i style="width:${L.pct}%"></i></span>`+
      `<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${L.into}/${L.need} xp</span></div>`+
      `<div style="font-family:var(--mono);font-size:12.5px;color:var(--muted)">${st.crowns} crown${st.crowns===1?'':'s'} \u00b7 ${st.pod} podium${st.pod===1?'':'s'} \u00b7 ${st.att}/${D.menuOrder.length} boards</div>`+
      `<div class="yc-next" style="margin-top:auto">defend them on <a href="leaderboard.html" style="color:var(--accent)">the boards \u2192</a> \u00b7 <a href="account.html" style="color:var(--accent)">account \u2192</a></div></div>`;
  }
  /* r293 (Wolf): TIME SAVED — the professional's core metric, same methodology as the
     desk report: your first recorded time vs your current best on each re-drilled task,
     summed. Server runs when signed in (created_at ordering), local history otherwise. */
  let savedMs=0;
  try{
    const firstBy={}, bestBy={};
    let src2=[];
    if(mine.length){ src2=mine.slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).map(r=>({d:r.challenge, t:r.time_ms})); }
    else{ src2=JSON.parse(localStorage.getItem('hk_runs_lite')||'[]').map(r=>({d:r.d, t:r.time_ms})).filter(r=>r.d); }
    src2.forEach(r=>{ if(firstBy[r.d]===undefined) firstBy[r.d]=r.t;
      if(bestBy[r.d]===undefined||r.t<bestBy[r.d]) bestBy[r.d]=r.t; });
    Object.keys(firstBy).forEach(d=>{ const s=firstBy[d]-bestBy[d]; if(s>0) savedMs+=s; });
  }catch(e){}
  const savedTxt = savedMs<=0 ? '\u2014'
    : savedMs<60000 ? (savedMs/1000).toFixed(0)+'<em>s</em>'
    : savedMs<3600000 ? Math.round(savedMs/60000)+'<em>m</em>'
    : Math.floor(savedMs/3600000)+'<em>h</em> '+Math.round((savedMs%3600000)/60000)+'<em>m</em>';
  const cardsHtml = `<div class="cards">
    <div class="stat lead"><div class="big">${savedTxt}</div><div class="lbl">time banked \u2014 first try vs best</div></div>
    <div class="stat"><div class="big">${drilled.size}<em> / ${D.menuOrder.length}</em></div><div class="lbl">drills on your board</div></div>
    <div class="stat"><div class="big">${avgEff!==null?avgEff+'<em>%</em>':'—'}</div><div class="lbl">avg keys vs optimal path</div></div>
    <div class="stat"><div class="big">${streakN?'🔥 '+streakN:'—'}</div><div class="lbl">day streak</div></div>
  </div>`;
  /* r384 (Wolf): signed-out leads with the sign-in placeholder, not a dashboard.
     Local practice tiles only render when this device actually holds some, under a
     THIS-DEVICE caption; a fresh anon visitor gets the placeholder alone. No rank
     renders anywhere on the anon path (the title card is signed-in only). */
  let html = '';
  if(!me){
    const hasLocal = drilled.size>0 || streakN>0 || savedMs>0;
    html += `<div class="state" style="margin:22px 0 16px">Sign in to see your stats — ranks, run history, efficiency, and the ladder all live on your account.<br><br>`+
      `<a class="acc-cta" href="index.html?openAuth=signin">Sign in</a>`+
      `<a class="acc-cta ghost" href="index.html?openAuth=signup">Create an account</a></div>`;
    if(hasLocal){
      html += `<div class="local-cap">this device only — local practice, not posted to an account</div>`+
        `<div class="hero solo" style="margin-top:8px">${cardsHtml}</div>`;
    }
  } else {
    html += `<div class="hero${tcHtml?'':' solo'}">` + tcHtml + cardsHtml + `</div>`;
  }

  // ================= r135/r138: ACHIEVEMENTS — prominent, tipped, rarity-tiered =================
  // Earned medals are clickable — pick up to 3 to SHOWCASE on your player card.
  // r138: instant data-tip overlays (name · what it is · global rarity), computed
  // Steam-style from every player's runs. r384 (Wolf): ONE color axis — glyphs are
  // uniform engraved steel (themes.js hkBadge); the outer RING alone carries rarity,
  // colors from the shared window.HK_RARITY map (common green · rare blue · epic
  // purple · legendary orange · mythic red — the hand-set 'm' class keeps its
  // ornate ring + crest crown).
  try{
    const AC=window.HOTKEY_ACHIEVEMENTS;
    if(AC && window.hkBadge){
      let solvesN=0; try{ solvesN=parseInt(localStorage.getItem('hotkey_solves')||'0',10)||0; }catch(e){}
      let runsL=mine.length?mine:[]; if(!runsL.length){ try{ runsL=JSON.parse(localStorage.getItem('hk_runs_lite')||'[]'); }catch(e){} }
      let flags={}; try{ flags=JSON.parse(localStorage.getItem('hk_ach_flags')||'{}'); }catch(e){}
      const pbCtx={...localPB};
      mine.forEach(r=>{ const t=r.time_ms/1000; if(pbCtx[r.challenge]===undefined||t<pbCtx[r.challenge]) pbCtx[r.challenge]=t; });
      let crowns=0;
      if(me && all.length){ const seen={};
        all.forEach(r=>{ if(!D.meta[r.challenge]) return; if(seen[r.challenge]) return; seen[r.challenge]=r.user_id; });
        crowns=Object.values(seen).filter(u=>u===me.id).length; }
      const groups={}; Object.entries(D.groupOf).forEach(([k,g])=>{(groups[g]=groups[g]||[]).push(k);});
      let __ck=0, __kl=0; try{ const kc=(srvKeys&&srvKeys.counts) || JSON.parse(localStorage.getItem('hk_key_counts')||'{}');
        __ck=Object.keys(kc).filter(isChordUnit).length;   // r272: semantic units · r273: account-first
        __kl=Math.max((srvKeys&&srvKeys.keys_lifetime)||0,
          parseInt(localStorage.getItem('hk_keys_lifetime')||'0',10) || Object.values(kc).reduce((a,b)=>a+(b|0),0)); }catch(e){}
      const ctx={ pb:pbCtx, pars:window.HOTKEY_PARS||{}, runs:runsL, streak:streakN, solves:solvesN,
        mouseRuns:flags.mouseRuns||0, slowWins:flags.slowWins||0,
        nightWin:!!flags.nightWin, dawnWin:!!flags.dawnWin, weekendWin:!!flags.weekendWin,
        raceWins:flags.raceWins||0, sheetClears:flags.sheetClears||0, frzBanked:flags.frzBanked||0,
        chordKinds:__ck, keysLifetime:__kl, dailyTop10:flags.dailyTop10||0,   // r150/r151 · r371
        dailyPod:flags.dailyPod||0, dailyWins:flags.dailyWins||0, certs:Object.keys(flags.certTracks||{}).length,
        /* r376: mythic-class keys — beta-era account + the packed rank latch + the S+++ desk latch */
        charter:!!(me && me.created_at && String(me.created_at) < '2026-10-01'),
        tierBest:flags.tierBest|0, tierBestBucket:flags.tierBestBucket|0, deskPeak:flags.deskPeak||0,
        crowns, att:drilled.size, menuOrder:D.menuOrder, groups };
      // global rarity (Steam-style): evaluate run-derivable achievements for every player
      const globalPct=(function(){
        try{
          if(!all.length) return {};
          const byUser={}; all.forEach(r=>{ (byUser[r.user_id]=byUser[r.user_id]||[]).push(r); });
          const uids=Object.keys(byUser); if(uids.length<2) return {};
          const PARS2=window.HOTKEY_PARS||{}; const out={};
          const perBoard={}; { const seen={};
            all.forEach(r=>{ if(!D.meta[r.challenge]) return; const k2=r.challenge;
              if(!perBoard[k2]) perBoard[k2]=[]; const kk=k2+'|'+r.user_id;
              if(!seen[kk]){ seen[kk]=1; perBoard[k2].push(r.user_id); } }); }
          uids.forEach(u=>{
            const runs=byUser[u]; const best={}; const days=new Set();
            runs.forEach(r=>{ const ch=r.challenge;
              if(best[ch]===undefined||r.time_ms<best[ch]) best[ch]=r.time_ms;
              if(r.created_at) days.add(String(r.created_at).slice(0,10)); });
            const pbU={}; Object.keys(best).forEach(k2=>pbU[k2]=best[k2]/1000);
            const ds=[...days].sort(); let streakU=ds.length?1:0, cur=1;
            for(let i=1;i<ds.length;i++){ const gap=(new Date(ds[i])-new Date(ds[i-1]))/86400000;
              cur = gap===1 ? cur+1 : 1; if(cur>streakU) streakU=cur; }
            let crownsU=0; D.menuOrder.forEach(k2=>{ const b=perBoard[k2]||[]; if(b.length&&b[0]===u) crownsU++; });
            const attU=D.menuOrder.filter(k2=>pbU[k2]!==undefined).length;
            const ctxU={ pb:pbU, pars:PARS2, runs, streak:streakU, solves:runs.length, crowns:crownsU, att:attU, menuOrder:D.menuOrder, groups };
            AC.forEach(a=>{ let ru; try{ ru=a.test(ctxU); }catch(e){ ru={done:false}; }
              if(ru.done) out[a.id]=(out[a.id]||0)+1; });
          });
          Object.keys(out).forEach(k2=>out[k2]=Math.round(100*out[k2]/uids.length));
          AC.forEach(a=>{ if(out[a.id]===undefined) out[a.id]=0; });
          out.__n=uids.length;   // r150: field size gates whether the % means anything
          return out;
        }catch(e){ return {}; }
      })();
      let earnedN=0; const cells=[];
      AC.forEach((a,ord)=>{ let r; try{ r=a.test(ctx); }catch(e){ r={done:false,prog:0,goal:1}; }
        if(r.done) earnedN++;
        const isFeat=r.done && feat.includes(a.id);
        /* r150: EFFECTIVE rarity \u2014 static difficulty tier is the display floor until
           the field is big enough (>=20 players) for the live % to mean anything */
        const __fN=globalPct.__n||0;
        const gp=window.hkEffRarity?window.hkEffRarity(a.tier, globalPct[a.id], __fN):globalPct[a.id];
        const tierW=(window.hkRarityTier?window.hkRarityTier(gp):null);
        const rm=(window.hkRarityMeta?window.hkRarityMeta(gp):{abbr:'',color:'var(--warn)',weight:3});
        const rareTxt=(__fN>=20 && globalPct[a.id]!==undefined)
          ? (' \u00b7 '+(tierW?tierW.toUpperCase()+' \u2014 ':'')+globalPct[a.id]+'% of players have this')
          : (tierW?' \u00b7 '+tierW.toUpperCase():'');
        const __state=r.done?'earned':((r.prog||0)>0?'prog':'locked');
        // r293 (Wolf): a rarity tag under earned rare+ medals + rarity-ordered wall
        const rlabel=(r.done && rm.abbr) ? '<span class="rr" style="color:'+rm.color+'">'+rm.abbr+'</span>' : '';
        const cellHtml='<span class="ach-pick'+(r.done?' earned':'')+(isFeat?' feat':'')+'" data-ach="'+a.id+'" data-state="'+__state+'" data-rarity="'+(tierW||'common')+'"'+
          ' data-tip="'+esc(a.name)+' \u2014 '+esc(a.desc)+(r.done?' \u2713 EARNED':' \u00b7 '+(r.prog||0)+'/'+(r.goal||1))+rareTxt+(r.done?' \u00b7 click to showcase':'')+'">'+
          '<span class="st">\u2605</span>'+
          window.hkBadge(a.glyph, r.done, 40, null, r.done?gp:undefined)+
          (r.done?'':'<i>'+Math.min(99,Math.round(100*(r.prog||0)/(r.goal||1)))+'%</i>')+
          esc(a.name)+rlabel+'</span>';
        // earned float to the top, then rarest-first, then catalog order
        cells.push({ html:cellHtml, sort:(r.done?0:1000)+rm.weight*100+ord });
      });
      cells.sort((x,y)=>x.sort-y.sort);
      const grid=cells.map(c=>c.html).join('');
      html += '<h3 class="section-title" id="achievements" style="margin-top:10px">Achievements <span style="color:var(--faint)">'+earnedN+' / '+AC.length+'</span>'+
        '<span class="ach-filters">'+
          '<button class="ach-f on" data-f="all">all</button>'+
          '<button class="ach-f" data-f="earned">earned</button>'+
          '<button class="ach-f" data-f="prog">in progress</button>'+
          '<button class="ach-f" data-f="locked">locked</button>'+
        '</span></h3>'+
        '<div class="ach-hint">medals sort rarest-first \u00b7 click an earned one to <b style="color:var(--warn)">\u2605 showcase</b> it on your player card \u00b7 up to 3 (oldest pick swaps out)'+(me?'':' \u00b7 sign in to show them on the boards')+
        /* r376: legend rides the shared HK_RARITY map \u2014 same colors the badge rings wear */
        (function(){ const RC=window.HK_RARITY||{};
          return '<br>ring = rarity: <b style="color:'+RC.c+'">COMMON</b> \u00b7 <b style="color:'+RC.r+'">RARE</b> (\u226425% of players) \u00b7 <b style="color:'+RC.e+'">EPIC</b> (\u226410%) \u00b7 <b style="color:'+RC.l+'">LEGENDARY</b> (\u22643%) \u00b7 <b style="color:'+RC.m+'">MYTHIC</b> (the rarest handful)</div>'; })()+
        '<div class="ach-grid">'+grid+'</div>';
    }
  }catch(e){}

  // WEAK-DRILL NUDGE + insights (signed-in, ranked data available)
  if(me && window.HK_RANK){
    const st2 = window.HK_RANK.standing(all, me.id, D.menuOrder);
    let worst=null, bestD=null;
    D.menuOrder.forEach(k=>{
      const board=st2.per[k]; const idx=board.findIndex(r=>r.user_id===me.id);
      if(idx<0) return;
      const pct=idx/board.length;
      if(!worst||pct>worst.pct) worst={k,pct,idx,n:board.length};
      if(!bestD||pct<bestD.pct) bestD={k,pct,idx,n:board.length};
    });
    if(worst && worst.pct>0){
      html += `<div class="stat" style="grid-column:1/-1;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-color:var(--warn);margin:2px 0 6px">`+
        `<span style="font-size:20px">\ud83c\udfaf</span>`+
        `<div style="flex:1;min-width:200px"><div style="font-family:var(--mono);font-size:13px">Your weakest board: <b>${esc(D.labelOf[worst.k]||worst.k)}</b> \u2014 #${worst.idx+1} of ${worst.n} (top ${Math.max(1,Math.round(worst.pct*100))}%)</div>`+
        `<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">one clean run there moves your average more than anywhere else</div></div>`+
        `<a href="index.html?drill=${worst.k}" style="font-family:var(--mono);font-size:12px;color:var(--accent);border:1px solid var(--accent-dim);border-radius:999px;padding:8px 16px">run it \u2192</a></div>`;
    }
    /* r150 (Wolf: "what is pace based on?") — strongest board gets its numbers, and
       pace is now DEFINED on the page: time ÷ par, so runs on different drills
       compare honestly. Plus keys/min so raw hand speed has its own dial. */
    if(bestD){
      const board=st2.per[bestD.k]||[];
      const mineRow=board[bestD.idx], leadRow=board[0];
      const gapTxt=(bestD.idx>0 && leadRow && mineRow)?(' \u00b7 +'+((mineRow.time_ms-leadRow.time_ms)/1000).toFixed(2)+'s off #1'):(bestD.idx===0?' \u00b7 you lead it':'');
      // r267: the strongest board gets the same card treatment as the weakest — the two used to be
      // a boxed callout + a floating text line, which read as an accident rather than a pair
      html += `<div class="stat" style="grid-column:1/-1;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-color:var(--accent-dim);margin:0 0 6px">`+
        `<span style="font-size:20px">\ud83c\udfc6</span>`+
        `<div style="flex:1;min-width:200px"><div style="font-family:var(--mono);font-size:13px">Your strongest board: <b style="color:var(--accent)">${esc(D.labelOf[bestD.k]||bestD.k)}</b> \u2014 #${bestD.idx+1} of ${bestD.n} (top ${Math.max(1,Math.round((bestD.idx+1)/bestD.n*100))}%)</div>`+
        `<div style="font-family:var(--mono);font-size:11px;color:var(--muted)">${mineRow?'your best '+(mineRow.time_ms/1000).toFixed(2)+'s':''}${gapTxt}</div></div>`+
        `<a href="index.html?drill=${bestD.k}" style="font-family:var(--mono);font-size:12px;color:var(--accent);border:1px solid var(--accent-dim);border-radius:999px;padding:8px 16px">defend it \u2192</a></div>`;
    }
  }
  // r150: PACE = time vs par (each point is one run's time ÷ that drill's par) —
  // the old raw-seconds line mixed 30s drills with 190s builds and read as noise.
  if(mine.length>=3){
    const PARS3=window.HOTKEY_PARS||{};
    const recent=mine.slice().sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0))
      .filter(r=>PARS3[r.challenge]>0).slice(-15);
    if(recent.length>=3){
      const rs=recent.map(r=>(r.time_ms/1000)/PARS3[r.challenge]);
      const mn=Math.min(...rs,0.9), mx=Math.max(...rs,1.1), span=Math.max(.01,mx-mn);
      /* r382 (Wolf): W~panel width + preserveAspectRatio="none" — the default xMid
         scaling drew a 560px chart floating centered in a ~1090px panel */
      const W=1080,H=54;
      const y=v=>(6+(v-mn)/span*(H-12));
      const pts=rs.map((t,i)=>`${(i/(rs.length-1)*W).toFixed(1)},${y(t).toFixed(1)}`).join(' ');
      const med=rs.slice().sort((a,b)=>a-b)[Math.floor(rs.length/2)];
      const kpm=mine.filter(r=>r.time_ms>0&&r.keystrokes>0).map(r=>r.keystrokes/(r.time_ms/60000)).sort((a,b)=>a-b);
      const kpmMed=kpm.length?Math.round(kpm[Math.floor(kpm.length/2)]):null;
      html += `<div class="stat" style="grid-column:1/-1;margin-bottom:6px"><div class="lbl" style="margin:0 0 8px">pace \u00b7 time vs par \u00b7 last ${rs.length} runs — below the dashed line = under par`+
        `<span style="float:right;color:var(--muted)">median ${med.toFixed(2)}\u00d7 par${kpmMed?' \u00b7 '+kpmMed+' keys/min':''}</span></div>`+
        `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">`+
        `<line x1="0" y1="${y(1).toFixed(1)}" x2="${W}" y2="${y(1).toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="4 4" vector-effect="non-scaling-stroke"/>`+
        `<text x="4" y="${(y(1)-3).toFixed(1)}" fill="var(--faint)" font-size="8" font-family="var(--mono)">par</text>`+
        `<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`+
        `</svg>`+
        `<div style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:6px">how it's computed: each point = one posted run's time \u00f7 that drill's par, oldest \u2192 newest. keys/min = keystrokes \u00f7 minutes across posted runs (median).</div></div>`;
    }
  }
  // ---- Analytics (PRO \u00b7 free in beta): key frequency + speed by drill ----
  if(me && mine.length>=3){
    let traces=[];
    try{ const tr=await sb.from('runs').select('trace').eq('user_id',me.id).eq('mouse_used',false)
      .order('created_at',{ascending:false}).limit(40); traces=(tr.data||[]).map(x=>x.trace).filter(Boolean); }catch(e){}
    const chordFreq={};

      chordifyLog(seq).forEach(u=>{ chordFreq[u]=(chordFreq[u]||0)+1; }); });
    const top=Object.entries(chordFreq).sort((a,b)=>b[1]-a[1]).slice(0,12);

    {
      const totKeys=mine.reduce((a,r)=>a+(r.keystrokes||0),0);
      const totMs=mine.reduce((a,r)=>a+(r.time_ms||0),0);
      const distinctChords=Object.keys(chordFreq).length;
      const perDay={}; mine.forEach(r=>{ const d=String(r.created_at||'').slice(0,10); if(d) perDay[d]=(perDay[d]||0)+1; });
      const busiest=Object.entries(perDay).sort((a,b)=>b[1]-a[1])[0];
      const fmtT=ms=>{ const m=Math.floor(ms/60000); return m>=60? (Math.floor(m/60)+'h '+(m%60)+'m') : (m+'m '+Math.floor(ms%60000/1000)+'s'); };
      html += `<h3 class="section-title">Lifetime</h3><div class="grid" style="margin-bottom:6px">`+

        `<div class="stat"><div class="num">${busiest?busiest[1]:0}</div><div class="lbl">busiest day \u00b7 ${busiest?busiest[0]:'\u2014'}</div></div>`+

    const maxF=top.length?top[0][1]:1;

    mine.forEach(r=>{ if(r.time_ms>0&&r.keystrokes>0){ const v=r.keystrokes/(r.time_ms/1000);

    const kpsTop=Object.entries(kps).filter(([k])=>D.meta[k]).sort((a,b)=>b[1]-a[1]).slice(0,5);
    html += `<h3 class="section-title">Analytics <span class="proTag" style="float:right;font-size:9px;color:var(--warn);letter-spacing:1px;cursor:pointer" title="what comes with PRO">PRO \u00b7 free in beta</span></h3>`;
    // r91 MERGED PANEL: local tally (every clean run) is the primary source; posted-run

    let tEnts=Object.entries(tally).filter(([k])=>isChordUnit(k)).sort((a,b)=>b[1]-a[1]).slice(0,12);
    if(!tEnts.length) tEnts=top;   // fresh device + empty account: fall back to posted traces
    if(tEnts.length){
      const mxT=tEnts[0][1];
      html += `<div class="stat" style="grid-column:1/-1;margin-bottom:10px"><div class="lbl" style="margin:0 0 10px">your most-used chords &amp; functions \u00b7 ${tallySrc}</div>`;
      tEnts.forEach(([k,n])=>{ html += `<div style="display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;margin-bottom:5px">`+

        `<span style="flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden"><span style="display:block;height:100%;width:${Math.round(100*n/mxT)}%;background:var(--accent);border-radius:99px"></span></span>`+
        `<span style="color:var(--muted);min-width:36px;text-align:right">${n}</span></div>`; });
      html += `</div>`;
    }
    if(kpsTop.length){
      html += `<div class="stat" style="grid-column:1/-1;margin-bottom:10px"><div class="lbl" style="margin:0 0 10px">fastest hands \u00b7 keys per second by drill</div>`;
      kpsTop.forEach(([k,v])=>{ html += `<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding:4px 0"><span>${esc(D.labelOf[k]||k)}</span><b style="color:var(--accent)">${v.toFixed(1)} k/s</b></div>`; });

  }
  /* r367: the three certificate tracks get a progress module here — before this, the

  if(window.HK_TRACKS && window.HK_TRACKS.length){

      const pct=ks.length?Math.round(100*done/ks.length):0;

        `<div style="height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:8px"><span style="display:block;height:100%;width:${pct}%;background:var(--accent);border-radius:99px"></span></div></div>`;
    });
    html += `</div>`;
  }
  html += `<h3 class="section-title">Per-drill</h3>`;
  let lastG=null;
  D.menuOrder.forEach(k=>{
    const grp = D.groupOf[k]||'';
    if(grp!==lastG){ html+=`<div style="font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px">${esc(grp)}</div>`; lastG=grp; }
    const label = D.labelOf[k]||k;
    // my best posted run for this drill (mine[] is time-sorted)

    const pbLocal = localPB[k]!==undefined ? localPB[k]*1000 : null;

    if(pbMs==null){
      html += `<div class="drow untried"><span class="nm">${esc(label)}<span class="grp">${esc(grp)}</span></span><span class="pb">—</span><span class="eff">untried</span><span class="eff"></span></div>`;

    // rank among posted bests for this drill

    if(best){

      all.filter(x=>x.challenge===k).forEach(x=>{ if(!seen[x.user_id]){ seen[x.user_id]=true; board.push(x); } });
      const idx = board.findIndex(x=>x.user_id===me.id);

    } else rankTxt = 'local only';
    html += `<div class="drow"><span class="nm">${esc(label)}<span class="grp">${esc(grp)}</span></span>`+
      `<span class="pb">${fmtS(pbMs)}</span>`+
      `<span class="eff">${eff!==null?'<b>'+eff+'%</b> eff':'—'}</span>`+
      `<span class="eff">${rankTxt}</span>`+
      (eff!==null?`<span class="bar"><i style="width:${eff}%"></i></span>`:'')+
      `</div>`;
  });

  if(mine.length){
    const recent = mine.slice().sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)).slice(0,10);
    html += `<h3 class="section-title">Recent runs</h3>`;
    recent.forEach(r=>{
      const label = (D.labelOf[r.challenge]) || (r.challenge.indexOf('challenge-')===0?'\u25c6 daily challenge':(r.challenge.indexOf('daily-')===0?'\u26a1 daily':(r.challenge.indexOf('wk-')===0?'\ud83c\udfc1 gauntlet leg':r.challenge)));
      const when = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      html += `<div class="drow"><span class="nm">${esc(label)}</span><span class="pb">${fmtS(r.time_ms)}</span><span class="eff">${r.keystrokes||'\u2014'} keys</span><span class="eff">${when}</span></div>`;
    });
  }
  root.innerHTML = html;
  // r156: the analytics PRO tag opens the shared offer sheet
  document.querySelectorAll('.proTag').forEach(t=>t.onclick=()=>{ if(window.hkProSheet) window.hkProSheet('Deep analytics'); });
  // r267: achievements wall filters — chips set data-f on the grid; CSS does the hiding
  document.querySelectorAll('.ach-f').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation();
    document.querySelectorAll('.ach-f').forEach(x=>x.classList.toggle('on', x===b));
    const g=document.querySelector('.ach-grid'); if(g){ if(b.dataset.f==='all') g.removeAttribute('data-f'); else g.setAttribute('data-f', b.dataset.f); } });
  // wire the showcase picker (delegated once — root is re-rendered wholesale)
  try{
    const rootEl=document.getElementById('root');
    rootEl.addEventListener('click', async (ev)=>{
      const el=ev.target.closest ? ev.target.closest('.ach-pick.earned') : null;
      if(!el) return;
      const id=el.getAttribute('data-ach');
      if(feat.includes(id)) feat=feat.filter(x=>x!==id);
      else { if(feat.length>=3) feat.shift(); feat.push(id); }
      try{ localStorage.setItem('hk_feat_ach', JSON.stringify(feat)); }catch(e){}
      if(sb && me){ try{ await sb.from('profiles').update({featured_ach:feat.join(',')}).eq('id',me.id); }catch(e){} }
      document.querySelectorAll('.ach-pick').forEach(x=>x.classList.toggle('feat', feat.includes(x.getAttribute('data-ach')) && x.classList.contains('earned')));
    });
  }catch(e){}
}
load();
</script>
</body>
