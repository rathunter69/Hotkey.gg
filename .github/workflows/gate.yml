# r285 (#36) THE GATE, ON CI — the same suites every session runs before shipping,
# now enforced on every PR and push to main regardless of who (or what) edited.
# Suites: parity / onboard / replay / alt-paths / mac-input / echo, plus the
# drill-page drift check (regenerate + diff must be clean).
name: gate
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # r392: need history to diff the changed files for scope-gating
      # r392 (Wolf): PATH-BASED GATING. The heavy engine matrix (parity/onboard/replay/
      # alt-paths/mac-input/echo/rapid-fire/guided + drill-page drift) only runs when the
      # DRILL ENGINE could have changed — index.html, drills.js, the test harnesses, or the
      # workflow itself. Cosmetic-only pushes (themes.js / nav.* / other pages / css / md /
      # sql) skip it and run the fast SMOKE (every page loads, zero page errors — catches a
      # syntax break in any shared script) + the leaderboard suite. Nothing that can break a
      # drill ships unchecked; nothing that can't pays the 8-minute tax.
      - name: Determine change scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"; HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"; HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "engine=true" >> "$GITHUB_OUTPUT"; echo "unknown/new base -> full gate"; exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(index\.html|drills\.js|dev/|\.github/workflows/)'; then
            echo "engine=true"  >> "$GITHUB_OUTPUT"; echo '=> engine matrix WILL run'
          else
            echo "engine=false" >> "$GITHUB_OUTPUT"; echo '=> cosmetic-only: smoke + lb only'
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install playwright-core + chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright-core@1.49.1 >/dev/null
          npx playwright-core install --with-deps chromium
          echo "CHROME=$(node -e "console.log(require('playwright-core').chromium.executablePath())")" >> "$GITHUB_ENV"
      - name: Serve the site
        run: |
          python3 -m http.server 8791 &
          sleep 1.5
          curl -sfo /dev/null http://127.0.0.1:8791/index.html
      # ---- always-on fast net (both paths) ----
      # r414-review Segment A/C: static guards that need no browser — the cache-bump
      # discipline (the r390-392 "nothing reached live" class), a committed-secret scan,
      # and the SSOT invariants (drill membership + skin notch coverage).
      - name: Static guards (cache-bump · secrets · SSOT invariants)
        env:
          GATE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          node dev/check-cache-versions.js
          bash dev/check-secrets.sh
          node dev/check-invariants.js
      - name: Smoke (every page loads, zero page errors + drill invariants)
        run: node dev/e2e-smoke.js
      - name: Leaderboard (tier filter, placement, seed field)
        run: node dev/e2e-lb.js
      # r414-review A6: a fast behavioral net for the COSMETIC lane — shared-script
      # (themes.js/nav.js) changes skip the engine matrix, so drive one drill per core
      # group through the real engine on every push to catch a silent behavioral break.
      - name: Behavioral smoke (one drill per core group, real engine)
        run: REPS=1 node dev/e2e-demo-replay.js navigation combo foot
      # ---- engine matrix — only when a drill-affecting file changed ----
      - name: Parity matrix
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-audit-parity.js
      - name: Onboarding audit
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-audit-onboard.js
      - name: Demo replay (all drills)
        if: steps.scope.outputs.engine == 'true'
        run: REPS=1 node dev/e2e-demo-replay.js
      - name: Alt paths
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-alt-paths.js
      - name: Mac input matrix
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-mac-input.js
      # r401 (Wolf): 'learn' (echo) mode retired from the mode bar — its only UI trigger is gone,
      # so the follow-along gate (which drives #echoBtn) no longer applies. Echo code is left
      # dormant/guarded for possible future re-exposure; re-add this step if it returns.
      - name: Rapid-fire on the real grid
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-rapidfire.js
      - name: Guided contract (rails contain, alternates count, every drill solvable)
        if: steps.scope.outputs.engine == 'true'
        run: node dev/e2e-guided.js
      - name: Drill pages in sync
        if: steps.scope.outputs.engine == 'true'
        run: |
          node dev/build-drill-pages.js
          git diff --exit-code -- drills sitemap.xml \
            || { echo '::error::drill pages are stale — run dev/build-drill-pages.js and commit'; exit 1; }
