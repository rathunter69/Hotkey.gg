name: Deploy Supabase migrations
on:
  push:
    branches: [main]
    paths: ['supabase/**']
  workflow_dispatch: {}   # r131: manual re-run from the Actions tab (no push needed)
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: vshtftzrlepedydmkcnm
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      # r131: every run 2026-07-07 → 2026-07-12 failed silently on a missing
      # secret ("Access token not provided") — fail LOUD with the fix instead.
      - name: Check secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Repo secret SUPABASE_ACCESS_TOKEN is not set. app.supabase.com -> account icon -> Access Tokens -> generate, then GitHub repo Settings -> Secrets and variables -> Actions. See supabase/README.md."
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Repo secret SUPABASE_DB_PASSWORD is not set. Supabase dashboard -> Project Settings -> Database -> Database password (reset it if unknown), then add it as a repo Actions secret. See supabase/README.md."
            missing=1
          fi
          exit $missing
      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push --include-all
      - name: Deploy Edge Functions (if any)
        run: |
          if [ -d supabase/functions ] && [ -n "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy --project-ref "$PROJECT_REF"
          else
            echo "no functions to deploy"
          fi
