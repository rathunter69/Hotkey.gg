<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing · hotkey.gg</title>
<meta name="description" content="Your plan, payment method, and invoice history.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://www.hotkey.gg/billing.html">
<link rel="icon" href="favicon.ico?v=174" sizes="16x16 32x32 48x48">
<link rel="icon" type="image/svg+xml" href="favicon.svg?v=174">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=174">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html{scrollbar-gutter:stable}
  :root{
    --bg:#292b31; --surface:#383b42; --surface2:#43474f; --line:#5a5e68;
    --text:#f0f1ec; --muted:#a8adb3; --faint:#767d87;
    --accent:#6ec9a0; --accent-dim:#4a8f72; --accent-glow:rgba(110,201,160,.2);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:920px;
  }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}
  header.head{padding:12px 0 10px}
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px}
  .crumb{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-bottom:4px}
  .crumb a{color:var(--accent)}
  main{padding-bottom:90px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px 24px; margin-bottom:16px}
  .card h4{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.4px; margin-bottom:14px}
  .row{display:flex; gap:16px; align-items:stretch; margin-bottom:16px}
  .row .card{flex:1 1 300px; min-width:0; margin-bottom:0; display:flex; flex-direction:column}
  @media(max-width:719px){ .row{flex-wrap:wrap} }
  .plan{border-color:var(--warn); background:linear-gradient(180deg, rgba(217,164,65,.10), var(--surface) 46%)}
  .plan h4{color:var(--warn)}
  .fieldrow{display:flex; align-items:baseline; gap:12px; padding:9px 0; border-bottom:1px dashed var(--line); font-family:var(--mono); font-size:13px}
  .fieldrow:last-child{border-bottom:none}
  .fieldrow .fk{flex:0 0 118px; font-size:11px; color:var(--muted); letter-spacing:.4px}
  .fieldrow .fv{flex:1 1 auto; min-width:0; display:flex; flex-wrap:wrap; align-items:center; gap:8px}
  .badge{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.6px; padding:2px 8px; border-radius:999px; border:1px solid var(--warn); color:var(--warn)}
  .note{font-family:var(--mono); font-size:11.5px; color:var(--muted); line-height:1.7; margin-top:12px}
  .btn{display:inline-flex; align-items:center; justify-content:center; line-height:1; text-decoration:none;
    font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--on-accent,#0c0d0e);
    background:var(--accent); border:none; border-radius:9px; padding:11px 20px; margin-top:12px; cursor:pointer}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .btn[disabled]{opacity:.5; cursor:not-allowed}
  table.inv{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.5px}
  table.inv th{text-align:left; font-weight:500; color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; padding:0 10px 9px 0; border-bottom:1px solid var(--line)}
  table.inv td{padding:11px 10px 11px 0; border-bottom:1px dashed var(--line); color:var(--text)}
  table.inv tr:last-child td{border-bottom:none}
  .empty{font-family:var(--mono); font-size:12.5px; color:var(--muted); padding:26px 8px; text-align:center; line-height:1.8}
  .lnk{font-family:var(--mono); font-size:12px; color:var(--accent); cursor:pointer; white-space:nowrap}
  .lnk:hover{text-decoration:underline}
  .lnk.danger{color:var(--bad)}
  .msg{font-family:var(--mono); font-size:11.5px; color:var(--muted); min-height:15px; margin-top:2px}
  #invBody{overflow-x:auto}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:38px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); line-height:1.8; margin-top:6px}
  .state a{color:var(--accent); border-bottom:1px solid var(--accent-dim)}
</style>
<link rel="stylesheet" href="nav.css?v=203">
<script>
const SUPABASE_URL      = 'https://vshtftzrlepedydmkcnm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yKhIRqtk7w98jUCJYjFWAQ_CMnQ4-yT';
window.sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
window.NAV_ACTIVE = '';
</script>

</head>
<body>
<div id="navMount"></div>
<script src="nav.js?v=296"></script>

<header class="head"><div class="wrap">
  <div class="crumb"><a href="account.html">&larr; account</a></div>
  <h1>Billing</h1>
</div></header>

<main><div class="wrap" id="root">
  <div class="state">loading&hellip;</div>
</div></main>

<div id="siteFooter"></div>

<script>
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
(async function(){
  const root=document.getElementById('root');
  let me=null;
  try{ const { data:{ session } } = await sb.auth.getSession(); me = session ? session.user : null; }catch(e){}
  const isAnon = me && (!me.email || (me.app_metadata&&me.app_metadata.provider==='anonymous'));
  if(!me || isAnon){
    root.innerHTML='<div class="state">Billing lives on your account.<br><br>'+
      '<a href="index.html?openAuth=signup">Create an account</a> or <a href="index.html?openAuth=signin">log in</a> to see your plan and invoices.</div>';
    return;
  }
  // plan tier — reads profiles.plan when it exists; everyone is PRO (free) during beta
  let plan='pro';
  try{ const {data}=await sb.from('profiles').select('plan').eq('id',me.id).maybeSingle(); if(data&&data.plan) plan=String(data.plan).toLowerCase(); }catch(e){}
  const isPro = plan==='pro';
  root.innerHTML =
    '<div class="row">'+
      '<div class="card plan"><h4>Current plan</h4>'+
        '<div class="fieldrow"><span class="fk">plan</span><span class="fv">'+(isPro?'<b style="color:var(--warn);font-size:15px">PRO</b> <span class="badge">free during beta</span>':'<b style="font-size:15px">Free</b>')+'</span></div>'+
        '<div class="fieldrow"><span class="fk">status</span><span class="fv">'+(isPro?'active &mdash; not billed during beta':'the basics, free forever')+'</span></div>'+
        '<div class="fieldrow"><span class="fk">at launch</span><span class="fv">'+(isPro?'founder pricing, locked for life':'upgrade anytime to go PRO')+'</span></div>'+
        '<div class="fieldrow"><span class="fk">renews</span><span class="fv">&mdash;</span></div>'+
        (isPro
          ? '<button class="btn ghost" id="proBtn" style="margin-top:14px">What comes with PRO</button>'
          : '<button class="btn" id="upgradeBtn" style="margin-top:14px">Upgrade to PRO</button>')+
        '<div class="note" style="margin-top:auto">'+(isPro?'Founder pricing and payment collection go live when the beta ends &mdash; we’ll email you before anything is ever charged.':'PRO unlocks ranked cosmetics, certificates, and the full drill library.')+'</div>'+
      '</div>'+

      '<div class="card"><h4>Payment method</h4>'+
        '<div class="fieldrow"><span class="fk">card on file</span><span class="fv">none <span style="color:var(--faint)">&mdash; not needed yet</span></span></div>'+
        '<div class="fieldrow"><span class="fk">billing email</span><span class="fv">'+esc(me.email||'—')+'</span></div>'+
        '<div class="fieldrow"><span class="fk">receipts</span><span class="fv"><a href="account.html" style="color:var(--accent)">manage on account</a></span></div>'+
        '<button class="btn ghost" disabled title="Available at launch" style="margin-top:14px">Add payment method</button>'+
        '<div class="note" style="margin-top:auto">Cards are handled by our payment processor at launch &mdash; hotkey.gg never stores your card number.</div>'+
      '</div>'+
    '</div>'+

    '<div class="row">'+
      '<div class="card"><h4>Invoices &amp; payment history</h4>'+
        '<div id="invBody"><div class="empty">No payments yet &mdash; you’re on the free beta.<br>Invoices and receipts show up here once billing goes live.</div></div>'+
      '</div>'+

      '<div class="card"><h4>Manage plan</h4>'+
        (isPro
          ? '<div class="fieldrow"><span class="fk">pause</span><span class="fv"><a class="lnk" id="pauseBtn">pause subscription</a></span></div>'+
            '<div class="msg" id="pauseMsg">Keep your account &amp; data, stop billing. Resume anytime.</div>'+
            '<div class="fieldrow"><span class="fk">cancel</span><span class="fv"><a class="lnk danger" id="cancelBtn">cancel subscription</a></span></div>'+
            '<div class="msg" id="cancelMsg">Drops you to Free at the end of the period. Your account, runs, and boards stay.</div>'+
            '<div class="note" style="margin-top:auto">Cancelling only ends PRO &mdash; to erase everything, use Delete account on the <a href="account.html" style="color:var(--accent)">account page</a>.</div>'
          : '<div class="fieldrow"><span class="fk">you’re on</span><span class="fv"><b>Free</b></span></div>'+
            '<button class="btn" id="upgradeBtn2" style="margin-top:12px">Upgrade to PRO</button>'+
            '<div class="note" style="margin-top:auto">Go PRO for ranked cosmetics, certificates, and every drill. Founder pricing is locked in for beta players.</div>')+
      '</div>'+
    '</div>'+

    '<div class="note" style="text-align:center;margin-top:2px">Questions about billing? Email <a href="mailto:hello@hotkey.gg" style="color:var(--accent)">hello@hotkey.gg</a>.</div>';

  const say=(id,t,bad)=>{ const el=document.getElementById(id); if(el){ el.textContent=t; el.style.color=bad?'var(--bad)':'var(--muted)'; } };
  const pb=document.getElementById('proBtn');
  if(pb) pb.onclick=()=>{ if(window.hkProSheet) window.hkProSheet(); };
  ['upgradeBtn','upgradeBtn2'].forEach(id=>{ const b=document.getElementById(id);
    if(b) b.onclick=()=>{ if(window.hkProSheet) window.hkProSheet(); }; });

  // Pause / cancel — arm-to-confirm, wired to RPCs when they exist; beta-aware until then.
  // At launch, pause_subscription / cancel_subscription (or the Stripe portal) replace the notes.
  function armAction(btnId, msgId, verb, run){
    const btn=document.getElementById(btnId); if(!btn) return;
    const base=btn.textContent; let armed=false, t=null;
    btn.onclick=async()=>{
      if(!armed){ armed=true; btn.textContent='click again to '+verb; t=setTimeout(()=>{armed=false; btn.textContent=base;},4000); return; }
      clearTimeout(t); armed=false; btn.textContent=base; say(msgId,'Working…');
      try{ await run(msgId); }catch(e){ say(msgId,'Something went wrong — email hello@hotkey.gg.',true); }
    };
  }
  armAction('pauseBtn','pauseMsg','pause', async(mid)=>{
    try{ const {error}=await sb.rpc('pause_subscription');
      say(mid, error ? 'You’re on the free beta — nothing is billing yet. Pause opens here the day PRO goes paid.'
                     : 'Subscription paused — you won’t be billed. Resume anytime.'); }
    catch(e){ say(mid,'You’re on the free beta — nothing is billing yet. Pause opens here the day PRO goes paid.'); }
  });
  armAction('cancelBtn','cancelMsg','cancel', async(mid)=>{
    try{ const {error}=await sb.rpc('cancel_subscription');
      say(mid, error ? 'You’re on the free beta — there’s no paid subscription to cancel yet.'
                     : 'Subscription cancelled — you stay PRO until the period ends, then drop to Free.'); }
    catch(e){ say(mid,'You’re on the free beta — there’s no paid subscription to cancel yet.'); }
  });

  // r396: when billing goes live, an `invoices` table (or the processor's API) fills #invBody.
  // Rendered as a table so the empty state and the live state share one layout:
  //   <table class="inv"><thead><tr><th>date<th>description<th>amount<th></tr>...</table>
  try{
    const { data } = await sb.from('invoices').select('id,created_at,description,amount_cents,currency,hosted_url,status')
      .eq('user_id', me.id).order('created_at',{ascending:false}).limit(50);
    if(data && data.length){
      const money=(c,cur)=>((c||0)/100).toLocaleString('en-US',{style:'currency',currency:(cur||'USD').toUpperCase()});
      document.getElementById('invBody').innerHTML =
        '<table class="inv"><thead><tr><th>date</th><th>description</th><th>amount</th><th></th></tr></thead><tbody>'+
        data.map(r=>'<tr><td>'+new Date(r.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})+'</td>'+
          '<td>'+esc(r.description||'PRO subscription')+'</td>'+
          '<td>'+money(r.amount_cents,r.currency)+(r.status&&r.status!=='paid'?' <span style="color:var(--warn)">('+esc(r.status)+')</span>':'')+'</td>'+
          '<td>'+(r.hosted_url?'<a href="'+esc(r.hosted_url)+'" target="_blank" rel="noopener" style="color:var(--accent)">receipt &rarr;</a>':'')+'</td></tr>').join('')+
        '</tbody></table>';
    }
  }catch(e){ /* no invoices table yet (beta) — the empty state stands */ }
})();
</script>
</body>
</html>
