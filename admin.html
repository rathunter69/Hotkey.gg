<style>
  html{scrollbar-gutter:stable}
  :root{
    --bg:#0c0d0e; --surface:#141517; --surface2:#1c1d20; --line:#26282c;
    --text:#e9e8e3; --muted:#7c7d77; --faint:#4c4d49; --accent:#2ea36f; --accent-dim:#1d6647;
    --accent-glow:rgba(46,163,111,.22); --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.55}
  .wrap{max-width:1180px; margin:0 auto; padding:0 24px 80px}
  header.head{padding:14px 0 6px}
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px}
  .sub{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:20px 0}
  .tile{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-family:var(--mono)}
  .tile .v{font-size:22px; font-weight:700}
  .tile .l{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-top:4px}
  .tile.bad .v{color:var(--bad)}
  .section-title{font-family:var(--mono); font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:1.5px; margin:26px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line)}
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
  @media(max-width:820px){ .two{grid-template-columns:1fr} }
  .bars{display:flex; align-items:flex-end; gap:5px; height:110px; padding-top:6px}
  .bars .b{flex:1; background:var(--accent); border-radius:3px 3px 0 0; min-height:2px; position:relative}
  .bars .b i{position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-style:normal;
    font-family:var(--mono); font-size:8px; color:var(--faint); white-space:nowrap}
  .row{display:flex; gap:10px; align-items:baseline; font-family:var(--mono); font-size:12px;
    padding:6px 2px; border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .n{margin-left:auto; color:var(--muted)}
  .row .t{color:var(--faint); font-size:10px; white-space:nowrap}
  .row .meta{color:var(--muted); font-size:10.5px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .row .tab{font-family:var(--mono); font-size:10px; padding:3px 10px; border-radius:999px; cursor:pointer;
    border:1px solid var(--line); color:var(--muted); background:var(--surface)}
  .row .tab:hover{color:var(--text); border-color:var(--accent-dim)}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:40px 30px;
    text-align:center; font-family:var(--mono); font-size:13px; color:var(--muted); margin-top:30px}
  .loading{font-family:var(--mono); font-size:13px; color:var(--muted); text-align:center; padding:40px}
</style>

<body>
<div id="navMount"></div>
<script src="nav.js?v=285"></script>

<div class="wrap">
  <header class="head">
    <h1>Ops</h1>
    <div class="sub">admin-only · live metrics, error feed, moderation queue · refreshes on load</div>
  </header>
  <div id="root"><div class="loading">checking clearance…</div></div>
</div>

<script>
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const $=id=>document.getElementById(id);
async function load(){
  const root=$('root');
  let me=null;
  try{ const {data:{session}}=await sb.auth.getSession(); me=session&&session.user; }catch(e){}
  if(!me){ root.innerHTML='<div class="state">Sign in first — then reload this page.</div>'; return; }
  let m=null;
  try{ const {data,error}=await sb.rpc('admin_metrics'); if(error) throw error; m=data; }
  catch(e){ root.innerHTML='<div class="state">This page is for the hotkey.gg team.</div>'; return; }
  const tile=(v,l,bad)=>'<div class="tile'+(bad?' bad':'')+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';
  let html='<div class="tiles">'+
    tile(m.players,'players')+
    tile(m.active_7d,'active · 7d')+
    tile(m.runs_24h,'runs · 24h')+
    tile(m.runs_7d,'runs · 7d')+
    tile(m.desks,'desks')+
    tile(m.applications,'open applications')+
    tile(m.reports_open,'open reports', m.reports_open>0)+
    tile(m.errors_24h,'js errors · 24h', m.errors_24h>0)+
    '</div>';
  // runs by day (14d)
  const days=m.runs_by_day||[];
  const mx=Math.max(1,...days.map(d=>d[1]));
  html+='<div class="section-title">runs · last 14 days</div><div class="panel"><div class="bars">'+
    days.map(d=>'<span class="b" style="height:'+Math.max(2,Math.round(100*d[1]/mx))+'%" title="'+esc(d[0])+' · '+d[1]+' runs"><i>'+esc(String(d[0]).slice(5))+'</i></span>').join('')+
    '</div><div style="height:18px"></div></div>';
  html+='<div class="two" style="margin-top:16px">';
  // top events
  html+='<div class="panel"><div class="section-title" style="margin-top:0">events · 24h ('+m.events_24h+' total)</div>'+
    ((m.top_events_24h||[]).map(e=>'<div class="row"><span>'+esc(e[0])+'</span><span class="n">'+e[1]+'</span></div>').join('')||'<div class="row">quiet</div>')+'</div>';
  // error feed
  html+='<div class="panel"><div class="section-title" style="margin-top:0">error feed</div><div id="errs"><div class="loading" style="padding:10px">loading…</div></div></div>';
  html+='</div>';
  // reports queue
  html+='<div class="section-title">moderation · report queue</div><div class="panel" id="reps"><div class="loading" style="padding:10px">loading…</div></div>';
  // r284 (#35): shadow-flagged runs — the integrity trigger's catch, awaiting a verdict
  html+='<div class="section-title">integrity · flagged runs</div><div class="panel" id="flags"><div class="loading" style="padding:10px">loading…</div></div>';
  // r287: desk PRO requests — approve as free club comp or paid enterprise
  html+='<div class="section-title">desk PRO · requests</div><div class="panel" id="dpro"><div class="loading" style="padding:10px">loading…</div></div>';
  root.innerHTML=html;
  // errors
  try{ const {data:ev}=await sb.rpc('admin_events',{p_name:'err',p_limit:25});
    $('errs').innerHTML=(ev&&ev.length)
      ? ev.map(e=>'<div class="row"><span class="meta" title="'+esc(JSON.stringify(e.meta||{}))+'">'+esc((e.meta&&e.meta.m)||'(no message)')+'</span><span class="t">'+esc(String(e.created_at).slice(5,16))+'</span></div>').join('')
      : '<div class="row">no JS errors logged — good sign</div>';
  }catch(e){ $('errs').innerHTML='<div class="row">could not load</div>'; }
  // reports
  async function renderReports(){
    try{ const {data:rp}=await sb.rpc('admin_reports');
      $('reps').innerHTML=(rp&&rp.length)
        ? rp.map(r=>'<div class="row"><span>'+esc(r.kind)+'</span><span class="meta">'+esc(r.target)+'</span>'+
            '<span class="t">by '+esc(r.reporter_handle||'?')+' · '+esc(String(r.created_at).slice(0,10))+'</span>'+
            '<span class="tab rep-done" data-k="'+esc(r.kind)+'" data-t="'+esc(r.target)+'">resolve</span></div>').join('')
        : '<div class="row">queue empty — nothing reported</div>';
      document.querySelectorAll('.rep-done').forEach(b=>b.onclick=async()=>{
        b.textContent='…';
        try{ await sb.rpc('admin_resolve_report',{p_kind:b.dataset.k, p_target:b.dataset.t}); renderReports(); }catch(e){} });
    }catch(e){ $('reps').innerHTML='<div class="row">could not load</div>'; }
  }
  renderReports();
  // flagged runs — shadow-hidden from boards; clear restores, delete removes
  async function renderFlags(){
    try{ const {data:fr}=await sb.rpc('admin_flagged_runs');
      $('flags').innerHTML=(fr&&fr.length)
        ? fr.map(r=>'<div class="row"><span>'+esc(r.handle)+'</span><span class="meta">'+esc(r.challenge)+' · '+(r.time_ms/1000).toFixed(2)+'s · '+r.keystrokes+' keys (opt '+esc(String(r.optimal))+') · <b style="color:var(--warn)">'+esc(r.flag_reason)+'</b></span>'+
            '<span class="t">'+esc(String(r.created_at).slice(0,16).replace('T',' '))+'</span>'+
            '<span class="tab flg-act" data-id="'+esc(r.id)+'" data-a="clear">clear</span>'+
            '<span class="tab flg-act" data-id="'+esc(r.id)+'" data-a="delete" style="color:var(--bad)">delete</span></div>').join('')
        : '<div class="row">nothing flagged — the boards are clean</div>';
      document.querySelectorAll('.flg-act').forEach(b=>b.onclick=async()=>{
        b.textContent='…';
        try{ await sb.rpc('admin_run_verdict',{p_id:b.dataset.id, p_action:b.dataset.a}); renderFlags(); }catch(e){} });
    }catch(e){ $('flags').innerHTML='<div class="row">could not load</div>'; }
  }
  renderFlags();
  // desk PRO requests — approve as comp (free, with a day-limit) or paid (seats, no expiry)
  async function renderDpro(){
    try{ const {data:dp}=await sb.rpc('admin_desk_pro_requests');
      $('dpro').innerHTML=(dp&&dp.length)
        ? dp.map(r=>{
            const badge=r.status==='active'?'<b style="color:var(--accent)">active'+(r.kind?' · '+esc(r.kind):'')+'</b>':'<b style="color:var(--warn)">pending</b>';
            const exp=r.expires_at?' · ends '+esc(String(r.expires_at).slice(0,10)):'';
            const seatInfo=(r.status==='active'&&r.kind==='paid'&&r.seats!=null)?' · '+r.seats+' seats':'';
            const acts=r.status==='pending'
              ? '<span class="tab dp-act" data-team="'+esc(r.team_id)+'" data-a="comp">comp 120d</span>'+
                '<span class="tab dp-act" data-team="'+esc(r.team_id)+'" data-a="paid" title="paid — seats default to current roster; new joiners past that are waitlisted">paid '+r.members+' seats</span>'+
                '<span class="tab dp-act" data-team="'+esc(r.team_id)+'" data-a="deny" style="color:var(--bad)">deny</span>'
              : (r.kind==='paid'?'<span class="tab dp-seats" data-team="'+esc(r.team_id)+'" data-cur="'+esc(String(r.seats||''))+'">set seats</span>':'')+
                '<span class="tab dp-act" data-team="'+esc(r.team_id)+'" data-a="revoke" style="color:var(--bad)">revoke</span>';
            return '<div class="row"><span>'+esc(r.team_name)+(r.verified?' ✓':'')+'</span>'+
              '<span class="meta">'+r.members+' seats · '+badge+exp+(r.edu_domain?' · '+esc(r.edu_domain):'')+(r.note?' · “'+esc(r.note)+'”':'')+' · by '+esc(r.captain_handle)+'</span>'+
              '<span class="t">'+esc(String(r.requested_at).slice(0,10))+'</span>'+acts+'</div>';
          }).join('')
        : '<div class="row">no desk PRO requests</div>';
      document.querySelectorAll('.dp-act').forEach(b=>b.onclick=async()=>{
        const a=b.dataset.a; b.textContent='…';
        const args={comp:{p_action:'approve',p_kind:'comp',p_days:120,p_seats:null},
                    paid:{p_action:'approve',p_kind:'paid',p_days:0,p_seats:null},
                    deny:{p_action:'deny',p_kind:null,p_days:0,p_seats:null},
                    revoke:{p_action:'revoke',p_kind:null,p_days:0,p_seats:null}}[a];
        try{ await sb.rpc('admin_decide_desk_pro',Object.assign({p_team:b.dataset.team},args)); renderDpro(); }catch(e){} });
      // adjust seat count on an active paid grant (a desk buys more/fewer seats)
      document.querySelectorAll('.dp-seats').forEach(b=>b.onclick=async()=>{
        const cur=b.dataset.cur||''; const v=prompt('Seats for this desk (blank = uncapped):', cur);
        if(v===null) return; const n=v.trim()===''?null:parseInt(v,10);
        if(n!==null && (!Number.isFinite(n)||n<0)) return;
        b.textContent='…';
        try{ await sb.rpc('set_desk_pro_seats',{p_team:b.dataset.team, p_seats:n}); renderDpro(); }catch(e){} });
    }catch(e){ $('dpro').innerHTML='<div class="row">could not load</div>'; }
  }
  renderDpro();
}
load();
</script>

<div id="siteFooter"></div>
</body>
