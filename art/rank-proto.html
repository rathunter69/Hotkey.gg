<!doctype html><html><head><meta charset="utf-8"><title>rank art proto — iteration 1</title>
<style>
  body{margin:0;font-family:'JetBrains Mono',monospace;background:#1b1d22;color:#cdd0d6;padding:28px}
  h1{font-size:14px;letter-spacing:2px;color:#8b8f98;margin:0 0 4px} .sub{font-size:11px;color:#666a72;margin-bottom:22px}
  .row{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:26px}
  .tile{width:150px;background:#22242a;border:1px solid #33363e;border-radius:12px;padding:16px 10px 12px;text-align:center}
  .tile.light{background:#e9eaed;border-color:#d0d2d8;color:#3a3d44}
  .tile .nm{font-size:9.5px;letter-spacing:1px;margin-top:10px;color:#9a9ea8;text-transform:uppercase}
  .tile.light .nm{color:#6b6f78}
  .chips{display:flex;gap:14px;align-items:center;background:#22242a;border:1px solid #33363e;border-radius:12px;padding:12px 16px;width:max-content}
  .cap{font-size:10px;color:#666a72;margin:18px 0 8px;letter-spacing:1.5px}
</style></head><body>
<h1>HOTKEY.GG — RANKED EMBLEMS, ITERATION 1</h1>
<div class="sub">parametric SVG · escalation grammar: plate &rarr; chevrons &rarr; studs &rarr; wings &rarr; gem &rarr; crown &rarr; radiance · iterate by naming the tier + what to change</div>
<div class="cap">HERO 96px · DARK</div><div class="row" id="dark"></div>
<div class="cap">HERO 96px · LIGHT</div><div class="row" id="light"></div>
<div class="cap">SILHOUETTE TEST · 20px CHIP ROW</div><div class="chips" id="chips"></div>
<script>
/* Parametric ranked-emblem generator — Apex/LoL grammar in pure SVG.
   Layers: aura -> backplate (faceted shield) -> metal frame (vertical gradient,
   rim-lit) -> ornaments (chevrons/studs/wings/laurel/crown/rays) -> gem core. */
function emblem(cfg, size){
  const id='g'+Math.random().toString(36).slice(2,8);
  const S=100; // internal canvas
  const P=cfg.pal;
  let defs=`
    <linearGradient id="${id}m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${P.hi}"/><stop offset=".45" stop-color="${P.mid}"/>
      <stop offset=".55" stop-color="${P.lo}"/><stop offset="1" stop-color="${P.deep}"/>
    </linearGradient>
    <linearGradient id="${id}p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${P.plateHi}"/><stop offset="1" stop-color="${P.plateLo}"/>
    </linearGradient>
    <linearGradient id="${id}g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${P.gemHi}"/><stop offset=".6" stop-color="${P.gem}"/>
      <stop offset="1" stop-color="${P.gemLo}"/>
    </linearGradient>`;
  if(cfg.aura) defs+=`<radialGradient id="${id}a"><stop offset=".3" stop-color="${P.aura}" stop-opacity=".55"/><stop offset="1" stop-color="${P.aura}" stop-opacity="0"/></radialGradient>`;
  // faceted shield: wide shoulders, pointed keel (the "ranked" read)
  const shield='M50 6 L82 18 L86 46 L68 84 L50 94 L32 84 L14 46 L18 18 Z';
  const inner ='M50 14 L76 23.5 L79.5 46 L64 78 L50 86 L36 78 L20.5 46 L24 23.5 Z';
  let o='';
  if(cfg.aura) o+=`<circle cx="50" cy="50" r="48" fill="url(#${id}a)"/>`;
  if(cfg.rays){ for(let i=0;i<12;i++){ const a=i*30*Math.PI/180;
    o+=`<line x1="${50+Math.cos(a)*40}" y1="${50+Math.sin(a)*40}" x2="${50+Math.cos(a)*49}" y2="${50+Math.sin(a)*49}" stroke="${P.hi}" stroke-width="${i%3===0?2.4:1.2}" stroke-linecap="round" opacity=".85"/>`; } }
  if(cfg.wings){ const w=cfg.wings; // layered swept feathers, mirrored
    for(let s of [-1,1]){ for(let f=0;f<w;f++){ const y=30+f*9, len=26+f*7;
      o+=`<path d="M${50+s*34} ${y} q ${s*len*0.85} ${-7+f*2.4} ${s*len} ${13+f*3} q ${-s*len*0.55} ${2-f} ${-s*(len-10)} ${-4}" fill="url(#${id}m)" stroke="${P.deep}" stroke-width=".8" opacity="${0.96-f*0.11}"/>`; } } }
  o+=`<path d="${shield}" fill="url(#${id}p)" stroke="${P.deep}" stroke-width="2.6"/>`;
  o+=`<path d="${shield}" fill="none" stroke="url(#${id}m)" stroke-width="3.4" transform="translate(0,-0.4) scale(0.985)" transform-origin="50 50"/>`;
  o+=`<path d="${inner}" fill="none" stroke="${P.mid}" stroke-width="1" opacity=".8"/>`;
  o+=`<path d="M18.5 18.2 L50 6.6 L81.5 18.2" fill="none" stroke="#ffffff" stroke-width="1.4" opacity=".75" stroke-linecap="round"/>`; // rim light
  if(cfg.laurel){ for(let s of [-1,1]){
    o+=`<path d="M${50+s*26} 80 q ${s*16} -10 ${s*18} -34" fill="none" stroke="url(#${id}m)" stroke-width="2.4" stroke-linecap="round"/>`;
    for(let l=0;l<5;l++){ const t=l/4.4, x=50+s*(26+16*t*(2-t)*0.95), y=79-34*t;
      o+=`<ellipse cx="${x}" cy="${y}" rx="4.6" ry="2" fill="url(#${id}m)" stroke="${P.deep}" stroke-width=".5" transform="rotate(${s*(-52+t*66)} ${x} ${y})"/>`; } } }
  if(cfg.studs){ for(let s of [-1,1]) o+=`<circle cx="${50+s*27}" cy="30" r="3.1" fill="url(#${id}m)" stroke="${P.deep}" stroke-width=".8"/>`; }
  for(let c=0;c<(cfg.chev||0);c++){ const y=64-c*10;
    o+=`<path d="M38 ${y} L50 ${y-8} L62 ${y} L62 ${y+5.5} L50 ${y-2.5} L38 ${y+5.5} Z" fill="url(#${id}m)" stroke="${P.deep}" stroke-width=".9"/>`; }
  if(cfg.crown){ o+=`<path d="M36 20.5 L39 10.5 L45 17 L50 7.5 L55 17 L61 10.5 L64 20.5 Z" fill="url(#${id}m)" stroke="${P.deep}" stroke-width="1"/>
    <circle cx="50" cy="5.8" r="2" fill="${P.gemHi}"/>`; }
  if(cfg.gem){ o+=`<path d="M50 33 L59 44 L50 58 L41 44 Z" fill="url(#${id}g)" stroke="${P.deep}" stroke-width="1.1"/>
    <path d="M50 33 L59 44 L41 44 Z" fill="#ffffff" opacity=".22"/>
    <circle cx="46.5" cy="40" r="1.7" fill="#ffffff" opacity=".95"/>`; }
  if(cfg.mono){ o+=`<text x="50" y="${cfg.gem?73:52}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-weight="700" font-size="${cfg.gem?11:17}" fill="${P.hi}" ${cfg.gem?'':'dominant-baseline="central"'}>${cfg.mono}</text>`; }
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">${'<defs>'+defs+'</defs>'}${o}</svg>`;
}
const IRON ={hi:'#b9bec9',mid:'#8b919d',lo:'#5d626d',deep:'#33363e',plateHi:'#3a3d45',plateLo:'#24262c',gem:'#6a7180',gemHi:'#c2c8d4',gemLo:'#3c414c',aura:'#8b919d'};
const BRONZE={hi:'#e6b17e',mid:'#c98a4b',lo:'#96602e',deep:'#4f3117',plateHi:'#463527',plateLo:'#2a2019',gem:'#d08c46',gemHi:'#ffd9a8',gemLo:'#7c4c1e',aura:'#c98a4b'};
const SILVER={hi:'#eef2f8',mid:'#c3cad6',lo:'#8f97a6',deep:'#4d5462',plateHi:'#454b57',plateLo:'#282c34',gem:'#aeb8c8',gemHi:'#ffffff',gemLo:'#6a7383',aura:'#c3cad6'};
const GOLD ={hi:'#ffe9a6',mid:'#f0c04e',lo:'#c08f22',deep:'#5f4508',plateHi:'#4a3f22',plateLo:'#2b2415',gem:'#ffd75e',gemHi:'#fff6d8',gemLo:'#9a7112',aura:'#f0c04e'};
const PLAT ={hi:'#d8fbf4',mid:'#7fd6c6',lo:'#3f9d90',deep:'#1c4f49',plateHi:'#274a46',plateLo:'#182b29',gem:'#66e2cd',gemHi:'#eafffb',gemLo:'#22796c',aura:'#7fd6c6'};
const CRIM ={hi:'#ff9d8a',mid:'#e0503c',lo:'#9c2c1e',deep:'#471410',plateHi:'#3d1f1b',plateLo:'#231211',gem:'#ff5d42',gemHi:'#ffd0c4',gemLo:'#8a1f12',aura:'#e0503c'};
const DIAM ={hi:'#eafaff',mid:'#8fd8f2',lo:'#4aa4c9',deep:'#1c4a63',plateHi:'#22404f',plateLo:'#152730',gem:'#7de2ff',gemHi:'#ffffff',gemLo:'#2f7fa3',aura:'#8fd8f2'};
const TIERS=[
  {n:'MBA Associate',        cfg:{pal:IRON,   mono:'MBA'}},
  {n:'Candidate',            cfg:{pal:IRON,   chev:1}},
  {n:'Summer Analyst',       cfg:{pal:BRONZE, chev:1, studs:1}},
  {n:'First-Year Analyst',   cfg:{pal:SILVER, chev:2, studs:1}},
  {n:'Associate',            cfg:{pal:GOLD,   chev:2, studs:1, laurel:1}},
  {n:'VP',                   cfg:{pal:PLAT,   chev:1, gem:1, wings:2}},
  {n:'MD',                   cfg:{pal:CRIM,   gem:1, wings:3, crown:1, aura:1}},
  {n:'Second-Year Analyst',  cfg:{pal:DIAM,   gem:1, wings:3, crown:1, laurel:1, rays:1, aura:1}},
];
for(const t of TIERS){
  document.getElementById('dark').insertAdjacentHTML('beforeend',
    `<div class="tile">${emblem(t.cfg,96)}<div class="nm">${t.n}</div></div>`);
  document.getElementById('light').insertAdjacentHTML('beforeend',
    `<div class="tile light">${emblem(t.cfg,96)}<div class="nm">${t.n}</div></div>`);
  document.getElementById('chips').insertAdjacentHTML('beforeend', emblem(t.cfg,20));
}
</script></body></html>
