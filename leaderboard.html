<style>
  :root{
    --bg:#0c0d0e; --surface:#141517; --surface2:#1c1d20; --line:#26282c;
    --text:#e9e8e3; --muted:#7c7d77; --faint:#4c4d49;
    --accent:#2ea36f; --accent-dim:#1d6647; --accent-glow:rgba(46,163,111,.22);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:880px;
  }
  *{margin:0; padding:0; box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  body::before{content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:42px 30px; opacity:.13;
    mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 0%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 0%,transparent 75%);}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}

  nav{position:sticky; top:0; z-index:50; background:var(--bg)}
  .nav-in{display:flex; align-items:center; gap:18px; height:52px; max-width:1240px; margin:0 auto; padding:0 28px}
  .brand{font-family:var(--mono); font-weight:700; font-size:16px; letter-spacing:-.5px; color:var(--text); text-decoration:none}
  .brand b{color:var(--accent)}
  .nav-links{display:flex; align-items:center; gap:6px; margin:0 auto}
  .nav-links a{font-family:var(--mono); font-size:13px; color:var(--muted); padding:8px 14px; border-radius:6px; transition:.13s; text-decoration:none; letter-spacing:.2px}
  .nav-links a:hover{color:var(--text); background:var(--surface)}
  .nav-links a.on{color:var(--accent); background:var(--surface)}
  @media(max-width:760px){ .nav-in{padding:0 16px} }
  .brand b{color:var(--accent)}
  .menu-btn{display:none}

  header.head{padding:64px 0 30px; position:relative; z-index:1}
  .eyebrow{font-family:var(--mono); font-size:11.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--accent); margin-bottom:14px}
  h1{font-size:clamp(32px,5vw,46px); font-weight:700; letter-spacing:-1.2px; margin-bottom:12px}
  .sub{font-size:16px; color:var(--muted); max-width:520px}

  main{padding-bottom:80px; position:relative; z-index:1}
  #boards{display:grid; grid-template-columns:repeat(2,1fr); gap:20px; align-items:start}
  @media(max-width:680px){ #boards{grid-template-columns:1fr} }
  .board{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .section-title{font-family:var(--mono); font-size:13px; color:var(--muted); text-transform:uppercase;
    letter-spacing:1.5px; margin:18px 0 6px; padding-bottom:6px; border-bottom:1px solid var(--line)}
  .section-title:first-child{margin-top:0}
  .board-cap{display:flex; align-items:baseline; justify-content:space-between; padding:16px 22px; border-bottom:1px solid var(--line)}
  .board-cap h2{font-size:17px; font-weight:600; letter-spacing:-.3px}
  .board-cap .lvl{font-family:var(--mono); font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:1px}
  .row{display:grid; grid-template-columns:54px 1fr 96px; align-items:center; padding:13px 22px; border-bottom:1px solid var(--line); font-size:15px}
  .row:last-child{border-bottom:none}
  .rk{font-family:var(--mono); font-weight:700; color:var(--muted)}
  .row.top .rk{color:var(--accent)}
  .row.me{background:var(--accent-glow)}
  .row.me .nm::after{content:" · you"; color:var(--accent); font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.3px}
  .row.you-extra{border-top:1px dashed var(--line)}
  .you-gap{padding:5px 22px; font-family:var(--mono); font-size:13px; color:var(--faint); text-align:center; letter-spacing:2px}
  .nm{font-weight:500}
  .tm{font-family:var(--mono); text-align:right; font-weight:500}
  .empty{padding:22px; color:var(--faint); font-family:var(--mono); font-size:13px; text-align:center}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:40px 30px; text-align:center}
  .state h2{font-size:19px; font-weight:600; margin-bottom:10px}
  .state p{font-size:14px; color:var(--muted); max-width:440px; margin:0 auto 18px; line-height:1.6}
  .state code{font-family:var(--mono); font-size:12px; color:var(--warn); background:var(--surface2); padding:2px 7px; border-radius:5px}
  .loading{font-family:var(--mono); font-size:13px; color:var(--muted); text-align:center; padding:40px}

  footer{border-top:1px solid var(--line); padding:34px 0; position:relative; z-index:1}
  .foot-in{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px}
  .foot-tag{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .foot-fine{font-family:var(--mono); font-size:11px; color:var(--faint); max-width:340px; text-align:right}
  @media(max-width:640px){ .nav-links{gap:18px} .nav-links a:not(.on):not(.btn){display:none} .foot-fine{text-align:left} }
</style>

<script>
/* ============================================================
   SUPABASE — paste the SAME two values you used in index.html.
   Leave blank and the page shows a friendly "not connected" note.
   ============================================================ */
const SUPABASE_URL      = 'https://vshtftzrlepedydmkcnm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yKhIRqtk7w98jUCJYjFWAQ_CMnQ4-yT';
const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const CH = [
  { key:'copyover', label:'Copy it over',        lvl:'Foundations' },
  { key:'polish',   label:'Polish the Header',   lvl:'Formatting' },
  { key:'combo',    label:'Clean the paste',     lvl:'Formatting' },
  { key:'format',   label:'Fix the formats',     lvl:'Formatting' },
  { key:'gauntlet', label:'Make it model-ready', lvl:'Formatting' },
  { key:'drill',    label:'Hardcode it',         lvl:'Values' },
  { key:'margin',   label:'Build the margin',    lvl:'Formulas' },
  { key:'foot',     label:'Total it both ways',  lvl:'Formulas' },
  { key:'percent',  label:'Common-size it',      lvl:'Formulas' },
  { key:'schedule', label:'Roll it forward',     lvl:'Formulas' },
  { key:'comps',    label:'Line up the comps',   lvl:'Formulas' },
  { key:'lookup',   label:'Look it up',          lvl:'Lookups' },
];
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(ms){ return (ms/1000).toFixed(2)+'s'; }

function rowHtml(r,i,names,meId,extra){
  const me = meId && r.user_id===meId;
  return `<div class="row${i===0?' top':''}${me?' me':''}${extra?' you-extra':''}">`+
    `<span class="rk">${i+1}</span>`+
    `<span class="nm">${esc(names[r.user_id]||'anon')}</span>`+
    `<span class="tm">${fmt(r.time_ms)}</span></div>`;
}
function boardHtml(c, best, names, meId){
  let body;
  if(!best.length){ body='<div class="empty">no times yet — be the first</div>'; }
  else {
    body = best.slice(0,10).map((r,i)=>rowHtml(r,i,names,meId)).join('');
    const myIdx = meId ? best.findIndex(r=>r.user_id===meId) : -1;
    if(myIdx>=10){ body += '<div class="you-gap">···</div>' + rowHtml(best[myIdx], myIdx, names, meId, true); }
  }
  return `<div class="board"><div class="board-cap"><h2>${esc(c.label)}</h2><span class="lvl">${esc(c.lvl)}</span></div>${body}</div>`;
}

/* Session boards (marathon + rapid-fire) share rendering but format the score column differently. */
function sessionRowHtml(r,i,names,meId,labelFn,extra){
  const me = meId && r.user_id===meId;
  return `<div class="row${i===0?' top':''}${me?' me':''}${extra?' you-extra':''}">`+
    `<span class="rk">${i+1}</span>`+
    `<span class="nm">${esc(names[r.user_id]||'anon')}</span>`+
    `<span class="tm">${labelFn(r)}</span></div>`;
}
function sessionBoardHtml(title, sublabel, best, names, meId, labelFn){
  let body;
  if(!best.length){ body='<div class="empty">no runs yet — be the first</div>'; }
  else {
    body = best.slice(0,10).map((r,i)=>sessionRowHtml(r,i,names,meId,labelFn)).join('');
    const myIdx = meId ? best.findIndex(r=>r.user_id===meId) : -1;
    if(myIdx>=10){ body += '<div class="you-gap">···</div>' + sessionRowHtml(best[myIdx], myIdx, names, meId, labelFn, true); }
  }
  return `<div class="board"><div class="board-cap"><h2>${esc(title)}</h2><span class="lvl">${esc(sublabel)}</span></div>${body}</div>`;
}
function bestPerUser(rows, mode, dur){
  const seen={}, best=[];
  rows.filter(r=>r.mode===mode && r.duration_sec===dur)
      .sort((a,b)=>{
        // primary: more score is better
        if(b.score !== a.score) return b.score - a.score;
        // secondary: closer to par — fewer keystrokes-over-optimal wins
        const aOver = (a.keystrokes||0) - (a.optimal||0);
        const bOver = (b.keystrokes||0) - (b.optimal||0);
        if(aOver !== bOver) return aOver - bOver;
        // tertiary: fewer misses (mostly rapid-fire)
        if((a.misses||0) !== (b.misses||0)) return (a.misses||0) - (b.misses||0);
        // quaternary: who got there first
        return new Date(a.created_at||0) - new Date(b.created_at||0);
      })
      .forEach(r=>{ if(!seen[r.user_id]){ seen[r.user_id]=true; best.push(r); } });
  return best;
}
const MARATHON_DURS = [{sec:300, label:'5-minute marathon'}, {sec:600, label:'10-minute marathon'}, {sec:900, label:'15-minute marathon'}];
const RAPID_DURS    = [{sec:30,  label:'30-second rapid-fire'}, {sec:60, label:'60-second rapid-fire'}, {sec:120, label:'120-second rapid-fire'}];
const marathonScore = r => `${r.score} drill${r.score===1?'':'s'} · ${r.keystrokes} keys`;
const rapidScore    = r => { const t=r.score+(r.misses||0); const a=t?Math.round(100*r.score/t):100;
                             return `${r.score} hit${r.score===1?'':'s'} · ${a}%`; };

async function load(){
  const root=document.getElementById('boards');
  if(!sb){
    root.innerHTML='<div class="state"><h2>Leaderboard not connected yet</h2>'+
      '<p>Paste your Supabase <code>Project URL</code> and <code>anon key</code> into the config block at the top of <code>leaderboard.html</code> and <code>index.html</code>, then re-deploy. Times will appear here automatically.</p>'+
      '<a href="index.html" class="btn">Go train</a></div>';
    return;
  }
  let profs=[], runs=[], sessions=[], meId=null;
  try{
    try{ const { data:{ session } } = await sb.auth.getSession(); meId = session ? session.user.id : null; }catch(e){}
    const [p, r, s] = await Promise.all([
      sb.from('profiles').select('id,handle'),
      sb.from('runs').select('user_id,challenge,time_ms').eq('mouse_used',false).order('time_ms',{ascending:true}),
      sb.from('sessions').select('user_id,mode,duration_sec,score,keystrokes,misses,optimal,created_at'),
    ]);
    profs=p.data||[]; runs=r.data||[]; sessions=s.data||[];
  }catch(e){
    root.innerHTML='<div class="state"><h2>Couldn’t load times</h2><p>The database isn’t reachable right now. Check the keys and that the tables exist, then refresh.</p></div>';
    return;
  }
  const names={}; profs.forEach(p=>{ names[p.id]=p.handle||'anon'; });

  // Build the page: sessions first (the competitive boards), then per-drill bests
  let html='<h3 class="section-title">Marathon</h3>';
  MARATHON_DURS.forEach(d=>{
    html += sessionBoardHtml(d.label, 'Session', bestPerUser(sessions,'marathon',d.sec), names, meId, marathonScore);
  });
  html += '<h3 class="section-title">Rapid-fire</h3>';
  RAPID_DURS.forEach(d=>{
    html += sessionBoardHtml(d.label, 'Session', bestPerUser(sessions,'rapidfire',d.sec), names, meId, rapidScore);
  });
  html += '<h3 class="section-title">Per-drill bests</h3>';
  CH.forEach(c=>{
    const seen={}, best=[];
    runs.filter(x=>x.challenge===c.key).forEach(x=>{ if(!seen[x.user_id]){ seen[x.user_id]=true; best.push(x); } });
    html += boardHtml(c, best, names, meId);
  });
  root.innerHTML=html;
}
load();
</script>
