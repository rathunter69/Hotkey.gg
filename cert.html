<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html{scrollbar-gutter:stable}
  :root{
    --bg:#0c0d0e; --surface:#141517; --surface2:#1c1d20; --line:#26282c;
    --text:#e9e8e3; --muted:#7c7d77; --faint:#4c4d49; --accent:#2ea36f; --accent-dim:#1d6647;
    --accent-glow:rgba(46,163,111,.22); --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.6}
  .wrap{max-width:880px; margin:0 auto; padding:0 24px 80px}
  /* the certificate itself — one framed card, print-clean */
  .cert{background:var(--surface); border:1px solid var(--accent-dim); border-radius:16px; margin-top:26px;
    padding:44px 48px; position:relative; overflow:hidden}
  .cert::before{content:""; position:absolute; inset:10px; border:1px solid var(--line); border-radius:10px; pointer-events:none}
  .c-brand{font-family:var(--mono); font-weight:700; font-size:16px; letter-spacing:-.4px}
  .c-brand b{color:var(--accent)}
  .c-kicker{font-family:var(--mono); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-top:26px}
  .c-title{font-size:31px; font-weight:700; letter-spacing:-.6px; line-height:1.2; margin-top:6px}
  .c-holder{font-family:var(--mono); font-size:19px; color:var(--accent); margin-top:18px; font-weight:700}
  .c-blurb{font-size:14.5px; color:var(--muted); max-width:520px; margin-top:10px}
  .c-meta{display:flex; gap:26px; flex-wrap:wrap; margin-top:26px; font-family:var(--mono); font-size:12px; color:var(--muted)}
  .c-meta b{color:var(--text); display:block; font-size:13px}
  .c-verify{margin-top:22px; font-family:var(--mono); font-size:12.5px; padding:10px 14px; border-radius:9px; display:inline-flex; gap:8px; align-items:center}
  .c-verify.ok{color:var(--accent); background:var(--accent-glow); border:1px solid var(--accent-dim)}
  .c-verify.checking{color:var(--muted); background:var(--surface2); border:1px solid var(--line)}
  .c-verify.bad{color:var(--bad); background:rgba(200,83,63,.12); border:1px solid var(--bad)}
  .c-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:26px}
  .c-btn{display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:13px; font-weight:700;
    color:var(--on-accent,#fff); background:var(--accent); border:none; border-radius:9px; padding:11px 18px;
    cursor:pointer; text-decoration:none}
  .c-btn:hover{filter:brightness(1.08)}
  .c-btn.quiet{background:var(--surface2); color:var(--text); border:1px solid var(--line); font-weight:500}
  .c-id{font-family:var(--mono); font-size:10.5px; color:var(--faint); margin-top:22px; word-break:break-all}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:38px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); margin-top:26px}
  .state a{color:var(--accent)}
  @media print{
    #navMount, #siteFooter, .c-actions, .c-verify.checking{display:none !important}
    body{background:#fff; color:#111}
    .cert{border-color:#bbb; box-shadow:none}
  }
</style>
<link rel="stylesheet" href="nav.css?v=199">
<script src="drills.js?v=278"></script>
<script>
  const SUPABASE_URL='https://vshtftzrlepedydmkcnm.supabase.co';
  const SUPABASE_ANON_KEY='sb_publishable_yKhIRqtk7w98jUCJYjFWAQ_CMnQ4-yT';
  window.sb=(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null;
  window.NAV_ACTIVE='';
</script>
<script src="themes.js?v=295"></script>
</head>
<body>
<div id="navMount"></div>
<script src="nav.js?v=293"></script>

<main><div class="wrap" id="root">
  <div class="state">loading certificate…</div>
</div></main>

<div id="siteFooter"></div>

<script>
/* r359 CERTIFICATE PAGE — public + verifiable. Renders the cert row, then RE-VERIFIES it
   live against the runs table (public read): every drill in the track must have a clean
   recorded run for this user. A forged row without the runs behind it shows as unverified. */
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function load(){
  const root = document.getElementById('root');
  const id = new URLSearchParams(location.search).get('id');
  if(!id || !window.sb){ root.innerHTML = '<div class="state">No certificate id. Certificates are issued from the <a href="index.html">trainer</a> when a track is completed.</div>'; return; }
  let cert = null;
  try{ const { data } = await sb.from('certificates').select('id,user_id,track,handle,issued_at').eq('id', id).maybeSingle(); cert = data; }catch(e){}
  if(!cert){ root.innerHTML = '<div class="state">Certificate not found — the id may be wrong, or it was revoked.</div>'; return; }
  const track = (window.HK_TRACKS || []).find(t => t.id === cert.track);
  if(!track){ root.innerHTML = '<div class="state">Unknown track on this certificate.</div>'; return; }
  const issued = new Date(cert.issued_at);
  const issuedTxt = issued.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  const certUrl = 'https://www.hotkey.gg/cert.html?id=' + encodeURIComponent(cert.id);
  /* LinkedIn Add-to-Profile deep link — no API needed, the URL scheme prefills the form */
  const li = 'https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME'
    + '&name=' + encodeURIComponent(track.cert)
    + '&organizationName=' + encodeURIComponent('hotkey.gg')
    + '&issueYear=' + issued.getFullYear() + '&issueMonth=' + (issued.getMonth()+1)
    + '&certUrl=' + encodeURIComponent(certUrl) + '&certId=' + encodeURIComponent(cert.id);
  root.innerHTML =
    '<div class="cert">'
    + '<div class="c-brand">hotkey<b>.gg</b></div>'
    + '<div class="c-kicker">certificate of completion</div>'
    + '<div class="c-title">' + esc(track.cert) + '</div>'
    + '<div class="c-holder">' + esc(cert.handle || 'hotkey player') + '</div>'
    + '<div class="c-blurb">' + esc(track.blurb) + ' Completed all ' + track.keys.length + ' drills with clean recorded runs — no mouse, no guided assistance.</div>'
    + '<div class="c-meta">'
    + '<span>issued<b>' + esc(issuedTxt) + '</b></span>'
    + '<span>track length<b>' + track.keys.length + ' drills</b></span>'
    + '<span>issuer<b>hotkey.gg</b></span>'
    + '</div>'
    + '<div class="c-verify checking" id="verify">verifying against recorded runs…</div>'
    + '<div class="c-actions">'
    + '<a class="c-btn" href="' + li + '" target="_blank" rel="noopener">in&nbsp; Add to LinkedIn profile</a>'
    + '<button class="c-btn quiet" id="copyLink">copy link</button>'
    + '<button class="c-btn quiet" onclick="window.print()">print / PDF</button>'
    + '</div>'
    + '<div class="c-id">certificate id: ' + esc(cert.id) + ' · verify anytime at this URL</div>'
    + '</div>';
  document.getElementById('copyLink').onclick = async (e) => {
    try{ await navigator.clipboard.writeText(certUrl); e.target.textContent = 'copied ✓'; setTimeout(()=>e.target.textContent='copy link', 1500); }catch(_){}
  };
  // live re-verification: a clean run must exist for every drill in the track
  try{
    const { data: runs } = await sb.from('runs').select('challenge')
      .eq('user_id', cert.user_id).eq('mouse_used', false).in('challenge', track.keys).limit(5000);
    const have = new Set((runs || []).map(r => r.challenge));
    const missing = track.keys.filter(k => !have.has(k));
    const v = document.getElementById('verify');
    if(missing.length === 0){ v.className = 'c-verify ok'; v.textContent = '✓ verified — ' + track.keys.length + '/' + track.keys.length + ' drills backed by recorded runs'; }
    else { v.className = 'c-verify bad'; v.textContent = '⚠ could not verify — ' + missing.length + ' of ' + track.keys.length + ' drills lack recorded runs'; }
  }catch(e){
    const v = document.getElementById('verify');
    v.className = 'c-verify checking'; v.textContent = 'verification unavailable right now — the certificate record itself is shown above';
  }
}
load();
</script>
</body>
</html>
