<style>
  html{scrollbar-gutter:stable}   /* r68: content filters change page height — without this the centered wrap jumps horizontally */
  :root{
    --bg:#292b31; --surface:#383b42; --surface2:#43474f; --line:#5a5e68;
    --text:#f0f1ec; --muted:#a8adb3; --faint:#767d87;
    --accent:#6ec9a0; --accent-dim:#4a8f72; --accent-glow:rgba(110,201,160,.2);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:1180px;   /* r66: = game space */
  }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}
  header.head{padding:12px 0 10px}   /* r67: flush with the game box */
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px}
  main{padding-bottom:90px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px 26px; margin-bottom:16px}
  .card h4{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.4px; margin-bottom:14px}
  /* title card */
  .tc{border-color:var(--accent-dim); background:linear-gradient(135deg, var(--accent-glow), var(--surface) 55%)}
  .tc-top{display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .tc-emblem{display:inline-flex}
  .tc-name{font-size:24px; font-weight:700; letter-spacing:-.5px}
  .tc-team{font-family:var(--mono); font-size:10.5px; color:var(--warn); border:1px solid var(--warn);
    border-radius:999px; padding:3px 11px; letter-spacing:1px; text-transform:uppercase}
  .tc-meta{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-top:12px; font-family:var(--mono)}
  .tc-lvl{font-size:19px; font-weight:700; color:var(--accent)}
  .tc-bar{flex:1; min-width:130px; height:7px; background:var(--surface2); border-radius:99px; overflow:hidden}
  .tc-bar i{display:block; height:100%; background:var(--accent); border-radius:99px}
  .tc-sub{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:10px}
  .rank-emblem{}
  .emblem-max{}
  /* form bits */
  label{display:block; font-family:var(--mono); font-size:11px; color:var(--muted); margin:12px 0 6px; letter-spacing:.6px}
  input{width:100%; font-family:var(--mono); font-size:13.5px; color:var(--text); background:var(--bg);
    border:1px solid var(--line); border-radius:9px; padding:11px 13px; outline:none}
  input:focus{border-color:var(--accent-dim)}
  .btn{display:inline-block; font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--bg);
    background:var(--accent); border:none; border-radius:9px; padding:11px 20px; margin-top:12px; cursor:pointer}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .btn.danger{background:transparent; color:var(--bad); border:1px solid var(--bad)}
  .msg{font-family:var(--mono); font-size:12px; min-height:16px; margin-top:8px}
  .rowline{display:flex; justify-content:space-between; align-items:baseline; font-family:var(--mono); font-size:13px; padding:6px 0; border-bottom:1px dashed var(--line)}
  .rowline:last-child{border-bottom:none}
  .rowline .k{color:var(--muted); font-size:11.5px}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:38px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); line-height:1.8}
  .state a{color:var(--accent); border-bottom:1px solid var(--accent-dim)}
</style>

<script>
const SUPABASE_URL      = 'https://vshtftzrlepedydmkcnm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yKhIRqtk7w98jUCJYjFWAQ_CMnQ4-yT';
window.sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase)

<header class="head"><div class="wrap"><h1>Account</h1></div></header>

<main><div class="wrap" id="root">
  <div class="state">loading…</div>
</div></main>

<div id="siteFooter"></div>

<script>
const R = window.HK_RANK, D = window.HOTKEY_DRILLS;
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load(){
  const root=document.getElementById('root');
  let me=null;
  try{ const { data:{ session } } = await sb.auth.getSession(); me = session ? session.user : null; }catch(e){}
  const isAnon = me && (!me.email || (me.app_metadata&&me.app_metadata.provider==='anonymous'));
  if(!me || isAnon){
    root.innerHTML='<div class="state">You\u2019re playing as a guest \u2014 your times live only on this device.<br><br>'+
      '<a href="index.html?openAuth=signup">Create an account</a> to claim a handle, post to the boards, and start the climb.</div>';
    return;
  }

  let prof={handle:'',team_code:null}, runs=[];
  try{
    const [p,r] = await Promise.all([
      sb.from('profiles').select('handle,team_code,flair,show_school,school_tag').eq('id',me.id).single(),
      sb.from('runs').select('user_id,challenge,time_ms,created_at').eq('mouse_used',false).order('time_ms',{ascending:true}),
    ]);
    if(p.data) prof=p.data; runs=r.data||[];
  }catch(e){}

  const st = R.standing(runs, me.id, D.menuOrder);
  const tier = R.tierOf(st.avgPct, st.att, st.wsum);
  const mine = runs.filter(x=>x.user_id===me.id);
  const xp = R.computeXP(mine, st);
  const L = R.levelOf(xp);
  const joined = me.created_at ? new Date(me.created_at).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—';

  root.innerHTML = `
    <div class="card tc">
      <div class="tc-top">
        <span class="tc-emblem" style="line-height:0">${window.rankEmblem?window.rankEmblem(tier.name,54,tier.bucket):''}</span>
        <div>
          <div class="tc-name">${esc(prof.handle||'set a handle')}</div>
          <span class="pc-tier ${tier.cls}" style="display:inline-flex;align-items:center;margin-top:4px">${window.rankEmblem?window.rankEmblem(tier.name,13):''}<span>${tier.name}</span></span>
        </div>
        ${prof.team_code?`<span class="tc-team">${esc(prof.team_code)}</span>`:''}
      </div>
      <div class="tc-meta">
        <span class="tc-lvl">${window.hkLevelChip?window.hkLevelChip(L.lvl,24):''} LVL ${L.lvl}</span>
        <span class="tc-bar"><i style="width:${L.pct}%"></i></span>
        <span style="font-size:11px;color:var(--muted)">${L.into}/${L.need} xp</span>
      </div>
      <div class="tc-sub">${st.crowns} crown${st.crowns===1?'':'s'} · ${st.pod} podiums · ${st.att}/${D.menuOrder.length} drills · ${mine.length} clean solves · member since ${joined}</div>
    </div>

    <div class="card"><h4>Profile</h4>
      <label>handle — how you appear on every board</label>
      <input id="acHandle" maxlength="24" value="${esc(prof.handle||'')}" placeholder="pick a handle \u2014 letters, numbers, underscores">
      <button class="btn" id="acHandleSave">Save handle</button>
      <a id="acHandleSugg" style="font-family:var(--mono);font-size:11.5px;color:var(--accent);cursor:pointer;margin-left:10px">&#x2684; suggest one</a>
      <div class="msg" id="acHandleMsg"></div>
      <div id="schoolRow" style="margin-top:10px"></div>
      <div class="rowline" style="margin-top:14px"><span class="k">email</span><span>${esc(me.email||'—')}</span></div>
    </div>

    <div class="card"><h4>Progress</h4>
      <div style="display:flex;align-items:center;gap:16px">
        <span style="line-height:0">${window.rankEmblem?window.rankEmblem(tier.name,56,tier.bucket):''}</span>
        ${window.hkLevelRing?window.hkLevelRing(L.lvl, L.pct, 56):''}
        <div style="font-family:var(--mono);font-size:11.5px;color:var(--muted);line-height:1.7">
          <div style="color:var(--text);font-weight:700">${tier.name}</div>
          <div>LVL ${L.lvl} \u00b7 ${xp.toLocaleString()} xp</div>
          <div>${(st&&st.solves)||0} clean solves</div>
        </div>
      </div>
    </div>

    <div class="card"><h4>Data</h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px">Your runs live on the server under this account. Local device data (PBs cache, streak, achievement flags) can be exported or cleared.</div>
      <button class="btn ghost" id="acExport">Export local data</button>
      <button class="btn ghost" id="acClearLocal" style="margin-left:8px">Clear local cache</button>
      <div class="msg" id="acDataMsg"></div>
    </div>

    <div class="card"><h4>Appearance</h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:8px">Theme applies everywhere, instantly.</div>
      <div id="acThemes" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>

    <div class="card"><h4>Your desk</h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px">Your analyst class, club, or cohort — one desk per player, invite by link.</div>
      <div id="deskBody"><div class="msg">loading\u2026</div></div>
    </div>

    <div class="card"><h4>Card flair <span style="color:var(--warn);font-size:9px;letter-spacing:1px">PRO · free in beta</span></h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px">A border style for your player card, shown wherever your card appears.</div>
      <div id="flairRow" style="display:flex;gap:10px;flex-wrap:wrap">
        ${['none','gold','emerald','holo'].map(f=>`<button class="btn ghost flair-opt${(prof.flair||'none')===f?' on':''}" data-flair="${f}" style="text-transform:capitalize${f==='gold'?';border-color:#e3b341;color:#e3b341':f==='emerald'?';border-color:#2ea36f;color:#2ea36f':f==='holo'?';border-color:#8ab4ff;color:#8ab4ff':''}">${f}</button>`).join('')}
      </div><div class="msg" id="flairMsg"></div>
    </div>

    <div class="card" id="betaTools"><h4>Beta tools <span style="color:var(--faint);font-size:9px">testing only — removed at launch</span></h4>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:10px">Bypass the LVL-10 ranked gate so you can test ranked without grinding. Cosmetic only — your real rating and boards are untouched.</div>
      <button class="btn ghost" id="devRanked">Unlock ranked gate (test)</button>
      <button class="btn ghost" id="devRankedOff" style="margin-left:8px">Reset</button>
      <div class="msg" id="devMsg"></div>
    </div>

    <div class="card"><h4>Security</h4>
      <div class="rowline"><span class="k">password</span><span><button class="btn" id="acPwReset" style="margin:0">Email me a reset link</button></span></div>
      <div class="msg" id="acPwMsg"></div>
      <div class="rowline" style="margin-top:10px;margin-bottom:12px"><span class="k">session</span><span><button class="btn" id="acSignout" style="margin:0">Sign out</button></span></div>
      <label>new password (8+ characters)</label>
      <input id="acP1" type="password" autocomplete="new-password">
      <label>confirm</label>
      <input id="acP2" type="password" autocomplete="new-password">
      <button class="btn" id="acPassSave">Update password</button><div class="msg" id="acPassMsg"></div>
    </div>

    <div class="card"><h4>Session</h4>
      <div class="rowline"><span class="k">pro status</span><span style="color:var(--accent)">beta — everything unlocked</span></div>
      <button class="btn danger" id="acSignout">Sign out</button>
    </div>`;

  const say=(id,t,bad)=>{ const el=document.getElementById(id); if(el){ el.textContent=t; el.style.color=bad?'var(--bad)':'var(--accent)'; } };
  // r81: security + appearance wiring
  const pw=document.getElementById('acPwReset');
  if(pw) pw.onclick=async()=>{ try{
    const {error}=await sb.auth.resetPasswordForEmail(me.email,{redirectTo:location.origin+'/index.html'});
    say('acPwMsg', error?('Could not send: '+error.message):'Reset link sent \u2014 check your inbox.', !!error);
  }catch(e){ say('acPwMsg','Could not send the reset email.',true); } };
  const ex=document.getElementById('acExport');
  if(ex) ex.onclick=()=>{ try{
    const dump={}; ['hotkey_pb','hotkey_streak','hotkey_solves','hk_ach_flags','hk_ach_seen','hk_xp_est','hk_runs_lite','hk_clears'].forEach(k=>dump[k]=localStorage.getItem(k));
    const blob=new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(blob); const aEl=document.createElement('a');
    aEl.href=u; aEl.download='hotkey-local-data.json'; aEl.click(); URL.revokeObjectURL(u);
    document.getElementById('acDataMsg').textContent='exported.';
  }catch(e){ document.getElementById('acDataMsg').textContent='export failed.'; } };
  const cl=document.getElementById('acClearLocal');
  if(cl) cl.onclick=()=>{ try{
    ['hk_ach_flags','hk_xp_est','hk_runs_lite','hk_clears'].forEach(k=>localStorage.removeItem(k));
    document.getElementById('acDataMsg').textContent='local cache cleared (PBs + streak kept; server runs untouched).';
  }catch(e){} };
  const so=document.getElementById('acSignout');
  if(so) so.onclick=async()=>{ try{ await sb.auth.signOut(); }finally{ location.href='index.html'; } };
  const th=document.getElementById('acThemes');
  if(th && window.THEMES){ Object.entries(window.THEMES).forEach(([k,t])=>{
    const b=document.createElement('button'); b.className='btn'; b.style.margin='0'; b.textContent=t.name||k;
    b.onclick=()=>{ try{ window.applyTheme(k); }catch(e){} };
    th.appendChild(b); }); }
    { const sg=document.getElementById('acHandleSugg');
    if(sg) sg.onclick=()=>{ const el=document.getElementById('acHandle');
      if(el && window.hkSuggestHandle){ el.value=window.hkSuggestHandle(); el.focus(); } }; }
  document.getElementById('acHandleSave').onclick=async()=>{
    const v=document.getElementById('acHandle').value.trim().slice(0,24);
    if(!/^[A-Za-z0-9_]{2,24}$/.test(v)){ say('acHandleMsg','2\u201324 characters \u2014 letters, numbers, and underscores only.',true); return; }
    // light client pre-check; the server enforces the real blocklist + leetspeak folding
    { const folded=v.toLowerCase().replace(/[_0134578]/g,'');
      if(['admin','hotkey','moderator','staff','official'].some(b=>v.toLowerCase().includes(b)||folded.includes(b))){
        say('acHandleMsg','That handle is reserved \u2014 pick another.',true); return; } }
    try{ const {error}=await sb.from('profiles').upsert({id:me.id, handle:v},{onConflict:'id'});
      if(!error){ try{ (window.navRefreshAuth||function(){})(); }catch(e){} }   // r81: nav shows the new handle immediately
      if(error){
        const msg=String(error.message||'');
        if(msg.indexOf('HANDLE_COOLDOWN')>=0){ const d=msg.split(':')[1]||''; say('acHandleMsg','Handles can change once every 7 days \u2014 next change available '+d+'.',true); return; }
        if(msg.indexOf('HANDLE_RESERVED')>=0){ say('acHandleMsg','That handle is reserved \u2014 pick another.',true); return; }
        if(msg.indexOf('duplicate')>=0||msg.indexOf('profiles_handle_lower_uidx')>=0){ say('acHandleMsg','That handle is taken \u2014 try a variation.',true); return; }
        if(msg.indexOf('handle_format')>=0){ say('acHandleMsg','Letters, numbers, and underscores only (2\u201324 chars).',true); return; }
        say('acHandleMsg','Couldn\u2019t save \u2014 try again.',true); return;
      }
      say('acHandleMsg','Saved \u2713 \u2014 the boards update on next load. (Handles can change once every 7 days.)'); }catch(e){ say('acHandleMsg','Something went wrong.',true); }
  };
  // DESKS v1 (r110): create / join / invite / leave, all through security-definer RPCs.
  // The invite code never comes from a table read — my_desk() returns it to captains only.
  const deskErr = e => { const m=String((e&&e.message)||e||'');
    if(m.includes('DESK_NAME_PROTECTED')) return 'Real firm and group names are reserved \u2014 verified desks are coming.';
    if(m.includes('DESK_NAME_RESERVED')) return 'That name isn\u2019t available.';
    if(m.includes('ALREADY_ON_DESK'))   return 'You\u2019re already on a desk \u2014 leave it first.';
    if(m.includes('DESK_NOT_FOUND'))    return 'That invite code isn\u2019t valid.';
    if(m.includes('DESK_FULL'))         return 'That desk is full (200).';
    if(m.includes('DESK_RATE_LIMIT'))   return 'One desk per day \u2014 try again tomorrow.';
    if(m.includes('NOT_CAPTAIN'))       return 'Only the staffer can do that.';   // r138: product word is STAFFER (schema role stays captain)
    if(m.includes('ASSIGN_CAP'))        return 'Three live assignments max — clear one first.';
    if(m.includes('duplicate key'))     return 'A desk with that name already exists.';
    return 'Something went wrong.'; };
  // r130: DESK ASSIGNMENTS — the captain pins up to 3 drills for the week; analysts
  // see them here + marked in the game's picker. Completion lives on the desk boards.
  async function renderAssignments(d){
    const host=document.getElementById('asgWrap'); if(!host) return;
    let rows=[];
    try{ const {data}=await sb.from('team_assignments')
      .select('challenge,target_ms,note,expires_at')
      .eq('team_id', d.team_id).gt('expires_at', new Date().toISOString())
      .order('created_at'); rows=data||[]; }catch(e){}
    const D=window.HOTKEY_DRILLS||{}, lab=k=>(D.nameOf&&D.nameOf[k])||k;
    const days=x=>Math.max(1,Math.ceil((new Date(x)-Date.now())/86400000));
    let h='<div class="rowline"><span class="k">assignments</span><span style="font-size:11px;color:var(--muted)">'+
      (rows.length ? rows.length+' live this week'
        : (d.role==='captain' ? 'pin up to 3 drills for the week' : 'your staffer hasn’t pinned any yet'))+'</span></div>';
    rows.forEach(r=>{
      h+='<div class="rowline" style="align-items:center"><span style="font-family:var(--mono);font-size:12px"><b>'+esc(lab(r.challenge))+'</b>'+
        (r.target_ms?' · under '+(r.target_ms/1000)+'s':'')+
        (r.note?' · <span style="color:var(--muted)">'+esc(r.note)+'</span>':'')+
        ' <span style="color:var(--faint)">· '+days(r.expires_at)+'d left</span></span>'+
        (d.role==='captain'
          ? '<button class="btn ghost asgDel" data-k="'+esc(r.challenge)+'" style="margin:0;padding:2px 9px" title="clear assignment">×</button>'
          : '<a class="btn ghost" style="margin:0;padding:2px 9px;text-decoration:none" href="index.html?drill='+esc(r.challenge)+'">Play</a>')+'</div>';
    });
    if(d.role==='captain'){
      const opts=((D.menuOrder)||[]).map(k=>'<option value="'+k+'">'+esc(lab(k))+'</option>').join('');
      h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center">'+
        '<input id="asgKey" list="asgList" placeholder="drill — e.g. debtsched" style="width:170px"><datalist id="asgList">'+opts+'</datalist>'+
        '<input id="asgTgt" type="number" min="1" max="3600" step="1" placeholder="target s (opt)" style="width:120px">'+
        '<input id="asgNote" maxlength="120" placeholder="note (opt)" style="flex:1;min-width:140px">'+
        '<button class="btn ghost" id="asgAdd" style="margin:0">Pin</button></div>'+
        '<div class="msg" id="asgMsg"></div>'+
        /* r149: PROGRAM TEMPLATES — captains shouldn't design curriculum. A program is a
           4-week quest sequence pinned one click a week; progress lives locally per desk
           (the server only ever holds this week's pins — cap-3 / 1-week expiry unchanged). */
        '<div class="rowline" style="margin-top:12px"><span class="k">program templates</span>'+
        '<span style="font-size:11px;color:var(--muted)">a 4-week quest sequence — pin a week, come back next week</span></div>'+
        '<div id="progWrap"></div>';
    }
    host.innerHTML=h;
    if(d.role==='captain') renderPrograms(d, rows);
    host.querySelectorAll('.asgDel').forEach(b=>{ b.onclick=async()=>{ try{
      const {error}=await sb.rpc('clear_assignment',{p_challenge:b.dataset.k});
      if(error){ say('asgMsg',deskErr(error),true); return; }
      renderAssignments(d); }catch(e){ say('asgMsg','Something went wrong.',true); } }; });
    const add=document.getElementById('asgAdd');
    if(add) add.onclick=async()=>{
      const k=(document.getElementById('asgKey').value||'').trim().toLowerCase();
      if(!k || (D.menuOrder && D.menuOrder.indexOf(k)<0)){ say('asgMsg','Pick a real drill from the list.',true); return; }
      const tv=parseFloat(document.getElementById('asgTgt').value);
      const tgt=(isFinite(tv)&&tv>0)?Math.round(tv*1000):null;
      try{ const {error}=await sb.rpc('set_assignment',{p_challenge:k, p_target_ms:tgt,
          p_note:(document.getElementById('asgNote').value||'').trim()||null});
        if(error){ say('asgMsg',deskErr(error),true); return; }
        renderAssignments(d);
      }catch(e){ say('asgMsg','Something went wrong.',true); } };
  }
  /* r149: PROGRAM TEMPLATES — three presets that turn the quest system into a training
     program. Each week is <=3 drills (the live cap); "pin week N" clears the current
     pins and sets the week's. Speed weeks carry par-derived targets (par × 1.5). */
  const PROGRAMS={
    intern0:{name:'Intern week 0', pitch:'zero to desk-ready — movement, formatting, first formulas, find-and-fix', weeks:[
      {note:'get moving, no mouse',        keys:['navigation','copyover','saves']},
      {note:'desk-standard formatting',    keys:['housestyle','format','blue']},
      {note:'first formulas',              keys:['margin','growth','foot']},
      {note:'find it and fix it',          keys:['modeltour','audit','triage']}]},
    bootcamp:{name:'First-year bootcamp', pitch:'the modeling core — clean-up, functions, schedules, statements', weeks:[
      {note:'clean-up week',               keys:['housestyle','editfix','pastes']},
      {note:'function week',               keys:['percent','sumif','lookup']},
      {note:'schedule week',               keys:['schedule','debtsched','nwcsched']},
      {note:'statement week',              keys:['cfslink','bsbuild','threestmt']}]},
    speed:{name:'Speed weeks', pitch:'PB-chase under par-based bars, basics to models', mult:1.5, weeks:[
      {note:'speed: the basics',           keys:['navigation','format','margin']},
      {note:'speed: the sheet',            keys:['foot','percent','series']},
      {note:'speed: data + lookups',       keys:['sort','lookup','sumif']},
      {note:'speed: the models',           keys:['dcf','waterfall','lbo']}]}
  };
  let __progArmed=false;
  function renderPrograms(d, liveRows){
    const w=document.getElementById('progWrap'); if(!w) return;
    const D=window.HOTKEY_DRILLS||{}, lab=k=>(D.nameOf&&D.nameOf[k])||k;
    const skey='hk_prog_'+d.team_id;
    let st=null; try{ st=JSON.parse(localStorage.getItem(skey)||'null'); }catch(e){}
    if(st && !PROGRAMS[st.tpl]) st=null;
    const save=v=>{ try{ v?localStorage.setItem(skey,JSON.stringify(v)):localStorage.removeItem(skey); }catch(e){} };
    const pinWeek=async(tpl, weekIdx)=>{
      const P=PROGRAMS[tpl], wkDef=P.weeks[weekIdx];
      if(!wkDef) return;
      if(liveRows.length && !__progArmed){ __progArmed=true;
        say('asgMsg','This replaces the current pins — click again to confirm.',true);
        setTimeout(()=>{__progArmed=false;},3000); return; }
      __progArmed=false;
      try{
        for(const r of liveRows){ const {error}=await sb.rpc('clear_assignment',{p_challenge:r.challenge});
          if(error){ say('asgMsg',deskErr(error),true); return; } }
        const PARS=window.HOTKEY_PARS||{};
        for(const k of wkDef.keys){
          if(D.menuOrder && D.menuOrder.indexOf(k)<0) continue;   // catalog drift guard
          const tgt=P.mult&&PARS[k] ? Math.round(PARS[k]*P.mult)*1000 : null;
          const {error}=await sb.rpc('set_assignment',{p_challenge:k, p_target_ms:tgt,
            p_note:P.name+' w'+(weekIdx+1)+': '+wkDef.note});
          if(error){ say('asgMsg',deskErr(error),true); return; }
        }
        save({tpl:tpl, week:weekIdx+1});   // .week = weeks completed
        if(window.hkEvent) window.hkEvent('program_pin',{tpl:tpl, week:weekIdx+1});
        await renderAssignments(d);   // re-render first — say() after, or the message gets wiped
        say('asgMsg','Week '+(weekIdx+1)+' pinned — '+wkDef.keys.map(lab).join(', ')+'.');
      }catch(e){ say('asgMsg','Something went wrong.',true); }
    };
    if(st){
      const P=PROGRAMS[st.tpl], nxt=st.week;   // next week INDEX to pin (0-based = weeks done)
      let h='<div style="font-family:var(--mono);font-size:12px;margin-top:6px"><b>'+esc(P.name)+'</b> — '+
        P.weeks.map((wkDef,i)=>'<span style="color:'+(i<st.week?'var(--accent)':'var(--muted)')+'">w'+(i+1)+(i<st.week?' ✓':'')+'</span>').join(' · ')+'</div>';
      if(nxt<P.weeks.length){
        h+='<div style="font-size:11.5px;color:var(--muted);margin:4px 0">next — <b>week '+(nxt+1)+': '+esc(P.weeks[nxt].note)+'</b> · '+
          P.weeks[nxt].keys.map(k=>esc(lab(k))).join(', ')+(P.mult?' (targets: par × '+P.mult+')':'')+'</div>'+
          '<div style="display:flex;gap:8px;align-items:center;margin-top:4px">'+
          '<button class="btn ghost prog-pin" data-w="'+nxt+'" style="margin:0">Pin week '+(nxt+1)+'</button>'+
          '<a class="prog-drop" style="cursor:pointer;font-size:11px;color:var(--faint)">abandon program</a></div>';
      } else {
        h+='<div style="font-size:11.5px;color:var(--accent);margin:4px 0">program complete — all 4 weeks pinned. Run it back or pick another.</div>'+
          '<div style="display:flex;gap:8px;align-items:center;margin-top:4px">'+
          '<a class="prog-drop" style="cursor:pointer;font-size:11px;color:var(--faint)">clear program</a></div>';
      }
      w.innerHTML=h;
      w.querySelectorAll('.prog-pin').forEach(b=>b.onclick=()=>pinWeek(st.tpl, parseInt(b.dataset.w,10)));
      const dr=w.querySelector('.prog-drop'); if(dr) dr.onclick=()=>{ save(null); renderPrograms(d, liveRows); };
    } else {
      w.innerHTML=Object.entries(PROGRAMS).map(([id,P])=>
        '<div style="display:flex;gap:10px;align-items:baseline;margin-top:6px;font-family:var(--mono);font-size:12px">'+
        '<button class="btn ghost prog-start" data-t="'+id+'" style="margin:0;white-space:nowrap">'+esc(P.name)+'</button>'+
        '<span style="font-size:11px;color:var(--muted)">'+esc(P.pitch)+'</span></div>').join('');
      w.querySelectorAll('.prog-start').forEach(b=>b.onclick=()=>{ save({tpl:b.dataset.t, week:0}); renderPrograms(d, liveRows); });
    }
  }
  async function renderDesk(){
    const el=document.getElementById('deskBody'); if(!el) return;
    let d=null;
    try{ const {data}=await sb.rpc('my_desk'); d=(data&&data[0])||null; }catch(e){}
    if(d){
      const inv = d.invite_code
        ? `<div class="rowline"><span class="k">invite link</span><span style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><code id="deskLink" style="font-size:11px">https://www.hotkey.gg/?desk=${esc(d.invite_code)}</code><button class="btn ghost" id="deskCopy" style="margin:0">Copy</button><button class="btn ghost" id="deskRotate" style="margin:0" title="new code — old invite links stop working">Rotate</button></span></div>`
        : '';
      el.innerHTML = `<div class="rowline"><span class="k">desk</span><b>${esc(d.name)}</b></div>
        <div class="rowline"><span class="k">analysts</span><span>${d.members} / 200</span></div>
        <div class="rowline"><span class="k">your role</span><span>${d.role==='captain'?'staffer':'analyst'}</span></div>
        ${inv}
        <div id="asgWrap" style="margin-top:6px"></div>
        <div style="margin-top:10px;display:flex;gap:10px;align-items:center"><a class="btn ghost" style="text-decoration:none" href="leaderboard.html?desk=${esc(d.slug)}">Desk boards \u2192</a><button class="btn ghost" id="deskLeave" style="margin:0">Leave desk</button></div>
        <div class="msg" id="deskMsg"></div>`;
      renderAssignments(d);
      const cp=document.getElementById('deskCopy');
      if(cp) cp.onclick=async()=>{ try{ await navigator.clipboard.writeText(document.getElementById('deskLink').textContent);
        say('deskMsg','Link copied \u2014 drop it in the group chat.'); }catch(e){ say('deskMsg','Copy failed \u2014 select the link and copy it.',true); } };
      const rt=document.getElementById('deskRotate'); let rtArmed=false;
      if(rt) rt.onclick=async()=>{
        if(!rtArmed){ rtArmed=true; rt.textContent='Rotate \u2014 old links die'; setTimeout(()=>{rtArmed=false; rt.textContent='Rotate';},2600); return; }
        try{ const {data,error}=await sb.rpc('rotate_invite');
          if(error){ say('deskMsg',deskErr(error),true); return; }
          const lk=document.getElementById('deskLink'); if(lk&&data) lk.textContent='https://www.hotkey.gg/?desk='+data;
          say('deskMsg','New code minted \u2014 the old invite links are dead.'); rt.textContent='Rotate'; rtArmed=false;
        }catch(e){ say('deskMsg','Something went wrong.',true); } };
      const lv=document.getElementById('deskLeave'); let armed=false;
      if(lv) lv.onclick=async()=>{
        if(!armed){ armed=true; lv.textContent='Click again to confirm'; setTimeout(()=>{armed=false; lv.textContent='Leave desk';},2600); return; }
        try{ const {error}=await sb.rpc('leave_desk'); if(error){ say('deskMsg',deskErr(error),true); return; }
          say('deskMsg','You\u2019ve left the desk.'); renderDesk(); }catch(e){ say('deskMsg','Something went wrong.',true); } };
    } else {
      el.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input id="deskName" maxlength="40" placeholder="desk name \u2014 e.g. Wharton UG Finance" style="flex:1;min-width:200px">
          <label style="font-size:11px;display:flex;align-items:center;gap:5px;color:var(--muted)"><input type="checkbox" id="deskPriv"> private</label>
          <button class="btn" id="deskCreate" style="margin:0">Start a desk</button></div>
        <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
          <input id="deskCode" maxlength="12" placeholder="have an invite code?" style="width:180px">
          <button class="btn ghost" id="deskJoin" style="margin:0">Join</button></div>
        <div class="msg" id="deskMsg"></div>`;
      document.getElementById('deskCreate').onclick=async()=>{
        const n=document.getElementById('deskName').value.trim();
        if(n.length<3){ say('deskMsg','Give the desk a real name (3+ characters).',true); return; }
        try{ const {error}=await sb.rpc('create_desk',{p_name:n, p_private:document.getElementById('deskPriv').checked});
          if(error){ say('deskMsg',deskErr(error),true); return; }
          renderDesk(); }catch(e){ say('deskMsg','Something went wrong.',true); } };
      document.getElementById('deskJoin').onclick=async()=>{
        const c=document.getElementById('deskCode').value.trim();
        if(!c){ say('deskMsg','Paste the invite code from your staffer.',true); return; }
        try{ const {error}=await sb.rpc('join_desk',{p_code:c});
          if(error){ say('deskMsg',deskErr(error),true); return; }
          renderDesk(); }catch(e){ say('deskMsg','Something went wrong.',true); } };
    }
  }
  renderDesk();
  // r122 SCHOOL TAG (v1.5): derived server-side from the auth email — the domain IS
  // the verification. Display is opt-in per Wolf.
  (async()=>{ try{
    const {data:tag}=await sb.rpc('refresh_school_tag');
    const row=document.getElementById('schoolRow'); if(!row) return;
    if(!tag){ row.innerHTML=''; return; }
    row.innerHTML='<div class="rowline"><span class="k">school</span><span style="display:flex;gap:10px;align-items:center">'+
      '<b style="font-family:var(--mono);font-size:12.5px">'+esc(tag)+'</b>'+
      '<label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px">'+
      '<input type="checkbox" id="showSchool" '+(prof.show_school?'checked':'')+'> show on my card &amp; boards</label></span></div>';
    const cb=document.getElementById('showSchool');
    if(cb) cb.onchange=async()=>{ try{ await sb.from('profiles').update({show_school:cb.checked}).eq('id',me.id); }catch(e){} };
  }catch(e){} })();
  // home desk one-tap: membership by domain (captaincy still only via invite code)
  (async()=>{ try{
    const el=document.getElementById('deskBody'); if(!el) return;
    const {data}=await sb.rpc('home_desk_for_me'); const h=(data&&data[0])||null;
    if(!h) return;
    const btnRow=document.createElement('div');
    btnRow.style.cssText='margin-bottom:10px';
    btnRow.innerHTML='<button class="btn" id="joinHome" style="margin:0">Join '+esc(h.name)+' \u2014 your school\u2019s desk ('+h.members+' on it)</button><div class="msg" id="homeMsg"></div>';
    el.prepend(btnRow);
    document.getElementById('joinHome').onclick=async()=>{ try{
      const {error}=await sb.rpc('join_home_desk');
      if(error){ say('homeMsg',deskErr(error),true); return; }
      renderDesk(); }catch(e){ say('homeMsg','Something went wrong.',true); } };
  }catch(e){} })();
  document.getElementById('acPassSave').onclick=async()=>{
    const p1=document.getElementById('acP1').value, p2=document.getElementById('acP2').value;
    if(p1.length<8){ say('acPassMsg','Password needs at least 8 characters.',true); return; }
    if(p1!==p2){ say('acPassMsg','Passwords don\u2019t match.',true); return; }
    try{ const {error}=await sb.auth.updateUser({password:p1});
      if(error){ say('acPassMsg',error.message||'Couldn\u2019t update.',true); return; }
      say('acPassMsg','Password updated \u2713'); }catch(e){ say('acPassMsg','Something went wrong.',true); }
  };
  document.querySelectorAll('.flair-opt').forEach(b=>b.onclick=async()=>{
    const f=b.dataset.flair==='none'?null:b.dataset.flair;
    try{ const {error}=await sb.from('profiles').update({flair:f}).eq('id',me.id);
      if(error){ say('flairMsg','Couldn\u2019t save \u2014 try again.',true); return; }
      document.querySelectorAll('.flair-opt').forEach(x=>x.classList.toggle('on',x===b));
      say('flairMsg','Flair set \u2713'); }catch(e){ say('flairMsg','Something went wrong.',true); }
  });
  { const dv=document.getElementById('devRanked'), dro=document.getElementById('devRankedOff');
    if(dv) dv.onclick=()=>{ try{ localStorage.setItem('hk_dev_unlock','1'); localStorage.setItem('hk_ranked','1'); }catch(e){}
      say('devMsg','Ranked unlocked for testing ✓ — open the leaderboard.'); };
    if(dro) dro.onclick=()=>{ try{ localStorage.removeItem('hk_dev_unlock'); localStorage.removeItem('hk_ranked'); }catch(e){}
      say('devMsg','Reset ✓ — the real gate applies again.'); } }
  document.getElementById('acSignout').onclick=async()=>{ try{ await sb.auth.signOut(); }catch(e){} location.href='index.html'; };
}
load();
</script>
