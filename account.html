<style>
  html{scrollbar-gutter:stable}   /* r68: content filters change page height — without this the centered wrap jumps horizontally */
  :root{
    --bg:#292b31; --surface:#383b42; --surface2:#43474f; --line:#5a5e68;
    --text:#f0f1ec; --muted:#a8adb3; --faint:#767d87;
    --accent:#6ec9a0; --accent-dim:#4a8f72; --accent-glow:rgba(110,201,160,.2);
    --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
    --maxw:1180px;   /* r66: = game space */
  }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 24px; position:relative; z-index:1}
  a{color:inherit; text-decoration:none}
  header.head{padding:12px 0 10px}   /* r67: flush with the game box */
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px}
  main{padding-bottom:90px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px 24px; margin-bottom:14px}
  .card h4{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.4px; margin-bottom:14px}
  /* r393 (Wolf): "keep the card in place but a smaller version" — the account hero is a
     compact identity strip now: tighter padding and a 48px emblem (was 64), so it reads as
     a slim card rather than a full banner. */
  .tc{border-color:var(--accent-dim); background:linear-gradient(135deg, var(--accent-glow), var(--surface) 55%); padding:16px 22px}
  .tc-top{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .tc-emblem{display:inline-flex}
  .tc-name{font-size:21px; font-weight:700; letter-spacing:-.5px}
  .tc-team{font-family:var(--mono); font-size:10.5px; color:var(--warn); border:1px solid var(--warn);
    border-radius:999px; padding:3px 11px; letter-spacing:1px; text-transform:uppercase}
  .tc-meta{display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-top:12px; font-family:var(--mono)}
  .tc-lvl{font-size:19px; font-weight:700; color:var(--accent)}
  .tc-bar{flex:1; min-width:130px; height:7px; background:var(--surface2); border-radius:99px; overflow:hidden}
  .tc-bar i{display:block; height:100%; background:var(--accent); border-radius:99px}
  .tc-sub{font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:10px}
  /* r383 (Wolf: big crest + a dead right half): the tc-sub counters graduate to an
     N-up stat strip on the top row's right edge (r382 stat-grid grammar); the sub
     line keeps only member-since. Strip drops under the name ≤820px. */
  .tc-stats{display:grid; grid-template-columns:repeat(5,minmax(72px,auto)); gap:8px; margin-left:auto}
  .tc-stat{background:var(--surface2); border:1px solid var(--line); border-radius:10px; padding:8px 12px;
    text-align:center; font-family:var(--mono)}
  .tc-stat b{display:block; font-size:17px; font-variant-numeric:tabular-nums}
  .tc-stat span{font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px}
  @media(max-width:820px){ .tc-stats{margin-left:0; width:100%; grid-template-columns:repeat(5,1fr)} }
  /* r383 (Wolf: the whole page was ONE full-width column — every rowline a
     label-left/value-right pair with a 300–930px dead middle): 2-up card grid at
     ≥1080px. Cards pair off at half width and the rowline middles collapse with
     them; the title card and the frame gallery keep the full row. One column again
     below 1080px, where the cards were already dense. */
  /* r393 (Wolf): the account leads with the REAL player card as a left-side block ("people see
     their super cool card and are less ready to cancel"); the admin sections fill the right;
     Delete account is pinned full-width at the very bottom. Two explicit balanced columns. */
  /* r395 (Wolf): flush rows, not a masonry. Each .acc-row is a flex pair whose cards
     stretch to equal height, so every object's top and bottom line up with its neighbour's
     and nothing sits as a tall standalone column. Rows wrap to one column under 1024px. */
  #root{display:block}
  .acc-row{display:flex; gap:16px; align-items:stretch; margin-bottom:16px}
  .acc-row .card{margin:0}
  .acc-grow{flex:1 1 320px; min-width:0}
  .acc-stack{flex:1 1 320px; min-width:0; display:flex; flex-direction:column; gap:16px}
  .acc-stack > .card{flex:1; margin:0}
  @media(max-width:1023px){
    .acc-row{flex-wrap:wrap}
    .acc-cardblock, .acc-grow, .acc-stack{flex:1 1 100%}
  }
  /* the player-card block (card + buttons + member-since) */
  .acc-cardblock{flex:0 0 462px; display:flex; flex-direction:column; align-items:center; gap:12px; margin:0}
  .acc-card{width:100%; max-width:462px; background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden}
  .acc-card.pc-bare{background:transparent; border:0; overflow:visible}
  .acc-card .uc{padding:22px 24px 20px; border-radius:16px}
  .acc-cardbtns{display:flex; gap:10px; width:100%; max-width:462px}
  .acc-theme{width:100%; max-width:462px}
  .acc-cardbtns .btn{flex:1; margin:0; text-align:center}
  .acc-since{font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.04em; margin-top:0}
  .acc-delete{margin-top:0}
  .acc-certs{border-color:var(--accent-dim)}
  .acc-certs h4{color:var(--accent)}
  .cert-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  @media(max-width:720px){ .cert-grid{grid-template-columns:1fr} }
  .cert-tile{background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; display:flex; flex-direction:column; gap:9px}
  .cert-tile.done{border-color:var(--accent-dim)}
  .cert-tile .t{font-size:13px; font-weight:600; line-height:1.3}
  .cert-tile .bar{height:7px; background:var(--bg); border-radius:99px; overflow:hidden}
  .cert-tile .bar i{display:block; height:100%; background:var(--accent); border-radius:99px}
  .cert-tile .meta{display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:auto}
  /* r396 (Wolf): tight credential/field rows — label left, value + inline actions grouped
     next to it (no dead middle), progressive-disclosure reveals for change-email / new
     password / 2FA so the card stays compact until you act. */
  .fieldrow{display:flex; align-items:baseline; gap:12px; padding:9px 0; border-bottom:1px dashed var(--line)}
  .fieldrow:last-child{border-bottom:none}
  .fieldrow .fk{flex:0 0 92px; font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:.4px}
  .fieldrow .fv{flex:1 1 auto; min-width:0; font-family:var(--mono); font-size:13px; display:flex; flex-wrap:wrap; align-items:center; gap:8px}
  .lnk{font-family:var(--mono); font-size:11.5px; color:var(--accent); cursor:pointer; white-space:nowrap}
  .lnk:hover{text-decoration:underline}
  .badge{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.6px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted)}
  .badge.ok{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-glow)}
  .badge.warn{color:var(--warn); border-color:var(--warn)}
  .reveal{margin-top:10px}
  .reveal[hidden]{display:none}
  .acc-bill{border-color:var(--warn)}
  .acc-bill h4{color:var(--warn)}
  /* account-setup checklist in the Profile card */
  .setup{margin-top:16px; border-top:1px dashed var(--line); padding-top:13px}
  .setup-h{font-family:var(--mono); font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; display:flex; justify-content:space-between; margin-bottom:9px}
  .setup-i{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:12.5px; padding:4px 0}
  .setup-i .dot{flex:0 0 16px; height:16px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:9px; border:1px solid var(--line); color:var(--faint)}
  .setup-i.on .dot{background:var(--accent); border-color:var(--accent); color:var(--on-accent,#fff)}
  .setup-i .sl{flex:1}
  .setup-i.on .sl{color:var(--muted)}
  .setup-i a{color:var(--accent); cursor:pointer}
  .rank-emblem{}
  .emblem-max{}
  /* form bits */
  label{display:block; font-family:var(--mono); font-size:11px; color:var(--muted); margin:12px 0 6px; letter-spacing:.6px}
  input{width:100%; font-family:var(--mono); font-size:13.5px; color:var(--text); background:var(--bg);
    border:1px solid var(--line); border-radius:9px; padding:11px 13px; outline:none}
  input:focus{border-color:var(--accent-dim)}
  .btn{display:inline-flex; align-items:center; justify-content:center; line-height:1; text-decoration:none;
    font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--on-accent);
    background:var(--accent); border:none; border-radius:9px; padding:11px 20px; margin-top:12px; cursor:pointer}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .btn.danger{background:transparent; color:var(--bad); border:1px solid var(--bad)}
  .msg{font-family:var(--mono); font-size:12px; min-height:16px; margin-top:8px}
  /* r393 (Wolf): the rowlines stretched label-left / value-right across the wide right cards,
     leaving a dead horizontal middle. Group them left (label, then value) so each row is tight;
     .rowline.spread opts back into edge-to-edge for the few rows that want a right-pinned action. */
  .rowline{display:flex; justify-content:flex-start; align-items:baseline; gap:16px; font-family:var(--mono); font-size:13px; padding:6px 0; border-bottom:1px dashed var(--line)}
  .rowline .k{min-width:150px}
  .rowline.spread{justify-content:space-between; gap:12px}
  .rowline:last-child{border-bottom:none}
  .rowline .k{color:var(--muted); font-size:11.5px}
  .state{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:38px 28px; text-align:center;
    font-family:var(--mono); font-size:13.5px; color:var(--muted); line-height:1.8}
  .state a{color:var(--accent); border-bottom:1px solid var(--accent-dim)}
  .state a.acc-cta{color:var(--on-accent,#0c0d0e)}   /* r297: the .state link rule was out-specifying the CTA — its label rendered accent-on-accent, invisible in every theme */
  .acc-cta{display:inline-block; font-family:var(--mono); font-size:13px; text-decoration:none;
    border:1px solid var(--accent); background:var(--accent); color:var(--on-accent,#0c0d0e); font-weight:700;
    padding:10px 22px; border-radius:999px; margin:4px 6px; border-bottom:1px solid var(--accent)}
  .acc-cta:hover{filter:brightness(1.08)}
  .acc-cta.ghost{background:transparent; color:var(--accent); border-color:var(--accent-dim); font-weight:500}
  .state a.acc-cta.ghost{color:var(--accent)}   /* r355: the r297 on-accent fix out-specified the ghost variant — 'Log in' rendered white-on-light, invisible */
  .acc-cta.ghost:hover{background:var(--accent-glow)}
</style>

<header class="head"><div class="wrap"><h1>Account</h1></div></header>

<main><div class="wrap" id="root">
  <div class="state">loading…</div>
</div></main>

<div id="siteFooter"></div>

<script>
const R = window.HK_RANK, D = window.HOTKEY_DRILLS;
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load(){
  const root=document.getElementById('root');
  let me=null;
  try{ const { data:{ session } } = await sb.auth.getSession(); me = session ? session.user : null; }catch(e){}
  const isAnon = me && (!me.email || (me.app_metadata&&me.app_metadata.provider==='anonymous'));
  if(!me || isAnon){
    // r292 (Wolf): offer BOTH create-account and log-in here \u2014 a dropped/expired session
    // used to strand the user on a create-only screen with no way back in.
    root.innerHTML='<div class="state">You\u2019re playing as a guest \u2014 your times live only on this device.<br><br>'+
      '<a class="acc-cta" href="index.html?openAuth=signup">Create an account</a>'+
      '<a class="acc-cta ghost" href="index.html?openAuth=signin">Log in</a>'+
      '<div style="font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:14px">Create an account to claim a handle, post to the boards, and start the climb.</div></div>';
    return;
  }

  let prof={handle:'',team_code:null}, runs=[];
  try{
    const [p,r] = await Promise.all([
      sb.from('profiles').select('handle,team_code,flair,show_school,school_tag,digest_optout,featured_ach').eq('id',me.id).single(),
      sb.from('runs').select('user_id,challenge,time_ms,created_at').eq('mouse_used',false).order('time_ms',{ascending:true}),
    ]);
    if(p.data) prof=p.data; runs=r.data||[];
  }catch(e){}

  const st = R.standing(runs, me.id, D.menuOrder);
  const tier = R.tierOf(st.avgPct, st.att, st.wsum);
  const mine = runs.filter(x=>x.user_id===me.id);
  let mySes=[]; try{ const se=await sb.from('sessions').select('user_id,mode').eq('user_id', me.id); mySes=se.data||[]; }catch(e){}
  const plBoards = R.boardCounts ? R.boardCounts(runs, me.id, D.menuOrder) : st;
  const xp = R.computeXP(mine, plBoards, mySes);   /* r371: full signature — same level everywhere */
  const L = R.levelOf(xp);
  const joined = me.created_at ? new Date(me.created_at).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '—';
  /* r393 (Wolf): the hero had a dead middle — identity left, stats far right. A 5th tile
     (streak) widens the strip so it reads across, not pinned to the edge. */
  let streakN=0; try{ streakN=(JSON.parse(localStorage.getItem('hotkey_streak')||'{}').n)||0; }catch(e){}

  /* r393 (Wolf): the account leads with the REAL player card (the one profile/leaderboard show)
     as a left-side block — "people see their super cool card and are less ready to cancel."
     Same unified component (hkPlayerCard) + skin + medals as everywhere else. */
  const cardFlair = (window.hkFlair ? window.hkFlair(prof.flair).frame : null);
  const cardIsSkin = !!(cardFlair && window.HK_FRAMES && window.HK_FRAMES.some(f=>f.id===cardFlair));
  let cardMedals=[];
  try{ const AC=window.HOTKEY_ACHIEVEMENTS;
    let picks=[]; if(prof.featured_ach!=null) picks=String(prof.featured_ach).split(',').filter(Boolean);
    if(!picks.length){ try{ picks=JSON.parse(localStorage.getItem('hk_feat_ach')||'[]'); }catch(e){} }
    const byId={}; (AC||[]).forEach(a=>byId[a.id]=a);
    cardMedals=picks.map(id=>byId[id]).filter(Boolean).slice(0,5).map(a=>({glyph:a.glyph,name:a.name,size:30,
      rarity:window.hkEffRarity?window.hkEffRarity(a.tier):undefined}));
  }catch(e){}
  let cardTags='';
  try{ if(prof.show_school && prof.school_tag){ const nm=((window.schoolResolve&&window.schoolResolve(prof.school_tag))||{}).name||prof.school_tag;
      cardTags+='<span class="uc-tag">'+(window.schoolChip?window.schoolChip(prof.school_tag,20):'')+'<span>'+esc(nm)+'</span></span>'; }
    if(prof.team_code) cardTags+='<span class="uc-tag"><b style="font-size:15px;line-height:1">◆</b><span>'+esc(prof.team_code)+'</span></span>';
  }catch(e){}
  const playerCard = window.hkPlayerCard ? window.hkPlayerCard({
    name: prof.handle||'set a handle', show:(window.hkFlair?window.hkFlair(prof.flair).show:undefined),
    tierEmblem: window.rankEmblem?window.rankEmblem(tier.name,60,tier.bucket):'',
    tierChipEmblem: window.rankEmblem?window.rankEmblem(tier.name,15,tier.bucket):'',
    tierLabel: tier.full||(tier.name+(tier.bucket?' · '+tier.bucket:'')),
    lvl:L.lvl, pct:L.pct, xpLine:L.into+' / '+L.need+' xp',
    stats:[{n:st.crowns,label:st.crowns===1?'crown':'crowns'},{n:st.pod,label:'podiums'},
      {n:st.att+'/'+D.menuOrder.length,label:'drills'},{n:mine.length,label:'clean solves'},
      {n:(streakN?'🔥 '+streakN:'—'),label:'streak'}],
    tagsHtml:cardTags, medals:cardMedals, medalSlots:5, boards:[], flair:cardFlair, owner:true
  },{scale:'full'}) : '';

  root.innerHTML = `
    <div class="acc-row acc-hero">
      <div class="acc-cardblock">
        <div class="acc-card${cardIsSkin?' pc-bare':''}">${playerCard}</div>
        <div class="acc-cardbtns">
          <a class="btn" href="profile.html">&#x270e; Customize card</a>
          <a class="btn ghost" href="index.html">Keep training &rarr;</a>
        </div>
        <div class="acc-theme">
          <label style="margin:0 0 6px">theme</label>
          <select id="acThemeSel" aria-label="theme" style="width:100%;font-family:var(--mono);font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;cursor:pointer"></select>
        </div>
        <div class="acc-since">member since ${joined}</div>
      </div>

      <div class="card acc-grow"><h4>Profile</h4>
        <label style="margin-top:0">handle &mdash; how you appear on every board</label>
        <input id="acHandle" maxlength="24" value="${esc(prof.handle||'')}" placeholder="pick a handle &mdash; letters, numbers, underscores">
        <button class="btn" id="acHandleSave">Save handle</button>
        <a id="acHandleSugg" style="font-family:var(--mono);font-size:11.5px;color:var(--accent);cursor:pointer;margin-left:10px">&#x2684; suggest one</a>
        <div class="msg" id="acHandleMsg"></div>
        <div id="schoolRow" style="margin-top:10px"></div>
        <div id="acSetup" class="setup"></div>
      </div>
    </div>

    <div class="card acc-certs"><h4>Certificate progress</h4>
      <div id="certBody"><div class="msg">loading&hellip;</div></div>
    </div>

    <div class="acc-row">
      <div class="card acc-grow acc-bill"><h4>Billing</h4>
        <div class="fieldrow"><span class="fk">plan</span><span class="fv"><b style="color:var(--warn);font-size:14px">PRO</b> <span class="badge warn">free during beta</span></span></div>
        <div class="fieldrow"><span class="fk">at launch</span><span class="fv" style="color:var(--muted)">beta players lock in founder pricing</span></div>
        <div class="fieldrow"><span class="fk">payment</span><span class="fv">none on file <span style="color:var(--faint)">&mdash; added at launch</span></span></div>
        <div class="fieldrow"><span class="fk">next charge</span><span class="fv">&mdash;</span></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
          <a class="btn" href="billing.html" style="margin:0">Billing &amp; invoices &rarr;</a>
          <button class="btn ghost" id="proSheetBtn" style="margin:0">What comes with PRO</button>
        </div>
      </div>

      <div class="card acc-grow" id="desk"><h4>Your desk</h4>
        <div id="deskBody"><div class="msg">loading&hellip;</div></div>
      </div>
    </div>

    <div class="acc-row">
      <div class="card acc-grow"><h4>Account &amp; security</h4>
        <div class="fieldrow"><span class="fk">email</span><span class="fv"><span id="acEmailShow">${esc(me.email||'-')}</span><span id="acEmailBadge"></span><a class="lnk" id="acEmailToggle">change</a></span></div>
        <div class="reveal" id="acEmailWrap" hidden>
          <label style="margin-top:0">new email address</label>
          <input id="acEmailNew" type="email" placeholder="you@school.edu" autocomplete="email">
          <button class="btn" id="acEmailSave" style="margin-top:8px">Send confirmation link</button>
          <div class="msg" id="acEmailMsg"></div>
        </div>

  (async()=>{ try{

    const {data}=await sb.rpc('home_desk_for_me'); const h=(data&&data[0])||null;
    if(!h) return;
    const btnRow=document.createElement('div');
    btnRow.style.cssText='margin-bottom:10px';
    btnRow.innerHTML='<button class="btn" id="joinHome" style="margin:0">Join '+esc(h.name)+' \u2014 your school\u2019s desk ('+h.members+' on it)</button><div class="msg" id="homeMsg"></div>';
    el.prepend(btnRow);
    document.getElementById('joinHome').onclick=async()=>{ try{
      const {error}=await sb.rpc('join_home_desk');
      if(error){ say('homeMsg',deskErr(error),true); return; }
      renderDesk(); }catch(e){ say('homeMsg','Something went wrong.',true); } };
  }catch(e){} })();
  document.getElementById('acPassSave').onclick=async()=>{
    const p1=document.getElementById('acP1').value, p2=document.getElementById('acP2').value;
    if(p1.length<8){ say('acPassMsg','Password needs at least 8 characters.',true); return; }
    if(p1!==p2){ say('acPassMsg','Passwords don\u2019t match.',true); return; }
    try{ const {error}=await sb.auth.updateUser({password:p1});
      if(error){ say('acPassMsg',error.message||'Couldn\u2019t update.',true); return; }
      say('acPassMsg','Password updated \u2713'); }catch(e){ say('acPassMsg','Something went wrong.',true); }
  };
  // ---- r396: email verification badge + resend ----
  (function(){
    const badge=document.getElementById('acEmailBadge'); if(!badge) return;
    const verified=!!(me.email_confirmed_at||me.confirmed_at);
    if(verified){ badge.innerHTML='<span class="badge ok">verified</span>'; return; }
    badge.innerHTML='<span class="badge warn">unverified</span> <a class="lnk" id="acEmailResend">resend link</a>';
    const rs=document.getElementById('acEmailResend');
    if(rs) rs.onclick=async()=>{ rs.textContent='sending…';
      try{ const {error}=await sb.auth.resend({type:'signup', email:me.email}); rs.textContent=error?'try again':'sent ✓'; }
      catch(e){ rs.textContent='try again'; } };
  })();
  // ---- r396: change email (Supabase updateUser -> confirmation link) ----
  { const tg=document.getElementById('acEmailToggle'), wrap=document.getElementById('acEmailWrap');
    if(tg&&wrap) tg.onclick=()=>{ wrap.hidden=!wrap.hidden; tg.textContent=wrap.hidden?'change':'cancel';
      if(!wrap.hidden){ const i=document.getElementById('acEmailNew'); if(i) i.focus(); } };
    const sv=document.getElementById('acEmailSave');
    if(sv) sv.onclick=async()=>{ const v=(document.getElementById('acEmailNew').value||'').trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){ say('acEmailMsg','Enter a valid email address.',true); return; }
      if(v.toLowerCase()===String(me.email||'').toLowerCase()){ say('acEmailMsg','That’s already your email.',true); return; }
      sv.disabled=true; say('acEmailMsg','Sending…');
      try{ const {error}=await sb.auth.updateUser({email:v});
        if(error){ say('acEmailMsg',error.message||'Couldn’t send the link.',true); sv.disabled=false; return; }
        say('acEmailMsg','Confirmation link sent to '+v+' — click it to finish. Your current email keeps working until then.'); }
      catch(e){ say('acEmailMsg','Something went wrong.',true); sv.disabled=false; } }; }
  // ---- r396: reveal the set-a-new-password fields ----
  { const tg=document.getElementById('acPwToggle'), wrap=document.getElementById('acPwWrap');
    if(tg&&wrap) tg.onclick=()=>{ wrap.hidden=!wrap.hidden; tg.textContent=wrap.hidden?'set a new one':'cancel';
      if(!wrap.hidden){ const i=document.getElementById('acP1'); if(i) i.focus(); } }; }
  // ---- r396: two-factor (TOTP via Supabase MFA when available; deferred cleanly otherwise) ----
  { const btn=document.getElementById('acMfaBtn'), wrap=document.getElementById('acMfaWrap'),
        body=document.getElementById('acMfaBody'), stat=document.getElementById('acMfaStat');
    const mfa=sb&&sb.auth&&sb.auth.mfa;
    async function refreshMfa(){ if(!mfa) return;
      try{ const {data}=await mfa.listFactors();
        const on=!!(data&&data.totp&&data.totp.length&&data.totp.some(f=>f.status==='verified'));
        if(stat){ stat.textContent=on?'on':'off'; stat.className='badge'+(on?' ok':''); }
        if(btn) btn.textContent=on?'manage':'enable'; }catch(e){} }
    if(btn) btn.onclick=async()=>{ wrap.hidden=!wrap.hidden; if(wrap.hidden) return;
      if(!mfa){ body.innerHTML='Two-factor turns on at launch — it needs a verified email on the account first.'; return; }
      body.textContent='Starting…';
      try{ const {data,error}=await mfa.enroll({factorType:'totp'});
        if(error){ body.textContent=error.message||'Couldn’t start enrollment.'; return; }
        const qr=(data&&data.totp&&data.totp.qr_code)||'', secret=(data&&data.totp&&data.totp.secret)||'', fid=data&&data.id;
        body.innerHTML='<div style="line-height:1.7;margin-bottom:8px">Scan this in your authenticator app, then enter the 6-digit code.</div>'+
          (qr?'<img src="'+qr+'" alt="2FA QR" style="width:150px;height:150px;background:#fff;border-radius:8px;margin-bottom:8px">':'')+
          (secret?'<div style="font-size:11px;color:var(--faint);word-break:break-all;margin-bottom:8px">'+esc(secret)+'</div>':'')+
          '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><input id="mfaCode" inputmode="numeric" maxlength="6" placeholder="000000" style="width:120px"><button class="btn" id="mfaVerify" style="margin:0">Verify</button></div><div class="msg" id="mfaMsg"></div>';
        const vb=document.getElementById('mfaVerify');
        if(vb) vb.onclick=async()=>{ const code=(document.getElementById('mfaCode').value||'').trim();
          try{ const ch=await mfa.challenge({factorId:fid}); if(ch.error){ say('mfaMsg',ch.error.message,true); return; }
            const vr=await mfa.verify({factorId:fid, challengeId:ch.data.id, code});
            if(vr.error){ say('mfaMsg',vr.error.message||'Wrong code — try again.',true); return; }
            say('mfaMsg','Two-factor is on ✓'); refreshMfa(); }
          catch(e){ say('mfaMsg','Something went wrong.',true); } }; }
      catch(e){ body.textContent='Two-factor isn’t available yet.'; } };
    refreshMfa();
  }
  // ---- r396: account-setup checklist (fills the Profile card, surfaces verify status) ----
  (function(){
    const el=document.getElementById('acSetup'); if(!el) return;
    const verified=!!(me.email_confirmed_at||me.confirmed_at);
    const items=[
      {on:!!prof.handle, t:'Handle claimed'},
      {on:verified, t:'Email verified', act:verified?null:{id:'setupResend', lbl:'resend'}},
      {on:!!prof.school_tag, t:'School colors set'},
      {on:!!(prof.flair&&String(prof.flair).length), t:'Card personalized', act:(prof.flair&&String(prof.flair).length)?null:{href:'profile.html', lbl:'customize'}},
      {on:!!prof.team_code, t:'Joined a desk', act:prof.team_code?null:{href:'desks.html', lbl:'find one'}}
    ];
    const done=items.filter(i=>i.on).length;
    el.innerHTML='<div class="setup-h"><span>account setup</span><span>'+done+' / '+items.length+'</span></div>'+
      items.map(i=>{ let a=''; if(!i.on&&i.act){ a=i.act.href?'<a href="'+i.act.href+'">'+i.act.lbl+'</a>':'<a id="'+i.act.id+'">'+i.act.lbl+'</a>'; }
        return '<div class="setup-i'+(i.on?' on':'')+'"><span class="dot">'+(i.on?'✓':'')+'</span><span class="sl">'+i.t+'</span>'+a+'</div>'; }).join('');
    const sr=document.getElementById('setupResend');
    if(sr) sr.onclick=()=>{ const r=document.getElementById('acEmailResend'); if(r){ r.click(); sr.textContent='sent ✓'; } };
  })();
  // r156: PRO touchpoints — plan card button + the flair PRO tag open the offer sheet
  { const pb=document.getElementById('proSheetBtn'); if(pb) pb.onclick=()=>{ if(window.hkProSheet) window.hkProSheet(); }; }
  { const dv=document.getElementById('devRanked'), dro=document.getElementById('devRankedOff');
    if(dv) dv.onclick=()=>{ try{ localStorage.setItem('hk_dev_unlock','1'); localStorage.setItem('hk_ranked','1'); }catch(e){}
      say('devMsg','Ranked unlocked for testing ✓ — open the leaderboard.'); };
    if(dro) dro.onclick=()=>{ try{ localStorage.removeItem('hk_dev_unlock'); localStorage.removeItem('hk_ranked'); }catch(e){}
      say('devMsg','Reset ✓ — the real gate applies again.'); } }
}
load();
</script>
