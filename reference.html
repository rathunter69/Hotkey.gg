<style>
  :root{
    --bg:#0c0d0e; --surface:#141517; --surface2:#1c1d20; --line:#26282c;
    --text:#e9e8e3; --muted:#7c7d77; --faint:#4c4d49;
    --accent:#2ea36f; --accent-dim:#1d6647;
    --accent-glow:rgba(46,163,111,.22); --warn:#d9a441; --bad:#c8533f;
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scrollbar-gutter:stable; scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    background-attachment:fixed;
  }
  .wrap{max-width:1180px; margin:0 auto; padding:0 24px;}

  /* nav styles come from nav.css */

  /* ---------- header (page heading) ---------- */
  header{padding:12px 0 10px;}   /* r67: flush with the game box */
  .brand{font-family:var(--mono); font-weight:700; font-size:19px; letter-spacing:-.5px; display:inline-flex; align-items:center; gap:1px;}
  .brand .gg{color:var(--accent);}
  .brand .slash{color:var(--muted);}
  h1{font-size:22px; font-weight:700; letter-spacing:-.4px; margin:4px 0 4px; line-height:1.1;}
  h1 .em{color:var(--accent);}
  .sub{color:var(--muted); font-size:16px; max-width:60ch;}
  .legend{display:flex; gap:18px; flex-wrap:wrap; margin-top:18px; font-size:12.5px; color:var(--muted); font-family:var(--mono);}
  .legend .dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle;}
  .legend .ch{color:var(--accent); font-weight:700;}

  /* ---------- toolbar ---------- */
  .toolbar{position:sticky; top:0; z-index:20; padding:14px 0; margin:14px 0 6px;
    background:var(--bg); border-bottom:1px solid var(--line);}   /* r62 flat sticky */
  .searchrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .search{flex:1; min-width:230px; position:relative;}
  .search input{width:100%; background:var(--surface); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:14px; padding:12px 14px 12px 38px; border-radius:10px; outline:none; transition:border-color .15s,box-shadow .15s;}
  .search input:focus{border-color:var(--accent-dim); outline:3px solid var(--accent-glow);}
  .search input::placeholder{color:var(--muted);}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); opacity:.5;}
  .count{font-family:var(--mono); font-size:12.5px; color:var(--muted); white-space:nowrap;}
  .count b{color:var(--accent);}
  .chips{display:flex; gap:7px; flex-wrap:wrap; margin-top:12px;}
  .chip{font-family:var(--mono); font-size:12px; color:var(--muted); background:var(--surface);
    border:1px solid var(--line); padding:6px 11px; border-radius:999px; cursor:pointer; transition:all .14s; user-select:none;}
  .chip:hover{color:var(--text); border-color:#34373c;}
  .chip.on{color:var(--on-accent); background:var(--accent); border-color:var(--accent); font-weight:700;}

  /* ---------- grid of cards ---------- */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding:8px 0 60px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:0 0 8px; overflow:hidden;}
  .card.hide{display:none;}
  .card h2{font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); min-height:34px; padding:6px 14px; margin-bottom:8px; display:flex; align-items:center; gap:9px;
    background:var(--surface2); border-bottom:1px solid var(--line);}   /* r62: the frame's strip language */
  .card h2 .ic{color:var(--accent);}
  .card h2 .n{margin-left:auto; color:var(--faint); font-size:11px; letter-spacing:0;}

  .row{display:flex; align-items:center; gap:14px; padding:9px 18px; border-top:1px solid rgba(38,40,44,.55); transition:background .12s;}
  .row:hover{background:var(--surface2);}
  .row.drilled{position:relative;}
  .row.drilled::before{content:""; position:absolute; left:0; top:8px; bottom:8px; width:2px; background:var(--accent); border-radius:2px;}
  .row.hide{display:none;}
  .keys{flex:0 0 auto; display:flex; align-items:center; gap:5px; flex-wrap:wrap; min-width:0;}
  .desc{flex:1; font-size:13.5px; color:var(--text); min-width:0;}
  .desc .dr{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-left:7px; vertical-align:middle;}
  /* r292 (Wolf): ALWAYS visible — keyboard-first users won't hover to discover it.
     Quiet by default, lights up on row hover. Jumps straight into a drill for the chord. */
  .practice{flex:0 0 auto; font-family:var(--mono); font-size:11px; color:var(--accent); text-decoration:none;
    white-space:nowrap; opacity:.72; transition:opacity .12s, background .12s; padding:2px 9px;
    border:1px solid var(--accent-dim); border-radius:999px;}
  .row:hover .practice{opacity:1; background:var(--accent-glow);}
  .practice:hover{opacity:1; background:var(--accent);color:var(--on-accent);}

  /* ---------- keycaps ---------- */
  .cap{display:inline-flex; align-items:center; justify-content:center; min-width:29px; height:29px; padding:0 9px;
    font-family:var(--mono); font-size:12.5px; font-weight:700; color:var(--text); white-space:nowrap;
    background:linear-gradient(180deg,var(--surface2),var(--surface)); border:1px solid var(--line); border-radius:7px;
    box-shadow:0 2px 0 rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);}
  .sep{color:var(--muted); font-family:var(--mono); font-size:12px; padding:0 1px;}
  .sep.arrow{color:var(--accent); font-weight:700;}
  .alt{color:var(--faint); font-size:11px; padding:0 1px;}

  /* ---------- footer ---------- */
  footer{border-top:1px solid var(--line); padding:26px 0 50px; color:var(--muted); font-size:13px; display:flex; gap:20px; flex-wrap:wrap; align-items:center;}
  footer a{color:var(--text); text-decoration:none; font-family:var(--mono); font-size:13px; border-bottom:1px solid var(--accent-dim); padding-bottom:1px; transition:color .14s;}
  footer a:hover{color:var(--accent);}
  footer .mut{font-size:11.5px; color:#56584f; max-width:46ch; line-height:1.5;}
  .empty{grid-column:1/-1; text-align:center; color:var(--muted); font-family:var(--mono); font-size:14px; padding:50px 0;}
</style>

  ]},

    {k:'Formatting drills', d:'\u2192 styling / alignment / numbers / borders cards \u2014 the same chords at recall speed'},
    {k:'Data drills', d:'\u2192 sort + filter cards; the AutoFilter chord is the same Ctrl+Shift+L'},
    {k:'Formulas drills', d:'\u2192 formulas cards (autosum, fills, F4 abs, trace, show formulas)'},
    {k:'Dialog chords deck', d:'find \u00b7 replace \u00b7 go to \u00b7 format cells \u00b7 insert fn \u00b7 comment \u00b7 freeze \u00b7 link \u00b7 new sheet \u00b7 save \u2014 the chords classic drills never exercise; pick the deck in the rapid-fire menu'},
  ]},

/* r293 (Wolf): Macabacus + FactSet are STANDALONE sections in the main grid now —
   their own filter chips, searchable rows, plugin accent, PRO tag — instead of an
   8-row teaser card up top and the full list buried under the page. Rows come from
   drills.js HOTKEY_PLUGIN_LAYERS (single source, verified against each vendor's
   published sheet). ● = live in the trainer under that keyboard profile. */
(function(){
  const L = window.HOTKEY_PLUGIN_LAYERS; if(!L) return;
  Object.values(L).forEach(p=>{
    DATA.push({ cat:p.name, ic:'⚡', color:p.color, pro:true, note:p.note,
      items:p.keys.map(x=>({ k:x.k, d:x.cat+' — '+x.a, dr:!!x.inEngine })) });
  });
})();

function renderCombo(spec){
  const seq = spec.includes('>');
  const parts = spec.split(seq?'>':'+').filter(p=>p!=='');
  // handle the literal '+' key (Ctrl+Shift++)
  if(!seq && spec.endsWith('+') && parts.length){ parts.push('+'); }
  const caps = parts.map(p=>{
    const alts = p.split('/').map(a=>`<span class="cap">${a}</span>`).join('<span class="alt">/</span>');
    return alts;
  });
  const sep = seq ? '<span class="sep arrow">→</span>' : '<span class="sep">+</span>';
  return caps.join(sep);
}

/* r279 STAGE 3 — Windows/Mac keycap toggle. Defaults to the visitor's platform;
   swaps modifier caps in place (originals kept on dataset). KeyTips-forward:
   Alt walks become \u2325 walks — the same letters real Mac Excel now accepts. */
let refMac=(function(){ try{ const v=localStorage.getItem('hk_ref_mac');
  if(v!==null) return v==='1';
  return !!(window.hkIsMac && window.hkIsMac()); }catch(e){ return false; } })();
function macCap(t){
  if(/^ctrl$/i.test(t)) return '\u2318';
  if(/^alt$/i.test(t)) return '\u2325';
  if(/^shift$/i.test(t)) return '\u21e7';
  return t;
}
function applyPlatform(){
  document.querySelectorAll('.cap').forEach(c=>{
    if(!c.dataset.win) c.dataset.win=c.textContent;
    c.textContent = refMac ? macCap(c.dataset.win) : c.dataset.win;
  });
  const b=document.getElementById('platToggle');
  if(b){ b.textContent = refMac ? '\u2318 mac keys \u00b7 show windows' : '\u229e windows keys \u00b7 show mac';
    b.style.color = refMac ? 'var(--accent)' : 'var(--muted)';
    b.style.borderColor = refMac ? 'var(--accent-dim)' : 'var(--line)'; }
  const ms=document.getElementById('macSetup');
  if(ms) ms.style.display = refMac ? '' : 'none';
}
const grid = document.getElementById('grid');
const chipsEl = document.getElementById('chips');
setTimeout(()=>{ try{
  applyPlatform();
  const b=document.getElementById('platToggle');
  if(b) b.onclick=()=>{ refMac=!refMac; try{ localStorage.setItem('hk_ref_mac', refMac?'1':'0'); }catch(e){} applyPlatform(); };
  const ms=document.getElementById('macSetup');
  if(ms) ms.onclick=()=>{ if(window.hkMacPopup) window.hkMacPopup(); };
}catch(e){} }, 0);
const countEl = document.getElementById('count');
const qEl = document.getElementById('q');
let activeCat = 'all';
let totalCount = 0;

/* r291: resolve a reference key ('Ctrl+C', 'Alt>H>K', 'Ctrl+↑/↓/←/→') to a drill key
   via the generated chord map. Normalizes (uppercase, no spaces); for a slash-joined
   arrow group, tries each arrow so navigation rows still link. */
function refDrillFor(k){
  try{
    const M=window.HK_CHORD_DRILL; if(!M) return null;
    const norm=s=>String(s).toUpperCase().replace(/\s+/g,'');
    const direct=M[norm(k)]; if(direct) return direct;
    if(k.indexOf('/')>=0){
      // 'Ctrl+↑/↓/←/→' → try Ctrl+↑, Ctrl+↓, ...
      const m=k.match(/^(.*?)([↑↓←→](?:\/[↑↓←→])+)$/);
      if(m){ const pre=m[1]; for(const a of m[2].split('/')){ const hit=M[norm(pre+a)]; if(hit) return hit; } }
    }
    return null;
  }catch(e){ return null; }
}
DATA.forEach((sec,si)=>{
  totalCount += sec.items.length;
  const card = document.createElement('section');
  card.className='card'; card.dataset.cat=sec.cat;
  card.style.animationDelay=(si*45)+'ms';
  const proTag = sec.pro ? '<span style="font-size:9px;color:var(--warn);letter-spacing:1px;vertical-align:2px;margin-left:8px">\u25c6 PRO \u00b7 free in beta</span>' : '';
  const noteLine = sec.note ? `<div style="font-family:var(--mono);font-size:10.5px;color:var(--faint);margin:-4px 0 10px">${sec.note}</div>` : '';
  card.innerHTML = `<h2>${sec.color?`<span class="ic" style="color:${sec.color}">${sec.ic}</span>`:`<span class="ic">${sec.ic}</span>`}${sec.cat}${proTag}<span class="n">${sec.items.length}</span></h2>` + noteLine +
    sec.items.map(it=>{
      const txt=(it.k+' '+it.d).toLowerCase();
      // r291: link each shortcut to a drill that trains it (from the generated chord map).
      // A combined key like 'Ctrl+↑/↓/←/→' tries each single-arrow variant.
      const dk = refDrillFor(it.k);
      const practice = dk ? `<a class="practice" href="index.html?drill=${dk}" title="practice this shortcut in a drill">practice →</a>` : '';
      return `<div class="row${it.dr?' drilled':''}" data-s="${txt.replace(/"/g,'')}">
        <span class="keys">${renderCombo(it.k)}</span>
        <span class="desc">${it.d}${it.dr?'<span class="dr" title="drilled in the trainer"></span>':''}</span>
        ${practice}
      </div>`;
    }).join('');
  grid.appendChild(card);
});

// category chips
const cats = ['all', ...DATA.map(d=>d.cat)];
cats.forEach(c=>{
  const chip=document.createElement('span');
  chip.className='chip'+(c==='all'?' on':''); chip.textContent=(c==='all'?'all':c);
  chip.onclick=()=>{ activeCat=c; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); chip.classList.add('on'); apply(); };
  chipsEl.appendChild(chip);
});

function apply(){
  const q=qEl.value.trim().toLowerCase();
  let shown=0;
  document.querySelectorAll('.card').forEach(card=>{
    const catMatch = activeCat==='all' || card.dataset.cat===activeCat;
    let any=false;
    card.querySelectorAll('.row').forEach(row=>{
      const hit = catMatch && (q==='' || row.dataset.s.includes(q));
      row.classList.toggle('hide', !hit);
      if(hit){ any=true; shown++; }
    });
    card.classList.toggle('hide', !any);
  });
  countEl.innerHTML = `<b>${shown}</b> / ${totalCount} shortcuts`;
  let emp=document.getElementById('emptyMsg');
  if(shown===0){ if(!emp){ emp=document.createElement('div'); emp.id='emptyMsg'; emp.className='empty'; emp.textContent='No shortcuts match that.'; grid.appendChild(emp);} }
  else if(emp){ emp.remove(); }
}
qEl.addEventListener('input', apply);
apply();
</script>
